*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0d13;--bg2:#111621;--bg3:#181e2c;--bg4:#1f2738;--border:#262f42;--border2:#333e55;--text:#e8ecf4;--text2:#8692ab;--accent:#3b82f6;--accent2:#60a5fa;--yes:#34d399;--no:#f87171;--abstain:#fbbf24;--nv:#4b5563}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{color:var(--accent2);text-decoration:none;transition:opacity .15s}a:hover{opacity:.75}
input,select{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.loader{display:flex;gap:8px;align-items:center;justify-content:center;padding:40px}
.loader span{width:10px;height:10px;border-radius:50%;background:var(--accent);animation:bounce 1.4s ease-in-out infinite}
.loader span:nth-child(2){animation-delay:.16s}.loader span:nth-child(3){animation-delay:.32s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease-out}
.tooltip-container{display:inline-block}
.tooltip-popup{display:none;position:fixed;z-index:100;
  background:#1e2538;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;
  min-width:240px;max-width:380px;font-size:11px;color:var(--text);line-height:1.5;
  box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;white-space:normal;word-break:break-word}
.tooltip-container:hover .tooltip-popup{display:block}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);
  cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s}
.btn:hover{background:var(--bg4);border-color:var(--border2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#2563eb}
.vote-cell{overflow:hidden;position:relative;z-index:1}
.tab-bar{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:14px}
.tab-btn{flex:1;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:700;
  font-family:inherit;background:transparent;color:var(--text2);transition:all .15s}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:hover:not(.active){background:var(--bg3)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
input[type=range]{-webkit-appearance:none;background:var(--bg);height:6px;border-radius:3px;outline:none;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg)}
@media(max-width:768px){
  body{font-size:13px}
  .tab-bar{flex-wrap:wrap;gap:1px}
  .tab-btn{padding:6px 8px;font-size:11px}
  .card{padding:10px}
  .tooltip-popup{max-width:280px;min-width:180px}
}
@media(max-width:480px){
  body{font-size:12px}
  .tab-btn{padding:5px 6px;font-size:10px}
  .card{padding:8px;border-radius:8px}
  .btn{padding:5px 10px;font-size:11px}
}
</style>

// Blockfrost API Layer with Caching + Rate Limiting
// ════════════════════════════════════════════════════════════════
const BLOCKFROST_URL = "https://cardano-mainnet.blockfrost.io/api/v0";
const BF_KEY_LS = "blockfrost_api_key";
const BF_PAGE_SIZE = 100;

function getBfKey() { return localStorage.getItem(BF_KEY_LS) || ""; }
function setBfKey(k) { localStorage.setItem(BF_KEY_LS, k); }

// --- In-memory cache ---
const _cache = new Map();
const CACHE_TTL = 10 * 60 * 1000; // 10 min
let _apiCalls = 0, _cacheHits = 0;

// --- Persistent cache (localStorage) for simulator vote data ---
const SIM_CACHE_KEY = "cardano_drep_sim_cache_v4";
const SIM_CACHE_TTL = 60 * 60 * 1000; // 1 hour

function saveSimCache(data) {
  try {
    const payload = { ts: Date.now(), ...data };
    localStorage.setItem(SIM_CACHE_KEY, JSON.stringify(payload));
  } catch(e) { console.warn("SimCache save failed:", e); }
}

function loadSimCache() {
  try {
    const raw = localStorage.getItem(SIM_CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > SIM_CACHE_TTL) { localStorage.removeItem(SIM_CACHE_KEY); return null; }
    return parsed;
  } catch(e) { localStorage.removeItem(SIM_CACHE_KEY); return null; }
}

function timedFetch(url, opts={}, ms=30000) {
  const c = new AbortController();
  const t = setTimeout(() => c.abort(), ms);
  return fetch(url, {...opts, signal:c.signal}).finally(() => clearTimeout(t));
}

// --- Throttle: min 100ms between calls (10 req/sec for Blockfrost) ---
let _lastFetch = 0;
async function bfFetchJSON(path) {
  const url = `${BLOCKFROST_URL}${path}`;
  const cached = _cache.get(url);
  if (cached && Date.now() - cached.ts < CACHE_TTL) { _cacheHits++; return cached.data; }
  const key = getBfKey();
  if (!key) throw new Error("Blockfrost API key not set");
  const now = Date.now();
  const wait = Math.max(0, 100 - (now - _lastFetch));
  if (wait > 0) await new Promise(r => setTimeout(r, wait));
  _lastFetch = Date.now();
  _apiCalls++;
  const r = await timedFetch(url, { headers: { "Accept": "application/json", "project_id": key } });
  if (r.status === 404) { _cache.set(url, { data: null, ts: Date.now() }); return null; }
  if (r.status === 402) throw new Error("Blockfrost: Usage limit reached");
  if (r.status === 403) throw new Error("Blockfrost: Invalid API key");
  if (r.status === 418) throw new Error("Blockfrost: IP has been auto-banned");
  if (r.status === 429) { await new Promise(r => setTimeout(r, 1000)); return bfFetchJSON(path); } // retry once
  if (!r.ok) throw new Error(`Blockfrost HTTP ${r.status}`);
  const data = await r.json();
  _cache.set(url, { data, ts: Date.now() });
  return data;
}

// Fetch all pages of a paginated Blockfrost endpoint
async function bfFetchAllPages(path, maxPages = 20) {
  const results = [];
  for (let page = 1; page <= maxPages; page++) {
    const sep = path.includes("?") ? "&" : "?";
    const data = await bfFetchJSON(`${path}${sep}page=${page}&count=${BF_PAGE_SIZE}`);
    if (!data || !Array.isArray(data) || data.length === 0) break;
    results.push(...data);
    if (data.length < BF_PAGE_SIZE) break;
  }
  return results;
}

// ─── URL Hash State Sharing ──────────────────────────────────
// Parse URL hash fragment into key-value params
function parseHash() {
  const h = window.location.hash.slice(1);
  if (!h) return {};
  const p = {};
  try { new URLSearchParams(h).forEach((v, k) => { p[k] = v; }); } catch {}
  return p;
}
// Global hash state store — tracks current values across all components
const _hs = {};
// Update URL hash from global state (uses replaceState, no page reload)
function syncHash() {
  const entries = Object.entries(_hs).filter(([, v]) => v !== undefined && v !== null && v !== "");
  if (entries.length === 0) { window.history.replaceState(null, "", window.location.pathname); return; }
  window.history.replaceState(null, "", "#" + new URLSearchParams(entries).toString());
}
// Coerce string value to match default value's type
function coerceVal(s, def) {
  if (typeof def === "number") { const n = Number(s); return isNaN(n) ? def : n; }
  if (typeof def === "boolean") return s === "true" || s === "1";
  return s;
}
// Custom hook: useState synced to URL hash
// Returns [value, setter] — same API as useState
function useHashState(key, defaultVal) {
  const initHash = React.useMemo(() => parseHash(), []);
  const initVal = initHash[key] !== undefined ? coerceVal(initHash[key], defaultVal) : defaultVal;
  const [val, setVal] = React.useState(initVal);
  // Initialize global store
  React.useEffect(() => {
    if (String(initVal) !== String(defaultVal)) _hs[key] = String(initVal);
  }, []);
  const setter = React.useCallback((newVal) => {
    setVal(prev => {
      const v = typeof newVal === "function" ? newVal(prev) : newVal;
      if (String(v) === String(defaultVal)) { delete _hs[key]; } else { _hs[key] = String(v); }
      syncHash();
      return v;
    });
  }, [key, defaultVal]);
  return [val, setter];
}

function calcGini(values) {
  const n = values.length; if (n === 0) return 0;
  const sorted = [...values].sort((a,b) => a - b);
  const sum = sorted.reduce((a,b) => a + b, 0); if (sum === 0) return 0;
  let cumSum = 0, giniSum = 0;
  sorted.forEach(v => { cumSum += v; giniSum += cumSum; });
  return (2 * giniSum) / (n * sum) - (n + 1) / n;
}

// Fetch a page of DRep IDs, then batch-fetch their details + metadata
async function fetchDrepPage(page, addLog, setStage) {
  const ids = await bfFetchJSON(`/governance/dreps?page=${page}&count=${BF_PAGE_SIZE}`);
  if (!ids || !Array.isArray(ids) || ids.length === 0) return { dreps: [], reachedEnd: true };
  const result = [];
  for (let i = 0; i < ids.length; i += VOTE_BATCH) {
    const batch = ids.slice(i, i + VOTE_BATCH);
    if (setStage) setStage(`DReps: ${result.length + batch.length}/${ids.length} (page ${page})`);
    const results = await Promise.allSettled(batch.map(async d => {
      const detail = await bfFetchJSON(`/governance/dreps/${d.drep_id}`);
      if (!detail || detail.retired || detail.expired) return null;
      let name = null, image_url = null;
      try {
        const meta = await bfFetchJSON(`/governance/dreps/${d.drep_id}/metadata`);
        if (meta && meta.json_metadata) {
          const body = meta.json_metadata.body || meta.json_metadata;
          name = body?.givenName || body?.name || null;
          image_url = body?.image?.contentUrl || null;
        }
      } catch(e) {}
      return { drep_id: d.drep_id, name, amount: detail.amount || "0", image_url, delegators: 0 };
    }));
    results.forEach(r => { if (r.status === "fulfilled" && r.value) result.push(r.value); });
  }
  return { dreps: result, reachedEnd: ids.length < BF_PAGE_SIZE };
}

// Fetch multiple pages of DReps
async function fetchDrepRange(startPage, numPages, addLog, setStage) {
  const result = []; let reachedEnd = false;
  for (let p = startPage; p < startPage + numPages; p++) {
    const { dreps: chunk, reachedEnd: ended } = await fetchDrepPage(p, addLog, setStage);
    result.push(...chunk);
    if (ended) { reachedEnd = true; break; }
  }
  result.sort((a, b) => Number(b.amount) - Number(a.amount));
  return { dreps: result, nextPage: reachedEnd ? -1 : startPage + numPages, reachedEnd };
}

// Process a Blockfrost vote record into the vote map
function processVoteRecord(v, drepId, vm, rm, gaMap) {
  const propTxHash = v.proposal_tx_hash || "";
  const propCertIdx = v.proposal_cert_index != null ? v.proposal_cert_index : -1;
  if (!propTxHash) return false;
  const propKey = `${propTxHash}#${propCertIdx}`;
  if (!gaMap[propKey]) {
    gaMap[propKey] = {
      proposal_id: propKey, proposal_type: "", epoch_no: 0,
      title: "", tx_hash: propTxHash, cert_index: propCertIdx, expiration: 0
    };
  }
  let voteVal = (v.vote || "").toLowerCase();
  if (voteVal === "yes") voteVal = "Yes";
  else if (voteVal === "no") voteVal = "No";
  else if (voteVal === "abstain") voteVal = "Abstain";
  else return false;
  const k = `${drepId}__${propKey}`;
  vm[k] = voteVal;
  // Blockfrost vote records don't include rationale directly
  return true;
}

// Fetch votes for a list of DReps
async function fetchVotesForDreps(drepList, addLog, setStage, stageLabel) {
  const vm = {}, rm = {}, gaMap = {}; let totalVotes = 0;
  for (let batch = 0; batch < drepList.length; batch += VOTE_BATCH) {
    const batchDreps = drepList.slice(batch, batch + VOTE_BATCH);
    if (setStage) setStage(`${stageLabel} (${Math.min(batch + VOTE_BATCH, drepList.length)}/${drepList.length})`);
    await Promise.allSettled(batchDreps.map(async (d) => {
      try {
        const votes = await fetchAllVotesForDrep(d.drep_id);
        votes.forEach(v => { if (processVoteRecord(v, d.drep_id, vm, rm, gaMap)) totalVotes++; });
      } catch(e) { /* skip */ }
    }));
  }
  return { vm, rm, gaMap, totalVotes };
}

// Enrich proposals with details (type, expiration) and metadata (title) from Blockfrost
async function enrichProposals(gaMap, addLog, setStage) {
  const proposals = Object.values(gaMap);
  const toFetch = proposals.filter(p => !p.proposal_type && p.tx_hash);
  for (let i = 0; i < toFetch.length; i += VOTE_BATCH) {
    const batch = toFetch.slice(i, i + VOTE_BATCH);
    if (setStage) setStage(`Proposals: ${Math.min(i + VOTE_BATCH, toFetch.length)}/${toFetch.length}`);
    await Promise.allSettled(batch.map(async p => {
      try {
        const detail = await bfFetchJSON(`/governance/proposals/${p.tx_hash}/${p.cert_index}`);
        if (detail) {
          p.proposal_type = normalizeType(detail.governance_type || "");
          p.expiration = detail.expiration || 0;
          p.epoch_no = detail.expiration || 0;
        }
      } catch(e) {}
      try {
        const meta = await bfFetchJSON(`/governance/proposals/${p.tx_hash}/${p.cert_index}/metadata`);
        if (meta && meta.json_metadata) {
          const body = meta.json_metadata.body || meta.json_metadata;
          let title = body?.title || "";
          if (typeof title === "object") title = JSON.stringify(title);
          p.title = title;
        }
      } catch(e) {}
    }));
  }
}

// Reward Calculation Models (3 mechanisms, computed simultaneously)
// ════════════════════════════════════════════════════════════════
function calcAllMechanisms(dreps, params, voteData, totalActions, periodVoteData) {
  const n = dreps.length;
  if (n === 0) return { mo_equal:[], mo_prop:[], mo_bonus:[] };
  const budget = params.totalBudget;

  function tagEligible() {
    let paidCount = 0;
    return dreps.map((d, i) => {
      const excluded = i < params.K;
      const inBand = !excluded && Number(d.amount) > 0 && paidCount < params.N;
      if (inBand) paidCount++;
      return { ...d, rank: i + 1, eligible: inBand };
    });
  }

  function applyPeriodVotePenalty(tagged, rewards) {
    if (!periodVoteData) return rewards;
    return rewards.map((r, i) => {
      if (r === 0) return 0;
      const pd = periodVoteData[tagged[i].drep_id];
      if (!pd || pd.actionsInPeriod === 0) return 0;
      let factor = 1;
      // Vote-rate adjustment
      if (params.votePenaltyOn) {
        factor *= pd.votesInPeriod / pd.actionsInPeriod;
      }
      // Rationale adjustment: blend between 1.0 (no effect) and rationaleRate
      if (params.rationaleWeight > 0 && pd.votesInPeriod > 0) {
        const ratRate = pd.rationalesInPeriod / pd.votesInPeriod;
        factor *= 1 - params.rationaleWeight * (1 - ratRate);
      }
      return r * factor;
    });
  }

  function adjustAndNormalize(tagged, rewards) {
    let adj = applyPeriodVotePenalty(tagged, rewards);
    const total = adj.reduce((a, b) => a + b, 0);
    if (total > 0) adj = adj.map(r => r * budget / total);
    return tagged.map((d, i) => ({ ...d, reward: adj[i] }));
  }

  function calcEqual() {
    const tagged = tagEligible();
    const weights = tagged.map(d => d.eligible ? 1 : 0);
    const sumW = weights.reduce((a, b) => a + b, 0);
    const base = tagged.map((d, i) => sumW > 0 && d.eligible ? budget * (weights[i] / sumW) : 0);
    return adjustAndNormalize(tagged, base);
  }

  function calcProp() {
    const tagged = tagEligible();
    const weights = tagged.map(d => d.eligible ? Number(d.amount) : 0);
    const sumW = weights.reduce((a, b) => a + b, 0);
    const base = tagged.map((d, i) => sumW > 0 && d.eligible ? budget * (weights[i] / sumW) : 0);
    return adjustAndNormalize(tagged, base);
  }

  function calcBonus() {
    const tagged = tagEligible();
    const eligibleList = tagged.filter(d => d.eligible);
    if (eligibleList.length === 0) return tagged.map(d => ({ ...d, reward: 0 }));
    const eligibleStake = eligibleList.reduce((s, d) => s + Number(d.amount), 0);
    const totalBonusPool = params.b2 * eligibleList.length;
    const baseBudget = budget - totalBonusPool;
    const base = tagged.map(d => {
      if (!d.eligible) return 0;
      const propPart = eligibleStake > 0 && baseBudget > 0 ? baseBudget * (Number(d.amount) / eligibleStake) : 0;
      return propPart + params.b2;
    });
    return adjustAndNormalize(tagged, base);
  }

  return { mo_equal: calcEqual(), mo_prop: calcProp(), mo_bonus: calcBonus() };
}

function calcProcessMetrics(results, totalEligible) {
  const rewarded = results.filter(r => r.reward > 0);
  const eligibleCount = rewarded.length;
  const totalReward = rewarded.reduce((s, r) => s + r.reward, 0);
  const rewards = rewarded.map(r => r.reward);
  const P = totalEligible > 0 ? eligibleCount / totalEligible : 0;
  let C = 0;
  if (totalReward > 0 && eligibleCount > 1) {
    const hhi = rewarded.reduce((s, r) => s + Math.pow(r.reward / totalReward, 2), 0);
    C = (hhi - 1 / eligibleCount) / (1 - 1 / eligibleCount);
  }
  const rewardedStake = rewarded.reduce((s, r) => s + Number(r.amount), 0);
  let D = 0;
  if (rewardedStake > 0 && totalEligible > 0) {
    const stakeHHI = rewarded.reduce((s, r) => s + Math.pow(Number(r.amount) / rewardedStake, 2), 0);
    const effectiveN = stakeHHI > 0 ? 1 / stakeHHI : 0;
    D = effectiveN / totalEligible;
  }
  const gini = calcGini(rewards);
  const minR = rewards.length > 0 ? Math.min(...rewards) : 0;
  const maxR = rewards.length > 0 ? Math.max(...rewards) : 0;
  const avgR = rewards.length > 0 ? totalReward / rewards.length : 0;
  const medR = rewards.length > 0 ? [...rewards].sort((a, b) => a - b)[Math.floor(rewards.length / 2)] : 0;
  return { D, P, C, eligible: eligibleCount, gini, minR, maxR, avgR, medR, totalReward };
}

        const toggleSpoSort = (key) => {

                      <span style={{fontSize:Math.round(7*zoom/100),marginLeft:4,color:pool.isAutoAbstain?"#fbbf24":pool.isAutoNoConf?"#dc2626":pool.pledge_drep?"var(--text2)":"transparent",fontWeight:600}}>

                    {pgP.map((p,ci)=>{

                        <div style={{textAlign:"center",fontSize:8,color:"var(--text2)",opacity:.3}}>—</div></td>;
                      const ev = getSpoEffVote(pool, p);

                      return <td key={p.proposal_id||ci} style={{padding:0,borderBottom:"1px solid var(--border)"}}>
                        <div className="vote-cell" style={{padding:`${Math.round(3*zoom/100)}px ${Math.round(2*zoom/100)}px`,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"}}>

              </tbody>

          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,padding:"4px 8px",borderTop:"1px solid var(--border)",background:"var(--bg3)"}}>
            <button className="btn" disabled={spoPage===0} onClick={()=>setSpoPage(spoPage-1)} style={{padding:"1px 6px",fontSize:9,opacity:spoPage===0?.3:1}}>←</button>
            <span style={{fontSize:9}}>{spoPage+1} / {spoTotalPages}</span>
            <button className="btn" disabled={spoPage>=spoTotalPages-1} onClick={()=>setSpoPage(spoPage+1)} style={{padding:"1px 6px",fontSize:9,opacity:spoPage>=spoTotalPages-1?.3:1}}>→</button>

      {/* CC Rationale Modal */}

        a.click();URL.revokeObjectURL(a.href);

// Stake History Tab — DRep stake distribution over time
// ════════════════════════════════════════════════════════════════

// Entity merge rules: group DReps that belong to same entity
const ENTITY_MERGES = {
  "Yoroi + EMURGO": d => d.name && (d.name.includes("Yoroi") || d.name === "EMURGO")
};

// Filter out auto-mechanism DReps and inactive from history snapshots
function sanitizeHistory(history) {
  return history.map(s => {
    const filtered = (s.top || []).filter(d =>
      d.id !== "drep_always_abstain" && Number(d.amount) > 0
    );
    const hadAbstain = (s.top || []).find(d => d.id === "drep_always_abstain");
    const totalRaw = Number(s.total_stake);
    const abstainAmt = hadAbstain ? Number(hadAbstain.amount) : 0;
    const inactiveAmt = (s.top || []).filter(d => d.id !== "drep_always_abstain" && Number(d.amount) <= 0)
      .reduce((sum, d) => sum + Number(d.amount), 0);
    return {
      ...s,
      top: filtered,
      total_stake: String(totalRaw - abstainAmt - inactiveAmt),
      drep_count: filtered.length
    };
  });
}

function StakeHistoryTab({ history: rawHistory, liveDreps, T, lang, govInfo }) {
  // Merge: sanitize stored history + append live DRep snapshot if newer
  const history = React.useMemo(() => {
    const base = sanitizeHistory(rawHistory);
    if (!liveDreps || liveDreps.length === 0) return base;
    // Build live snapshot from current dreps data
    const active = liveDreps.filter(d => d.drep_id !== "drep_always_abstain" && Number(d.amount) > 0);
    if (active.length === 0) return base;
    const top50 = active.slice(0, 50).map(d => ({
      id: d.drep_id, name: d.name, amount: d.amount, delegators: d.delegators
    }));
    const totalStake = active.reduce((s, d) => s + Number(d.amount), 0);
    const currentEpoch = currentEpochNow();
    // Only add if we don't already have this epoch
    const lastEpoch = base.length > 0 ? base[base.length - 1].epoch : 0;
    if (currentEpoch > lastEpoch) {
      base.push({
        epoch: currentEpoch, timestamp: Date.now(),
        total_stake: String(totalStake), drep_count: active.length,
        top: top50, live: true
      });
    }
    return base;
  }, [rawHistory, liveDreps]);
  const [topN, setTopN] = useHashState("h_topN",10);
  const [chartMode, setChartMode] = useHashState("h_mode","ada"); // "ada" | "pct"
  const [mergeEntities, setMergeEntities] = useHashState("h_merge",false);
  const [projEpochs, setProjEpochs] = useHashState("h_proj",36); // default: 36 epochs ≈ 6 months forecast
  const [projWindow, setProjWindow] = useHashState("h_projW",5); // how many recent epochs to use for trend
  const [displayRange, setDisplayRange] = useHashState("h_range","all"); // "1m" | "3m" | "6m" | "1y" | "2y" | "all"
  const stackedRef = React.useRef(null);
  const stackedCanvasRef = React.useRef(null);
  const concRef = React.useRef(null);
  const concCanvasRef = React.useRef(null);

  const COLORS = [
    "#3b82f6","#f87171","#34d399","#fbbf24","#a78bfa",
    "#fb923c","#38bdf8","#f472b6","#4ade80","#e879f9",
    "#facc15","#2dd4bf","#818cf8","#fb7185","#22d3ee",
    "#a3e635","#c084fc","#f97316","#67e8f9","#d946ef"
  ];

  // Filter history by display range
  const rangedHistory = React.useMemo(() => {
    if (displayRange === "all" || history.length === 0) return history;
    const rangeMs = { "1m": 30, "3m": 90, "6m": 180, "1y": 365, "2y": 730 };
    const days = rangeMs[displayRange] || Infinity;
    const cutoff = Date.now() - days * 86400000;
    const filtered = history.filter(s => {
      const ts = s.timestamp || epochToTimestamp(s.epoch) * 1000;
      return ts >= cutoff;
    });
    return filtered.length > 0 ? filtered : history.slice(-1); // at least 1 point
  }, [history, displayRange]);

  // Process history: optionally merge entities
  const processedHistory = React.useMemo(() => {
    if (!mergeEntities) return rangedHistory;
    return rangedHistory.map(s => {
      const top = [...(s.top || [])];
      // For each merge rule, combine matching DReps
      Object.entries(ENTITY_MERGES).forEach(([name, matchFn]) => {
        const matching = top.filter(matchFn);
        if (matching.length <= 1) return;
        const mergedAmount = matching.reduce((sum, d) => sum + Number(d.amount), 0);
        const mergedDelegators = matching.reduce((sum, d) => sum + (d.delegators || 0), 0);
        const ids = matching.map(d => d.id);
        // Remove all matching
        for (let i = top.length - 1; i >= 0; i--) {
          if (ids.includes(top[i].id)) top.splice(i, 1);
        }
        // Add merged entry
        top.push({ id: "merged__" + name, name, amount: String(mergedAmount), delegators: mergedDelegators });
      });
      top.sort((a, b) => Number(b.amount) - Number(a.amount));
      return { ...s, top };
    });
  }, [rangedHistory, mergeEntities]);

  // Identify top N DReps by latest snapshot — sorted by stake descending
  const topDreps = React.useMemo(() => {
    if (processedHistory.length === 0) return [];
    const latest = processedHistory[processedHistory.length - 1];
    return (latest.top || []).slice(0, topN).map((d, i) => ({
      id: d.id, name: d.name || d.id.slice(0, 16) + "…", color: COLORS[i % COLORS.length]
    }));
  }, [processedHistory, topN]);

  // Simple trend projection: average per-epoch change over recent 'window' points, extended forward
  function simpleProject(ys, window, offset) {
    const w = Math.min(window, ys.length);
    const recent = ys.slice(-w);
    const n = recent.length;
    if (n < 2) return recent[n - 1] || 0;
    const avgChange = (recent[n - 1] - recent[0]) / (n - 1);
    return recent[n - 1] + avgChange * offset;
  }

  const labels = React.useMemo(() => {
    const base = processedHistory.map(s => {
      const ts = s.timestamp || epochToTimestamp(s.epoch) * 1000;
      const d = new Date(ts);
      return `E${s.epoch} (${d.getMonth() + 1}/${d.getDate()})`;
    });
    if (projEpochs > 0 && processedHistory.length > 0) {
      const lastEpoch = processedHistory[processedHistory.length - 1].epoch;
      for (let j = 1; j <= projEpochs; j++) {
        const fe = lastEpoch + j * 2;
        const ts = epochToTimestamp(fe) * 1000;
        const d = new Date(ts);
        base.push(`E${fe} (${d.getMonth() + 1}/${d.getDate()}) ⟶`);
      }
    }
    return base;
  }, [processedHistory, projEpochs]);

  // Stacked area chart — ADA or %, reversed order so largest on top
  React.useEffect(() => {
    if (!stackedCanvasRef.current || processedHistory.length === 0 || topDreps.length === 0 || typeof Chart === "undefined") return;
    if (stackedRef.current) stackedRef.current.destroy();

    const isPct = chartMode === "pct";
    const nHist = processedHistory.length;
    const nProj = projEpochs;

    // Always compute projections in ADA first, then convert to % if needed
    const reversedDreps = [...topDreps].reverse();

    // Step 1: Build ADA series + ADA projections for each DRep
    const adaSeries = {}; // drep.id → [ada values including proj]
    reversedDreps.forEach(drep => {
      const adaHist = processedHistory.map(s => {
        const found = (s.top || []).find(d => d.id === drep.id);
        return found ? Math.round(Number(found.amount) / 1e6) : 0;
      });
      const proj = [];
      if (nProj > 0) { for (let j = 1; j <= nProj; j++) proj.push(Math.max(0, Math.round(simpleProject(adaHist, projWindow, j)))); }
      adaSeries[drep.id] = [...adaHist, ...proj];
    });

    // Others ADA series
    const othersAdaHist = processedHistory.map(s => {
      const topSum = topDreps.reduce((sum, drep) => {
        const found = (s.top || []).find(d => d.id === drep.id);
        return sum + (found ? Number(found.amount) : 0);
      }, 0);
      return Math.round((Number(s.total_stake) - topSum) / 1e6);
    });
    const othersProj = [];
    if (nProj > 0) { for (let j = 1; j <= nProj; j++) othersProj.push(Math.max(0, Math.round(simpleProject(othersAdaHist, projWindow, j)))); }
    const othersAda = [...othersAdaHist, ...othersProj];

    // Step 2: If % mode, compute totals per point then convert
    const toDisplay = (adaArr, allAdaArrays) => {
      if (!isPct) return adaArr;
      return adaArr.map((v, i) => {
        const total = allAdaArrays.reduce((s, a) => s + (a[i] || 0), 0);
        return total > 0 ? (v / total * 100) : 0;
      });
    };
    const allArrays = [...reversedDreps.map(d => adaSeries[d.id]), othersAda];

    const datasets = reversedDreps.map((drep) => ({
      label: drep.name,
      data: toDisplay(adaSeries[drep.id], allArrays),
      backgroundColor: drep.color + "cc", borderColor: drep.color,
      borderWidth: 1, fill: true, tension: 0.3, pointRadius: 0,
      segment: nProj > 0 ? { borderDash: ctx => ctx.p0DataIndex >= nHist - 1 ? [4, 4] : undefined } : undefined
    }));

    // Others goes first (bottom of stack) since we reversed the order
    datasets.unshift({
      label: lang === "ja" ? "その他" : "Others",
      data: toDisplay(othersAda, allArrays),
      backgroundColor: "rgba(75,85,99,0.5)", borderColor: "#4b5563",
      borderWidth: 1, fill: true, tension: 0.3, pointRadius: 0,
      segment: nProj > 0 ? { borderDash: ctx => ctx.p0DataIndex >= nHist - 1 ? [4, 4] : undefined } : undefined
    });

    // Projection boundary annotation
    const projLine = nProj > 0 ? [{
      type: "line", xMin: nHist - 0.5, xMax: nHist - 0.5,
      borderColor: "rgba(255,255,255,0.3)", borderWidth: 2, borderDash: [6, 4],
      label: { display: true, content: lang === "ja" ? "予測→" : "Projection→",
        position: "start", color: "#8692ab", font: { size: 10 } }
    }] : [];

    stackedRef.current = new Chart(stackedCanvasRef.current, {
      type: "line",
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { labels: { color: "#e8ecf4", font: { size: 10 }, boxWidth: 12, padding: 8 }, position: "bottom", maxHeight: 80,
            // Reverse legend order so largest is first
            reverse: true },
          title: { display: true, text: isPct
            ? (lang === "ja" ? "DRepステーク割合推移 (%)" : "DRep Stake Share Over Time (%)")
            : (lang === "ja" ? "DRepステーク推移 (ADA)" : "DRep Stake Over Time (ADA)")
              + (nProj > 0 ? (lang === "ja" ? " + 予測" : " + Projection") : ""),
            color: "#e8ecf4", font: { size: 14 } },
          tooltip: {
            callbacks: {
              label: ctx => {
                const v = ctx.parsed.y;
                const isProj = ctx.dataIndex >= nHist;
                const prefix = isProj ? "📈 " : "";
                return isPct
                  ? `${prefix}${ctx.dataset.label}: ${v.toFixed(2)}%`
                  : `${prefix}${ctx.dataset.label}: ${v >= 1e9 ? (v / 1e9).toFixed(2) + "B" : v >= 1e6 ? (v / 1e6).toFixed(2) + "M" : v >= 1e3 ? (v / 1e3).toFixed(0) + "K" : v} ADA`;
              }
            }
          },
          annotation: projLine.length > 0 ? { annotations: { projLine: projLine[0] } } : undefined
        },
        scales: {
          x: { ticks: { color: "#8692ab", maxRotation: 45, font: { size: 10 } }, grid: { color: "#262f42" } },
          y: {
            stacked: true,
            ticks: { color: "#8692ab", callback: v => isPct ? v.toFixed(0) + "%" : (v >= 1e9 ? (v / 1e9).toFixed(1) + "B" : v >= 1e6 ? (v / 1e6).toFixed(0) + "M" : v) },
            grid: { color: "#262f42" },
            title: { display: true, text: isPct ? "%" : "ADA", color: "#8692ab" },
            max: isPct ? 100 : undefined
          }
        }
      }
    });
    return () => { if (stackedRef.current) stackedRef.current.destroy(); };
  }, [processedHistory, topDreps, chartMode, projEpochs, projWindow, lang, labels]);

  // Concentration chart (top 1/3/5/10 share %)
  React.useEffect(() => {
    if (!concCanvasRef.current || processedHistory.length === 0 || typeof Chart === "undefined") return;
    if (concRef.current) concRef.current.destroy();
    const nHist = processedHistory.length;

    const makeShareData = (n) => {
      // Project in ADA, then convert to %
      const adaTopHist = processedHistory.map(s =>
        Math.round((s.top || []).slice(0, n).reduce((sum, d) => sum + Number(d.amount), 0) / 1e6)
      );
      const adaTotalHist = processedHistory.map(s => Math.round(Number(s.total_stake) / 1e6));
      let adaTop = [...adaTopHist], adaTotal = [...adaTotalHist];
      if (projEpochs > 0) {
        for (let j = 1; j <= projEpochs; j++) {
          adaTop.push(Math.max(0, Math.round(simpleProject(adaTopHist, projWindow, j))));
          adaTotal.push(Math.max(1, Math.round(simpleProject(adaTotalHist, projWindow, j))));
        }
      }
      return adaTop.map((v, i) => adaTotal[i] > 0 ? (v / adaTotal[i] * 100) : 0);
    };

    concRef.current = new Chart(concCanvasRef.current, {
      type: "line",
      data: {
        labels,
        datasets: [
          { label: "Top 1", data: makeShareData(1), borderColor: "#f87171", borderWidth: 2, fill: false, tension: 0.3, pointRadius: 3,
            segment: projEpochs > 0 ? { borderDash: ctx => ctx.p0DataIndex >= nHist - 1 ? [4, 4] : undefined } : undefined },
          { label: "Top 3", data: makeShareData(3), borderColor: "#fbbf24", borderWidth: 2, fill: false, tension: 0.3, pointRadius: 3,
            segment: projEpochs > 0 ? { borderDash: ctx => ctx.p0DataIndex >= nHist - 1 ? [4, 4] : undefined } : undefined },
          { label: "Top 5", data: makeShareData(5), borderColor: "#3b82f6", borderWidth: 2, fill: false, tension: 0.3, pointRadius: 3,
            segment: projEpochs > 0 ? { borderDash: ctx => ctx.p0DataIndex >= nHist - 1 ? [4, 4] : undefined } : undefined },
          { label: "Top 10", data: makeShareData(10), borderColor: "#34d399", borderWidth: 2, fill: false, tension: 0.3, pointRadius: 3,
            segment: projEpochs > 0 ? { borderDash: ctx => ctx.p0DataIndex >= nHist - 1 ? [4, 4] : undefined } : undefined },
          { label: "Top 20", data: makeShareData(20), borderColor: "#a78bfa", borderWidth: 2, fill: false, tension: 0.3, pointRadius: 3,
            segment: projEpochs > 0 ? { borderDash: ctx => ctx.p0DataIndex >= nHist - 1 ? [4, 4] : undefined } : undefined },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: "#e8ecf4", font: { size: 11 } }, position: "bottom" },
          title: { display: true,
            text: (lang === "ja" ? "ステーク集中度（上位N DRepの占有率 %）" : "Stake Concentration (Top N DRep Share %)")
              + (projEpochs > 0 ? (lang === "ja" ? " + 予測" : " + Projection") : ""),
            color: "#e8ecf4", font: { size: 14 } },
          tooltip: { callbacks: { label: ctx => {
            const isProj = ctx.dataIndex >= nHist;
            return `${isProj ? "📈 " : ""}${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}%`;
          } } }
        },
        scales: {
          x: { ticks: { color: "#8692ab", maxRotation: 45, font: { size: 10 } }, grid: { color: "#262f42" } },
          y: { min: 0, max: 100, ticks: { color: "#8692ab", callback: v => v + "%" }, grid: { color: "#262f42" },
            title: { display: true, text: lang === "ja" ? "占有率 (%)" : "Share (%)", color: "#8692ab" } }
        }
      }
    });
    return () => { if (concRef.current) concRef.current.destroy(); };
  }, [processedHistory, projEpochs, projWindow, lang, labels]);

  if (history.length === 0) {
    return (<div style={{ padding: 32, textAlign: "center", color: "var(--text2)" }}>
      <p style={{ fontSize: 16, marginBottom: 8 }}>{T.hist_no_data}</p>
    </div>);
  }

  const fmtDate = (ts) => {
    const d = new Date(ts);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  };

  // Distribution table
  const latest = processedHistory[processedHistory.length - 1];
  const first = processedHistory[0];
  const totalLatest = Number(latest.total_stake);
  const totalFirst = Number(first.total_stake);
  const distRows = (latest.top || []).slice(0, Math.max(topN, 20)).map((d, i) => {
    const pctNow = totalLatest > 0 ? Number(d.amount) / totalLatest * 100 : 0;
    const prev = (first.top || []).find(fd => fd.id === d.id);
    const pctPrev = prev && totalFirst > 0 ? Number(prev.amount) / totalFirst * 100 : null;
    const adaChange = prev ? (Number(d.amount) - Number(prev.amount)) / 1e6 : null;
    const pctChange = pctPrev !== null ? pctNow - pctPrev : null;
    return { rank: i + 1, name: d.name || d.id.slice(0, 16) + "…", id: d.id, amount: d.amount,
      pctNow, pctPrev, adaChange, pctChange, delegators: d.delegators };
  });

  // INPUT_STYLE used directly below
  const btnStyle = (active) => ({ fontSize: 11, padding: "4px 12px", borderRadius: 6, border: "1px solid " + (active ? "var(--accent)" : "var(--border)"),
    background: active ? "var(--accent)" : "var(--bg3)", color: active ? "#fff" : "var(--text2)", cursor: "pointer", fontWeight: active ? 600 : 400 });
  const toggleStyle = (active) => ({ fontSize: 11, padding: "4px 10px", borderRadius: 6,
    border: "1px solid " + (active ? "#fbbf24" : "var(--border)"),
    background: active ? "rgba(251,191,36,0.15)" : "var(--bg3)",
    color: active ? "#fbbf24" : "var(--text2)", cursor: "pointer" });

  return (
    <React.Fragment>
    <div>
      {/* Header */}
      <div className="card" style={{ padding: "16px 20px", marginBottom: 12 }}>
        <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>{T.hist_title}</h2>
        <p style={{ color: "var(--text2)", fontSize: 13, margin: 0 }}>
          {T.hist_desc} ({history.length} {T.hist_snapshots}: E{history[0].epoch}–E{history[history.length - 1].epoch})
          {history[history.length - 1].live && <span style={{ marginLeft: 8, padding: "1px 8px", borderRadius: 4, fontSize: 10, fontWeight: 700, background: "rgba(52,211,153,0.15)", color: "var(--yes)", border: "1px solid rgba(52,211,153,0.3)" }}>LIVE</span>}
        </p>
      </div>

      {/* Controls */}
      <div className="card" style={{ padding: "12px 20px", marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center" }}>
        {/* Display range */}
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <label style={{ fontSize: 11, color: "var(--text2)" }}>{lang === "ja" ? "期間:" : "Range:"}</label>
          {[["1m", "1M"], ["3m", "3M"], ["6m", "6M"], ["1y", "1Y"], ["2y", "2Y"], ["all", lang === "ja" ? "全期間" : "All"]].map(([val, lbl]) =>
            <button key={val} onClick={() => setDisplayRange(val)} style={btnStyle(displayRange === val)}>{lbl}</button>
          )}
        </div>
        <div style={{ width: 1, height: 24, background: "var(--border)" }}></div>
        {/* ADA / % toggle */}
        <div style={{ display: "flex", gap: 4 }}>
          <button onClick={() => setChartMode("ada")} style={btnStyle(chartMode === "ada")}>ADA</button>
          <button onClick={() => setChartMode("pct")} style={btnStyle(chartMode === "pct")}>%</button>
        </div>
        <div style={{ width: 1, height: 24, background: "var(--border)" }}></div>
        {/* Top N */}
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <label style={{ fontSize: 11, color: "var(--text2)" }}>Top N:</label>
          <select value={topN} onChange={e => setTopN(Number(e.target.value))} style={{ ...ist, width: 55, padding: "3px 6px" }}>
            {[5, 10, 15, 20].map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </div>
        <div style={{ width: 1, height: 24, background: "var(--border)" }}></div>
        {/* Merge toggle */}
        <button onClick={() => setMergeEntities(!mergeEntities)} style={toggleStyle(mergeEntities)}>
          {mergeEntities ? "✓ " : ""}{lang === "ja" ? "Yoroi+EMURGO 統合" : "Merge Yoroi+EMURGO"}
        </button>
        <div style={{ width: 1, height: 24, background: "var(--border)" }}></div>
        {/* Projection slider */}
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <label style={{ fontSize: 11, color: "var(--text2)" }}>{lang === "ja" ? "予測:" : "Forecast:"}</label>
          <input type="range" min={0} max={220} step={1} value={projEpochs}
            onChange={e => setProjEpochs(Number(e.target.value))}
            style={{ width: 120, accentColor: "var(--accent)" }} />
          <span style={{ fontSize: 11, color: projEpochs > 0 ? "var(--accent2)" : "var(--text2)", minWidth: 70 }}>
            {projEpochs > 0 ? (() => { const days = Math.round(projEpochs * 5); return days >= 365 ? `+${(days/365).toFixed(1)}${lang==="ja"?"年":"y"}` : days >= 30 ? `+${Math.round(days/30)}${lang==="ja"?"ヶ月":"mo"}` : `+${days}${lang==="ja"?"日":"d"}`; })() + ` (${projEpochs}ep)` : "OFF"}
          </span>
        </div>
        {/* Projection window (trend basis) — only show when projection is on */}
        {projEpochs > 0 && <>
          <div style={{ width: 1, height: 24, background: "var(--border)" }}></div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <label style={{ fontSize: 11, color: "var(--text2)" }}>{lang === "ja" ? "基準:" : "Basis:"}</label>
            <select value={projWindow} onChange={e => setProjWindow(Number(e.target.value))} style={{ ...ist, width: 75, padding: "3px 6px" }}>
              <option value={3}>{lang === "ja" ? "直近3" : "Last 3"}</option>
              <option value={5}>{lang === "ja" ? "直近5" : "Last 5"}</option>
              <option value={10}>{lang === "ja" ? "直近10" : "Last 10"}</option>
              <option value={999}>{lang === "ja" ? "全期間" : "All"}</option>
            </select>
            <span style={{ fontSize: 10, color: "var(--text2)" }}>ep</span>
          </div>
        </>}
      </div>

      {/* Stacked Area Chart */}
      <div className="card" style={{ padding: "16px 20px", marginBottom: 12 }}>
        <div style={{ height: 420, position: "relative" }}>
          <canvas ref={stackedCanvasRef}></canvas>
        </div>
      </div>

      {/* Concentration Chart */}
      <div className="card" style={{ padding: "16px 20px", marginBottom: 12 }}>
        <div style={{ height: 300, position: "relative" }}>
          <canvas ref={concCanvasRef}></canvas>
        </div>
      </div>

      {/* Distribution Table */}
      <div className="card" style={{ padding: "16px 20px" }}>
        <h3 style={{ fontSize: 15, fontWeight: 600, marginBottom: 4 }}>
          {lang === "ja" ? `ステーク分布（最新 E${latest.epoch} vs 初回 E${first.epoch}）` : `Stake Distribution (Latest E${latest.epoch} vs First E${first.epoch})`}
        </h3>
        <p style={{ fontSize: 11, color: "var(--text2)", marginBottom: 10 }}>
          {lang === "ja" ? `総ステーク: ${fmtAda(latest.total_stake)} ADA / DRep数: ${latest.drep_count}` : `Total: ${fmtAda(latest.total_stake)} ADA / DReps: ${latest.drep_count}`}
          {mergeEntities && <span style={{ marginLeft: 8, color: "#fbbf24" }}>({lang === "ja" ? "エンティティ統合表示" : "Entities merged"})</span>}
        </p>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead>
              <tr style={{ borderBottom: "2px solid var(--border)" }}>
                <th style={{ textAlign: "center", padding: "6px 6px", color: "var(--text2)", width: 30 }}>#</th>
                <th style={{ textAlign: "left", padding: "6px 8px", color: "var(--text2)" }}>{lang === "ja" ? "DRep名" : "DRep"}</th>
                <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text2)" }}>{lang === "ja" ? "ステーク(ADA)" : "Stake (ADA)"}</th>
                <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text2)" }}>{lang === "ja" ? "割合" : "Share"}</th>
                <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text2)" }}>{lang === "ja" ? "変化(ADA)" : "Δ ADA"}</th>
                <th style={{ textAlign: "right", padding: "6px 8px", color: "var(--text2)" }}>{lang === "ja" ? "割合変化" : "Δ Share"}</th>
                <th style={{ textAlign: "left", padding: "6px 8px", color: "var(--text2)", minWidth: 120 }}></th>
              </tr>
            </thead>
            <tbody>
              {distRows.map((r, i) => {
                const changeColor = r.adaChange > 0 ? "var(--yes)" : r.adaChange < 0 ? "var(--no)" : "var(--text2)";
                const pctChangeColor = r.pctChange > 0 ? "var(--yes)" : r.pctChange < 0 ? "var(--no)" : "var(--text2)";
                const isMerged = r.id.startsWith("merged__");
                return (
                  <tr key={r.id} style={{ borderBottom: "1px solid var(--border)", background: i % 2 === 0 ? "transparent" : "var(--bg2)" }}>
                    <td style={{ textAlign: "center", padding: "5px 6px", color: "var(--text2)", fontSize: 11 }}>{r.rank}</td>
                    <td style={{ padding: "5px 8px" }}>
                      <div style={{ fontWeight: 500, fontSize: 12 }}>
                        {isMerged && <span style={{ color: "#fbbf24", marginRight: 4, fontSize: 10 }}>⊕</span>}
                        {r.name}
                      </div>
                      {!isMerged && <div style={{ fontSize: 9, color: "var(--text2)", fontFamily: "monospace" }}>{r.id.slice(0, 24)}…</div>}
                    </td>
                    <td style={{ textAlign: "right", padding: "5px 8px", fontFamily: "monospace", fontSize: 12 }}>{fmtAda(r.amount)}</td>
                    <td style={{ textAlign: "right", padding: "5px 8px", fontWeight: 600, color: "var(--accent2)" }}>{r.pctNow.toFixed(2)}%</td>
                    <td style={{ textAlign: "right", padding: "5px 8px", fontFamily: "monospace", fontSize: 11, color: changeColor }}>
                      {r.adaChange !== null ? (r.adaChange >= 0 ? "+" : "") + (Math.abs(r.adaChange) >= 1e6 ? (r.adaChange / 1e6).toFixed(1) + "M" : Math.abs(r.adaChange) >= 1e3 ? (r.adaChange / 1e3).toFixed(0) + "K" : r.adaChange.toFixed(0)) : "—"}
                    </td>
                    <td style={{ textAlign: "right", padding: "5px 8px", fontSize: 11, color: pctChangeColor }}>
                      {r.pctChange !== null ? (r.pctChange >= 0 ? "+" : "") + r.pctChange.toFixed(2) + "pp" : "—"}
                    </td>
                    <td style={{ padding: "5px 8px" }}>
                      <div style={{ background: "var(--bg4)", borderRadius: 3, height: 14, overflow: "hidden", position: "relative" }}>
                        <div style={{ width: Math.min(r.pctNow * 2, 100) + "%", height: "100%", borderRadius: 3,
                          background: i < 3 ? "var(--accent)" : i < 10 ? "var(--accent2)" : "var(--text2)", opacity: 0.7 }}></div>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    {govInfo && govInfo.protocolParams && React.createElement(VetoPowerSection, {dreps: liveDreps, pp: govInfo.protocolParams, T})}
  </React.Fragment>
  );
}

// Collapsible section header (shared)
const SectionHeader = ({title, show, setShow, color, extra}) => (
  <div onClick={()=>setShow(!show)} style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",
    padding:"8px 12px",background:color||"var(--bg3)",borderRadius:show?"8px 8px 0 0":"8px",
    border:"1px solid var(--border)",borderBottom:show?"none":"1px solid var(--border)"}}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:11,transition:"transform .2s",transform:show?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
      <span style={{fontSize:13,fontWeight:700}}>{title}</span>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      {extra}
    </div>
  </div>
);


// Simulator Tab — Single table with 3 reward columns side by side
// ════════════════════════════════════════════════════════════════
function SimulatorTab({ dreps: rawDreps, voteData, totalActions, periodVoteData, computePeriodVoteData, setPeriodVoteData, loadingVotes, progress, ccMembers, ccVotes, proposals, T }) {
  const dreps = React.useMemo(()=>rawDreps.filter(d=>d.drep_id!=="drep_always_abstain"&&d.drep_id!=="drep_always_no_confidence"),[rawDreps]);
  // ── Common parameters ──
  const todayStr = new Date().toISOString().slice(0, 10);
  const [govBudget, setGovBudget] = useHashState("s_budget",500000);
  const [distPerYear, setDistPerYear] = useHashState("s_dist",2);
  const [drepRatio, setDrepRatio] = useHashState("s_ratio",60);
  const [periodFrom, setPeriodFrom] = useHashState("s_from",epochToDateStr(CC_MIN_EPOCH));
  const [periodTo, setPeriodTo] = useHashState("s_to",todayStr);
  const perDist = distPerYear > 0 ? Math.round(govBudget / distPerYear) : govBudget;
  const drepBudget = Math.round(perDist * drepRatio / 100);
  const ccBudgetTotal = Math.round(perDist * (100 - drepRatio) / 100);
  const drepAnnual = Math.round(govBudget * drepRatio / 100);
  const ccAnnual = Math.round(govBudget * (100 - drepRatio) / 100);
  const adaPrice = useAdaPrice();

  // ── Collapsible panels ──
  const [showCommon, setShowCommon] = useHashState("s_showC",true);
  const [showDrep, setShowDrep] = useHashState("s_showD",true);
  const [showCC, setShowCC] = useHashState("s_showCC",true);

  // ── DRep parameters ──
  const [K, setK] = useHashState("s_K",5);
  const [N, setN] = useHashState("s_N",100);
  const [b2, setB2] = useHashState("s_b2",1000);
  const [b2Pct, setB2Pct] = useHashState("s_b2p",30);
  const [b2Mode, setB2Mode] = useHashState("s_b2m","ada");
  const b2Eff = b2Mode === "pct" ? (N > 0 ? Math.round(drepBudget * b2Pct / 100 / N) : 0) : b2;
  const [votePenaltyOn, setVotePenaltyOn] = useHashState("s_penalty",true);
  const [rationaleWeight, setRationaleWeight] = useHashState("s_ratW",0);
  const [searchQ, setSearchQ] = useHashState("s_q","");
  const [page, setPage] = useHashState("s_p",0);
  const perPage = 100;
  const b1 = Math.max(0, drepBudget - b2Eff);

  // ── CC parameters ──
  const ccMemberCount = ccMembers.length || 1;
  const ccPerMember = ccMemberCount > 0 ? Math.round(ccBudgetTotal / ccMemberCount) : 0;
  const [penaltyThreshold, setPenaltyThreshold] = useHashState("s_ccPen",3);

  React.useEffect(() => {
    if (computePeriodVoteData && periodFrom && periodTo && !loadingVotes) {
      const pvd = computePeriodVoteData(periodFrom, periodTo);
      setPeriodVoteData(pvd);
    }
  }, [periodFrom, periodTo, loadingVotes]);

  const gasInRange = React.useMemo(() => {
    if (!periodVoteData) return 0;
    const first = Object.values(periodVoteData)[0];
    return first ? first.actionsInPeriod : 0;
  }, [periodVoteData]);

  const params = React.useMemo(() => ({
    K, N, totalBudget: drepBudget, b1, b2: b2Eff, votePeriod: votePenaltyOn ? 1 : 0, votePenaltyOn, rationaleWeight: rationaleWeight / 100
  }), [K, N, drepBudget, b1, b2Eff, votePenaltyOn, rationaleWeight]);

  const allResults = React.useMemo(() => calcAllMechanisms(dreps, params, voteData, totalActions, periodVoteData),
    [dreps, params, voteData, totalActions, periodVoteData]);
  const totalEligible = dreps.filter(d => Number(d.amount) > 0).length;

  const MECHS = [
    { id:"mo_equal", l:T.mech_equal, d:T.desc_equal, c:"#14b8a6" },
    { id:"mo_prop", l:T.mech_prop, d:T.desc_prop, c:"#f59e0b" },
    { id:"mo_bonus", l:T.mech_bonus, d:T.desc_bonus, c:"#a78bfa" },
  ];

  const merged = React.useMemo(() => {
    const eq = allResults.mo_equal, pr = allResults.mo_prop, bo = allResults.mo_bonus;
    return eq.map((d, i) => ({
      ...d,
      r_equal: d.reward,
      r_prop: pr[i]?.reward || 0,
      r_bonus: bo[i]?.reward || 0,
      periodVR: periodVoteData && periodVoteData[d.drep_id]
        ? (periodVoteData[d.drep_id].actionsInPeriod > 0 ? periodVoteData[d.drep_id].votesInPeriod / periodVoteData[d.drep_id].actionsInPeriod * 100 : 0) : null,
      periodRR: periodVoteData && periodVoteData[d.drep_id] && periodVoteData[d.drep_id].votesInPeriod > 0
        ? periodVoteData[d.drep_id].rationalesInPeriod / periodVoteData[d.drep_id].votesInPeriod * 100 : null,
    }));
  }, [allResults, periodVoteData]);

  const filtered = React.useMemo(() => {
    if (!searchQ) return merged;
    const q = searchQ.toLowerCase();
    return merged.filter(d => {const sn=safeName(d.name)||""; return sn.toLowerCase().includes(q) || d.drep_id.toLowerCase().includes(q);});
  }, [merged, searchQ]);
  const pageData = filtered.slice(page * perPage, (page + 1) * perPage);
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));

  function exportDrepCSV() {
    const hdr = ["Rank","DRep ID","Name","Stake (ADA)","Eligible","Equal (ADA)","Prop (ADA)","Prop+Bonus (ADA)","Period Vote Rate %","Rationale Rate %","Vote Count","Overall Vote Rate %"];
    const rows = merged.map(d => [d.rank, d.drep_id, safeName(d.name) || "", Math.round(Number(d.amount) / 1e6),
      d.eligible ? "Yes" : "No", d.r_equal.toFixed(2), d.r_prop.toFixed(2), d.r_bonus.toFixed(2),
      d.periodVR != null ? d.periodVR.toFixed(1) : "",
      d.periodRR != null ? d.periodRR.toFixed(1) : "",
      voteData[d.drep_id] || "", totalActions > 0 ? ((voteData[d.drep_id] || 0) / totalActions * 100).toFixed(1) : ""]);
    downloadCSV(buildCSV(hdr, rows), "drep_rewards_comparison.csv");
  }

  // ── CC Simulator logic ──
  const ccProposals = React.useMemo(()=>{
    const ids=new Set();
    Object.keys(ccVotes).forEach(k=>{const pid=k.split("__")[1]; if(pid) ids.add(pid);});
    return proposals.filter(p=>ids.has(p.proposal_id));
  },[ccVotes,proposals]);

  const currentEpoch = React.useMemo(()=> Math.floor((Date.now() - EPOCH_208_TS) / EPOCH_DURATION) + 208, []);

  const simEpFrom = periodFrom ? dateToEpoch(periodFrom) : 0;
  const simEpTo = periodTo ? dateToEpoch(periodTo) : 99999;
  const ccSimEpFrom = Math.max(simEpFrom, CC_MIN_EPOCH);

  const simProps = React.useMemo(()=>{
    return ccProposals.filter(p=>{
      const ep = Number(p.epoch_no);
      const expiry = Number(p.expiration || p.epoch_no);
      return ep >= ccSimEpFrom && ep <= simEpTo && expiry <= currentEpoch;
    });
  },[ccProposals,ccSimEpFrom,simEpTo,currentEpoch]);

  const ccFMembers = React.useMemo(()=>
    [...ccMembers].sort((a,b)=>b.vote_count - a.vote_count)
  ,[ccMembers]);

  const simData = React.useMemo(()=>{
    return ccFMembers.map(cc=>{
      const memberMin = ccMemberMinEpoch(cc.cc_id);
      const memberProps = simProps.filter(p=>Number(p.epoch_no) >= memberMin);
      const totalEligible = memberProps.length;
      const voted = memberProps.filter(p=>ccVotes[`${cc.cc_id}__${p.proposal_id}`]).length;
      const missed = totalEligible - voted;
      const factor = Math.max(0, 1 - missed/penaltyThreshold);
      const reward = ccPerMember * factor;
      return {cc, eligible:totalEligible, voted, missed, factor, reward};
    });
  },[ccFMembers,simProps,ccVotes,ccPerMember,penaltyThreshold]);

  const ccMaxBudget = ccFMembers.length * ccPerMember;
  const ccActualBudget = simData.reduce((s,d) => s + d.reward, 0);

  const tdS = (bg) => ({background:bg, padding:"2px 4px", borderBottom:"1px solid var(--border)", fontSize:9, textAlign:"right"});

  return (
    <div>
      {/* ═══ Budget Overview ═══ */}
      <div style={{marginBottom:12}}>
        <SectionHeader title={T.sim_common_title} show={showCommon} setShow={setShowCommon}
          color="rgba(59,130,246,.08)"
          extra={<span style={{fontSize:10,color:"var(--text2)",fontWeight:400}}>
            ₳{govBudget.toLocaleString()}/yr · ×{distPerYear} · DRep {drepRatio}% / CC {100-drepRatio}%
          </span>} />
        {showCommon && (
          <div style={{border:"1px solid var(--border)",borderTop:"none",borderRadius:"0 0 8px 8px",padding:14,background:"var(--bg2)"}}>
            {/* 3 inputs in a row */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:14}}>
              <SliderParam label={T.sim_gov_budget} value={govBudget} onChange={setGovBudget} min={50000} max={5000000} step={10000} suffix=" ADA" />
              <SliderParam label={T.sim_dist_per_year} value={distPerYear} onChange={v=>setDistPerYear(Math.max(1,v))} min={1} max={12} step={1} suffix="x" />
              <SliderParam label={T.sim_drep_cc_ratio} value={drepRatio} onChange={setDrepRatio} min={50} max={100} step={1} suffix="%" />
            </div>
            {/* Summary table */}
            <div style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden",marginBottom:14}}>
              <table style={{borderCollapse:"collapse",width:"100%"}}>
                <thead><tr style={{background:"var(--bg3)"}}>
                  <th style={{padding:"6px 10px",fontSize:9,fontWeight:700,color:"var(--text2)",textAlign:"left",borderBottom:"2px solid var(--border)"}}>{T.sim_pool}</th>
                  {[T.sim_annual,T.sim_per_distribution,T.sim_per_member].map((h,i)=>(
                    <th key={i} colSpan={2} style={{padding:"6px 10px",fontSize:9,fontWeight:700,color:"var(--text2)",textAlign:"center",borderBottom:"2px solid var(--border)"}}>{h}</th>
                  ))}
                </tr>
                <tr style={{background:"var(--bg3)"}}>
                  <th style={{padding:"3px 10px",fontSize:8,color:"var(--text2)",textAlign:"left",borderBottom:"1px solid var(--border)"}}></th>
                  {["ADA","USD","ADA","USD","ADA","USD"].map((h,i)=>(
                    <th key={i} style={{padding:"3px 6px",fontSize:8,fontWeight:600,color:"var(--text2)",textAlign:"right",borderBottom:"1px solid var(--border)"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  <tr style={{background:"var(--bg2)"}}>
                    <td style={{padding:"8px 10px",fontSize:11,fontWeight:700,color:"#3b82f6",borderBottom:"1px solid var(--border)"}}>DRep ({drepRatio}%)</td>
                    <td style={{padding:"8px 6px",fontSize:12,fontWeight:700,textAlign:"right",color:"#3b82f6",borderBottom:"1px solid var(--border)"}}>₳{drepAnnual.toLocaleString()}</td>
                    <td style={{padding:"8px 6px",fontSize:10,textAlign:"right",color:"var(--text2)",borderBottom:"1px solid var(--border)"}}>{fmtFiat(drepAnnual,adaPrice.usd,"$")}</td>
                    <td style={{padding:"8px 6px",fontSize:12,fontWeight:700,textAlign:"right",color:"#3b82f6",borderBottom:"1px solid var(--border)"}}>₳{drepBudget.toLocaleString()}</td>
                    <td style={{padding:"8px 6px",fontSize:10,textAlign:"right",color:"var(--text2)",borderBottom:"1px solid var(--border)"}}>{fmtFiat(drepBudget,adaPrice.usd,"$")}</td>
                    <td colSpan={2} style={{padding:"8px 6px",fontSize:10,textAlign:"center",color:"var(--text2)",borderBottom:"1px solid var(--border)"}}>—</td>
                  </tr>
                  <tr style={{background:"rgba(255,255,255,.01)"}}>
                    <td style={{padding:"8px 10px",fontSize:11,fontWeight:700,color:"#f59e0b",borderBottom:"1px solid var(--border)"}}>CC ({100-drepRatio}%)</td>
                    <td style={{padding:"8px 6px",fontSize:12,fontWeight:700,textAlign:"right",color:"#f59e0b",borderBottom:"1px solid var(--border)"}}>₳{ccAnnual.toLocaleString()}</td>
                    <td style={{padding:"8px 6px",fontSize:10,textAlign:"right",color:"var(--text2)",borderBottom:"1px solid var(--border)"}}>{fmtFiat(ccAnnual,adaPrice.usd,"$")}</td>
                    <td style={{padding:"8px 6px",fontSize:12,fontWeight:700,textAlign:"right",color:"#f59e0b",borderBottom:"1px solid var(--border)"}}>₳{ccBudgetTotal.toLocaleString()}</td>
                    <td style={{padding:"8px 6px",fontSize:10,textAlign:"right",color:"var(--text2)",borderBottom:"1px solid var(--border)"}}>{fmtFiat(ccBudgetTotal,adaPrice.usd,"$")}</td>
                    <td style={{padding:"8px 6px",fontSize:12,fontWeight:700,textAlign:"right",color:"#f59e0b",borderBottom:"1px solid var(--border)"}}>₳{ccPerMember.toLocaleString()}</td>
                    <td style={{padding:"8px 6px",fontSize:10,textAlign:"right",color:"var(--text2)",borderBottom:"1px solid var(--border)"}}>{fmtFiat(ccPerMember,adaPrice.usd,"$")}</td>
                  </tr>
                </tbody>
              </table>
              <div style={{padding:"4px 10px",background:"var(--bg3)",fontSize:8,color:"var(--text2)"}}>
                CC: {ccMemberCount} members · 1 ADA ≈ {adaPrice.usd > 0 ? "$"+adaPrice.usd.toFixed(3) : "—"}
              </div>
            </div>
            {/* Period */}
            <div style={{display:"flex",gap:12,alignItems:"end"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"var(--text2)",fontWeight:600,marginBottom:4}}>{T.sim_period}</div>
                <div style={{display:"flex",gap:6}}>
                  <div style={{flex:1}}>
                    <label style={{fontSize:9,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:2}}>{T.vote_start}</label>
                    <input type="date" value={periodFrom} min={epochToDateStr(CC_MIN_EPOCH)}
                      onChange={e=>setPeriodFrom(e.target.value)}
                      style={{width:"100%",padding:"4px 6px",borderRadius:4,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:10,outline:"none"}} />
                  </div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:9,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:2}}>{T.vote_end}</label>
                    <input type="date" value={periodTo}
                      onChange={e=>setPeriodTo(e.target.value)}
                      style={{width:"100%",padding:"4px 6px",borderRadius:4,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:10,outline:"none"}} />
                  </div>
                </div>
              </div>
              <div style={{fontSize:8,color:"var(--text2)",paddingBottom:2}}>
                Epoch {simEpFrom}〜{simEpTo} · CC: ep.{ccSimEpFrom}〜{simEpTo}
              </div>
            </div>
          </div>
        )}
      </div>

      {loadingVotes && <span style={{fontSize:9,color:"var(--accent2)"}}>⏳ {progress}</span>}

      {/* ═══ Simulation Parameters (DRep + CC) ═══ */}
      <div className="card" style={{marginBottom:12}}>
        <h3 style={{fontSize:12,fontWeight:700,marginBottom:8}}>{T.params}</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {/* ── DRep params ── */}
          <div style={{background:"rgba(59,130,246,.04)",border:"1px solid rgba(59,130,246,.12)",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#3b82f6",marginBottom:8}}>DRep</div>
            {/* Common to all 3 mechanisms */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:8}}>
              <SliderParam label={T.mo_k} value={K} onChange={setK} min={0} max={100} step={5} />
              <SliderParam label={T.mo_n} value={N} onChange={setN} min={10} max={500} step={10} />
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:10,color:"var(--text2)",fontWeight:600}}>{T.vote_penalty}</span>
                  <div style={{display:"flex",gap:2,border:"1px solid var(--border)",borderRadius:5,overflow:"hidden"}}>
                    <button onClick={()=>setVotePenaltyOn(true)}
                      style={{padding:"2px 7px",fontSize:9,fontWeight:600,border:"none",cursor:"pointer",
                        background:votePenaltyOn?"var(--accent)":"var(--bg3)",color:votePenaltyOn?"#fff":"var(--text2)"}}>{T.vote_penalty_on}</button>
                    <button onClick={()=>setVotePenaltyOn(false)}
                      style={{padding:"2px 7px",fontSize:9,fontWeight:600,border:"none",cursor:"pointer",
                        background:!votePenaltyOn?"var(--accent)":"var(--bg3)",color:!votePenaltyOn?"#fff":"var(--text2)"}}>{T.vote_penalty_off}</button>
                  </div>
                </div>
                {votePenaltyOn && (
                  <div style={{fontSize:8,color:gasInRange>0?"var(--yes)":"var(--no)"}}>{T.vote_ga_count}: {gasInRange} — {T.vote_info}</div>
                )}
              </div>
              <SliderParam label={T.rationale_adj} value={rationaleWeight} onChange={setRationaleWeight} min={0} max={100} step={5} suffix="%" />
            </div>
            {/* Prop+Bonus only — compact */}
            <div style={{borderTop:"1px solid rgba(59,130,246,.12)",paddingTop:6,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:9,fontWeight:700,color:"#a78bfa",background:"rgba(167,139,250,.1)",padding:"1px 6px",borderRadius:4}}>{T.mech_bonus}</span>
              <span style={{fontSize:9,color:"var(--text2)"}}>{T.budget_b2}</span>
              <div style={{display:"flex",gap:2,border:"1px solid var(--border)",borderRadius:4,overflow:"hidden"}}>
                <button onClick={()=>setB2Mode("ada")}
                  style={{padding:"1px 6px",fontSize:8,fontWeight:600,border:"none",cursor:"pointer",
                    background:b2Mode==="ada"?"var(--accent)":"var(--bg3)",color:b2Mode==="ada"?"#fff":"var(--text2)"}}>{T.budget_b2_mode_ada}</button>
                <button onClick={()=>setB2Mode("pct")}
                  style={{padding:"1px 6px",fontSize:8,fontWeight:600,border:"none",cursor:"pointer",
                    background:b2Mode==="pct"?"var(--accent)":"var(--bg3)",color:b2Mode==="pct"?"#fff":"var(--text2)"}}>{T.budget_b2_mode_pct}</button>
              </div>
              {b2Mode === "ada" ? (
                <React.Fragment>
                  <input type="number" value={b2} onChange={e=>setB2(Math.min(Number(e.target.value),drepBudget))} min={0} max={Math.round(drepBudget/N)} step={100}
                    style={{width:80,textAlign:"right",padding:"2px 6px",borderRadius:4,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:10}} />
                  <span style={{fontSize:8,color:"var(--text2)"}}>ADA</span>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <input type="number" value={b2Pct} onChange={e=>setB2Pct(Math.min(Number(e.target.value),80))} min={0} max={80} step={5}
                    style={{width:50,textAlign:"right",padding:"2px 6px",borderRadius:4,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:10}} />
                  <span style={{fontSize:8,color:"var(--text2)"}}>%</span>
                </React.Fragment>
              )}
              <span style={{fontSize:8,color:"var(--text2)",marginLeft:"auto"}}>
                Prop ₳{Math.max(0, drepBudget - b2Eff * N).toLocaleString()} + Bonus ₳{b2Eff.toLocaleString()}/人×{N}
                {drepBudget > 0 ? ` (${Math.round(b2Eff*N/drepBudget*100)}%)` : ""}
              </span>
            </div>
          </div>
          {/* ── CC params ── */}
          <div style={{background:"rgba(245,158,11,.04)",border:"1px solid rgba(245,158,11,.12)",borderRadius:8,padding:"8px 12px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:10,fontWeight:700,color:"#f59e0b"}}>CC</span>
            <span style={{fontSize:9,color:"var(--text2)",fontWeight:600}}>{T.cc_sim_penalty_label}:</span>
            {[3,5,10].map(n=>(
              <button key={n} onClick={()=>setPenaltyThreshold(n)}
                style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,cursor:"pointer",
                  border:penaltyThreshold===n?"2px solid var(--accent)":"1px solid var(--border)",
                  background:penaltyThreshold===n?"rgba(59,130,246,.15)":"var(--bg)",
                  color:penaltyThreshold===n?"var(--accent)":"var(--text2)"}}>{n} {T.cc_sim_penalty_unit}</button>
            ))}
            <span style={{fontSize:8,color:"var(--text2)",marginLeft:"auto"}}>
              ₳{ccPerMember.toLocaleString()}/{T.sim_per_member}
              {adaPrice.usd>0?` (${fmtFiat(ccPerMember,adaPrice.usd,"$")})`:""} · {ccFMembers.length} members · {simProps.length} GAs
            </span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,flexWrap:"wrap"}}>
          {loadingVotes && <span style={{fontSize:9,color:"var(--accent2)"}}>⏳ {progress}</span>}
          {!loadingVotes && progress && <span style={{fontSize:8,color:"var(--text2)"}}>{progress}</span>}
          <button className="btn" onClick={()=>{ localStorage.removeItem(SIM_CACHE_KEY); window.location.reload(); }}
            style={{fontSize:8,padding:"2px 6px",opacity:0.6,marginLeft:"auto"}}>{T.clear_cache}</button>
        </div>
      </div>

      {/* ═══ DRep Reward Simulator ═══ */}
      <div style={{marginBottom:12}}>
        <SectionHeader title={T.sim_drep_section} show={showDrep} setShow={setShowDrep}
          color="rgba(59,130,246,.05)"
          extra={<span style={{fontSize:10,color:"#3b82f6",fontWeight:600}}>₳{drepBudget.toLocaleString()}</span>} />
        {showDrep && (
          <div style={{border:"1px solid var(--border)",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"6px 8px",background:"var(--bg2)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4,gap:6}}>
              <input type="text" placeholder={T.search} value={searchQ} onChange={e => { setSearchQ(e.target.value); setPage(0); }}
                style={{padding:"3px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:10,width:160,outline:"none"}} />
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <span style={{fontSize:9,color:"var(--text2)"}}>{filtered.length} DReps</span>
                <button className="btn" onClick={exportDrepCSV} style={{fontSize:8,padding:"2px 6px"}}>📥 CSV</button>
              </div>
            </div>

            <div style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden",background:"var(--bg2)"}}>
              <div style={{overflow:"auto",maxHeight:"calc(100vh - 340px)"}}>
                <table style={{borderCollapse:"separate",borderSpacing:0,width:"100%"}}>
                  <thead><tr>
                    {[{t:T.rank,a:"right",w:28},{t:"",a:"left",w:18},{t:T.name,a:"left"},{t:T.stake,a:"right"}].map((h,i)=>(
                      <th key={i} style={{position:"sticky",top:0,background:"var(--bg3)",padding:"3px 4px",textAlign:h.a,
                        borderBottom:"2px solid var(--border)",fontSize:8,fontWeight:700,color:"var(--text2)",whiteSpace:"nowrap",width:h.w||"auto"}}>{h.t}</th>
                    ))}
                    <th style={{position:"sticky",top:0,background:"var(--bg3)",padding:"3px 4px",textAlign:"center",
                      borderBottom:"2px solid var(--border)",fontSize:8,fontWeight:700,color:"var(--text2)"}}>Elig.</th>
                    {MECHS.map(m=>(
                      <th key={m.id} style={{position:"sticky",top:0,background:m.c+"15",padding:"3px 4px",textAlign:"right",
                        borderBottom:`2px solid ${m.c}40`,fontSize:8,fontWeight:700,color:m.c,whiteSpace:"nowrap",minWidth:65}}>
                        {m.l}</th>
                    ))}
                    <th style={{position:"sticky",top:0,background:"var(--bg3)",padding:"3px 4px",textAlign:"right",
                      borderBottom:"2px solid var(--border)",fontSize:8,fontWeight:700,color:"var(--text2)",whiteSpace:"nowrap"}}>{T.vote_rate}</th>
                    {rationaleWeight>0 && <th style={{position:"sticky",top:0,background:"var(--bg3)",padding:"3px 4px",textAlign:"right",
                      borderBottom:"2px solid var(--border)",fontSize:8,fontWeight:700,color:"var(--text2)",whiteSpace:"nowrap"}}>{T.rationale_rate}</th>}
                  </tr></thead>
                  <tbody>
                    {pageData.map((d, ri) => {
                      const bg = ri % 2 === 0 ? "var(--bg2)" : "rgba(255,255,255,.01)";
                      const pvr = d.periodVR;
                      return (
                        <tr key={d.drep_id} style={{opacity:d.eligible?1:0.35}}>
                          <td style={{...tdS(bg),color:"var(--text2)",width:28,fontSize:8}}>{d.rank}</td>
                          <td style={{background:bg,padding:"1px 1px",borderBottom:"1px solid var(--border)",width:18}}><Avatar name={safeName(d.name)||d.drep_id} url={d.image_url} size={14}/></td>
                          <td style={{background:bg,padding:"2px 4px",borderBottom:"1px solid var(--border)",fontSize:9,fontWeight:600,maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            {safeName(d.name) || shortId(d.drep_id)}</td>
                          <td style={tdS(bg)}>₳{fmtAda(d.amount)}</td>
                          <td style={{...tdS(bg),textAlign:"center"}}>
                            {d.eligible ? <span style={{color:"var(--yes)"}}>✓</span> : <span style={{color:"var(--text2)"}}>−</span>}</td>
                          <td style={{...tdS(bg),fontWeight:600,color:d.r_equal>0?"#14b8a6":"var(--text2)",background:bg}}>
                            {d.r_equal>0?"₳"+fmtAdaNum(d.r_equal):"−"}</td>
                          <td style={{...tdS(bg),fontWeight:600,color:d.r_prop>0?"#f59e0b":"var(--text2)",background:bg}}>
