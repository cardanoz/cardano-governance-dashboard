// ════════════════════════════════════════════════════════════════
// Blockfrost API Layer with Caching + Rate Limiting
// ════════════════════════════════════════════════════════════════
const BLOCKFROST_URL = "https://cardano-mainnet.blockfrost.io/api/v0";
const BF_KEY_LS = "blockfrost_api_key";
const BF_PAGE_SIZE = 100;

function getBfKey() { return localStorage.getItem(BF_KEY_LS) || ""; }
function setBfKey(k) { localStorage.setItem(BF_KEY_LS, k); }

// --- In-memory cache ---
const _cache = new Map();
const CACHE_TTL = 10 * 60 * 1000; // 10 min
let _apiCalls = 0, _cacheHits = 0;

// --- Persistent cache (localStorage) for simulator vote data ---
const SIM_CACHE_KEY = "cardano_drep_sim_cache_v4";
const SIM_CACHE_TTL = 60 * 60 * 1000; // 1 hour

function saveSimCache(data) {
  try {
    const payload = { ts: Date.now(), ...data };
    localStorage.setItem(SIM_CACHE_KEY, JSON.stringify(payload));
  } catch(e) { console.warn("SimCache save failed:", e); }
}

function loadSimCache() {
  try {
    const raw = localStorage.getItem(SIM_CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > SIM_CACHE_TTL) { localStorage.removeItem(SIM_CACHE_KEY); return null; }
    return parsed;
  } catch(e) { localStorage.removeItem(SIM_CACHE_KEY); return null; }
}

function timedFetch(url, opts={}, ms=30000) {
  const c = new AbortController();
  const t = setTimeout(() => c.abort(), ms);
  return fetch(url, {...opts, signal:c.signal}).finally(() => clearTimeout(t));
}

// --- Throttle: min 100ms between calls (10 req/sec for Blockfrost) ---
let _lastFetch = 0;
async function bfFetchJSON(path) {
  const url = `${BLOCKFROST_URL}${path}`;
  const cached = _cache.get(url);
  if (cached && Date.now() - cached.ts < CACHE_TTL) { _cacheHits++; return cached.data; }
  const key = getBfKey();
  if (!key) throw new Error("Blockfrost API key not set");
  const now = Date.now();
  const wait = Math.max(0, 100 - (now - _lastFetch));
  if (wait > 0) await new Promise(r => setTimeout(r, wait));
  _lastFetch = Date.now();
  _apiCalls++;
  const r = await timedFetch(url, { headers: { "Accept": "application/json", "project_id": key } });
  if (r.status === 404) { _cache.set(url, { data: null, ts: Date.now() }); return null; }
  if (r.status === 402) throw new Error("Blockfrost: Usage limit reached");
  if (r.status === 403) throw new Error("Blockfrost: Invalid API key");
  if (r.status === 418) throw new Error("Blockfrost: IP has been auto-banned");
  if (r.status === 429) { await new Promise(r => setTimeout(r, 1000)); return bfFetchJSON(path); } // retry once
  if (!r.ok) throw new Error(`Blockfrost HTTP ${r.status}`);
  const data = await r.json();
  _cache.set(url, { data, ts: Date.now() });
  return data;
}

// Fetch all pages of a paginated Blockfrost endpoint
async function bfFetchAllPages(path, maxPages = 20) {
  const results = [];
  for (let page = 1; page <= maxPages; page++) {
    const sep = path.includes("?") ? "&" : "?";
    const data = await bfFetchJSON(`${path}${sep}page=${page}&count=${BF_PAGE_SIZE}`);
    if (!data || !Array.isArray(data) || data.length === 0) break;
    results.push(...data);
    if (data.length < BF_PAGE_SIZE) break;
  }
  return results;
}

function getApiStats() { return { calls: _apiCalls, cached: _cacheHits }; }
function resetApiStats() { _apiCalls = 0; _cacheHits = 0; }

// ════════════════════════════════════════════════════════════════
function fmtAda(lovelace) {
  if(!lovelace) return "0";
  const a = Number(lovelace)/1e6;
  if(a>=1e9) return (a/1e9).toFixed(2)+"B";
  if(a>=1e6) return (a/1e6).toFixed(2)+"M";
  if(a>=1e3) return (a/1e3).toFixed(1)+"K";
  return a.toFixed(0);
}
function fmtAdaNum(ada) {
  if(ada>=1e9) return (ada/1e9).toFixed(2)+"B";
  if(ada>=1e6) return (ada/1e6).toFixed(2)+"M";
  if(ada>=1e3) return (ada/1e3).toFixed(1)+"K";
  return ada.toFixed(ada < 1 ? 4 : 1);
}
function shortId(id,n=8,m=5) { return !id ? "" : id.length<=n+m+3 ? id : id.slice(0,n)+"…"+id.slice(-m); }
function safeName(v) { return typeof v === "string" ? v : (v && typeof v === "object" ? (v["@value"] || v.givenName || JSON.stringify(v)) : null); }
function normalizeType(t) {
  const map = {
    // Blockfrost lowercase types
    "treasury_withdrawals":"TreasuryWithdrawals","hard_fork_initiation":"HardForkInitiation",
    "parameter_change":"ParameterChange","no_confidence":"NoConfidence",
    "update_committee":"UpdateCommittee","new_constitution":"NewConstitution",
    "info_action":"InfoAction",
    // Legacy uppercase types (demo data / backward compat)
    "HARD_FORK_INITIATION":"HardForkInitiation","TREASURY_WITHDRAWALS":"TreasuryWithdrawals",
    "PARAMETER_CHANGE":"ParameterChange","PROTOCOL_PARAMETER_CHANGE":"ParameterChange",
    "NO_CONFIDENCE":"NoConfidence","UPDATE_COMMITTEE":"UpdateCommittee",
    "NEW_CONSTITUTION":"NewConstitution","INFO_ACTION":"InfoAction","INFO":"InfoAction","INFORMATION":"InfoAction",
  };
  return map[t] || map[t?.toLowerCase()] || t || "";
}
// Epoch → Unix timestamp (Shelley era: epoch 208 started at 1596059091)
function epochToTimestamp(epoch) {
  return 1596059091 + (epoch - 208) * 432000;
}
function calcGini(values) {
  const n = values.length; if (n === 0) return 0;
  const sorted = [...values].sort((a,b) => a - b);
  const sum = sorted.reduce((a,b) => a + b, 0); if (sum === 0) return 0;
  let cumSum = 0, giniSum = 0;
  sorted.forEach(v => { cumSum += v; giniSum += cumSum; });
  return (2 * giniSum) / (n * sum) - (n + 1) / n;
}

const ACTION_COLORS = {
  ParameterChange:"#8b5cf6", HardForkInitiation:"#ef4444", TreasuryWithdrawals:"#f59e0b",
  NoConfidence:"#dc2626", UpdateCommittee:"#06b6d4", NewConstitution:"#10b981", InfoAction:"#6366f1"
};
function actionColor(t){ return ACTION_COLORS[t] || "#6b7280"; }
function actionLabel(t, T) {
  const m = { ParameterChange:"type_param", HardForkInitiation:"type_hardfork", TreasuryWithdrawals:"type_treasury",
    NoConfidence:"type_noconf", UpdateCommittee:"type_cc", NewConstitution:"type_const", InfoAction:"type_info" };
  return T[m[t]] || t || "?";
}

// ════════════════════════════════════════════════════════════════
// Blockfrost API Functions
// ════════════════════════════════════════════════════════════════
const DREP_CHUNK = 100, VOTE_BATCH = 5;

// Fetch a page of DRep IDs, then batch-fetch their details + metadata
async function fetchDrepPage(page, addLog, setStage) {
  const ids = await bfFetchJSON(`/governance/dreps?page=${page}&count=${BF_PAGE_SIZE}`);
  if (!ids || !Array.isArray(ids) || ids.length === 0) return { dreps: [], reachedEnd: true };
  const result = [];
  for (let i = 0; i < ids.length; i += VOTE_BATCH) {
    const batch = ids.slice(i, i + VOTE_BATCH);
    if (setStage) setStage(`DReps: ${result.length + batch.length}/${ids.length} (page ${page})`);
    const results = await Promise.allSettled(batch.map(async d => {
      const detail = await bfFetchJSON(`/governance/dreps/${d.drep_id}`);
      if (!detail || detail.retired || detail.expired) return null;
      let name = null, image_url = null;
      try {
        const meta = await bfFetchJSON(`/governance/dreps/${d.drep_id}/metadata`);
        if (meta && meta.json_metadata) {
          const body = meta.json_metadata.body || meta.json_metadata;
          name = body?.givenName || body?.name || null;
          image_url = body?.image?.contentUrl || null;
        }
      } catch(e) {}
      return { drep_id: d.drep_id, name, amount: detail.amount || "0", image_url, delegators: 0 };
    }));
    results.forEach(r => { if (r.status === "fulfilled" && r.value) result.push(r.value); });
  }
  return { dreps: result, reachedEnd: ids.length < BF_PAGE_SIZE };
}

// Fetch multiple pages of DReps
async function fetchDrepRange(startPage, numPages, addLog, setStage) {
  const result = []; let reachedEnd = false;
  for (let p = startPage; p < startPage + numPages; p++) {
    const { dreps: chunk, reachedEnd: ended } = await fetchDrepPage(p, addLog, setStage);
    result.push(...chunk);
    if (ended) { reachedEnd = true; break; }
  }
  result.sort((a, b) => Number(b.amount) - Number(a.amount));
  return { dreps: result, nextPage: reachedEnd ? -1 : startPage + numPages, reachedEnd };
}

// Fetch ALL DReps (for simulator) — details only, skip metadata for speed
async function fetchAllDreps(onProgress) {
  const allIds = await bfFetchAllPages("/governance/dreps", 20);
  if (onProgress) onProgress(0, allIds.length);
  const allDreps = [];
  for (let i = 0; i < allIds.length; i += VOTE_BATCH) {
    const batch = allIds.slice(i, i + VOTE_BATCH);
    const results = await Promise.allSettled(batch.map(async d => {
      const detail = await bfFetchJSON(`/governance/dreps/${d.drep_id}`);
      if (!detail || detail.retired || detail.expired) return null;
      // Try to get name from metadata (best effort)
      let name = null;
      try {
        const meta = await bfFetchJSON(`/governance/dreps/${d.drep_id}/metadata`);
        if (meta && meta.json_metadata) {
          const body = meta.json_metadata.body || meta.json_metadata;
          name = body?.givenName || body?.name || null;
        }
      } catch(e) {}
      return { drep_id: d.drep_id, name, amount: detail.amount || "0", image_url: null, delegators: 0 };
    }));
    results.forEach(r => { if (r.status === "fulfilled" && r.value) allDreps.push(r.value); });
    if (onProgress) onProgress(allDreps.length, allIds.length);
  }
  allDreps.sort((a, b) => Number(b.amount) - Number(a.amount));
  return allDreps;
}

// Fetch all votes for a single DRep from Blockfrost
async function fetchAllVotesForDrep(drepId) {
  return await bfFetchAllPages(`/governance/dreps/${drepId}/votes`, 10) || [];
}

// Process a Blockfrost vote record into the vote map
function processVoteRecord(v, drepId, vm, rm, gaMap) {
  const propTxHash = v.proposal_tx_hash || "";
  const propCertIdx = v.proposal_cert_index != null ? v.proposal_cert_index : -1;
  if (!propTxHash) return false;
  const propKey = `${propTxHash}#${propCertIdx}`;
  if (!gaMap[propKey]) {
    gaMap[propKey] = {
      proposal_id: propKey, proposal_type: "", epoch_no: 0,
      title: "", tx_hash: propTxHash, cert_index: propCertIdx, expiration: 0
    };
  }
  let voteVal = (v.vote || "").toLowerCase();
  if (voteVal === "yes") voteVal = "Yes";
  else if (voteVal === "no") voteVal = "No";
  else if (voteVal === "abstain") voteVal = "Abstain";
  else return false;
  const k = `${drepId}__${propKey}`;
  vm[k] = voteVal;
  // Blockfrost vote records don't include rationale directly
  return true;
}

// Fetch votes for a list of DReps
async function fetchVotesForDreps(drepList, addLog, setStage, stageLabel) {
  const vm = {}, rm = {}, gaMap = {}; let totalVotes = 0;
  for (let batch = 0; batch < drepList.length; batch += VOTE_BATCH) {
    const batchDreps = drepList.slice(batch, batch + VOTE_BATCH);
    if (setStage) setStage(`${stageLabel} (${Math.min(batch + VOTE_BATCH, drepList.length)}/${drepList.length})`);
    await Promise.allSettled(batchDreps.map(async (d) => {
      try {
        const votes = await fetchAllVotesForDrep(d.drep_id);
        votes.forEach(v => { if (processVoteRecord(v, d.drep_id, vm, rm, gaMap)) totalVotes++; });
      } catch(e) { /* skip */ }
    }));
  }
  return { vm, rm, gaMap, totalVotes };
}

// Enrich proposals with details (type, expiration) and metadata (title) from Blockfrost
async function enrichProposals(gaMap, addLog, setStage) {
  const proposals = Object.values(gaMap);
  const toFetch = proposals.filter(p => !p.proposal_type && p.tx_hash);
  for (let i = 0; i < toFetch.length; i += VOTE_BATCH) {
    const batch = toFetch.slice(i, i + VOTE_BATCH);
    if (setStage) setStage(`Proposals: ${Math.min(i + VOTE_BATCH, toFetch.length)}/${toFetch.length}`);
    await Promise.allSettled(batch.map(async p => {
      try {
        const detail = await bfFetchJSON(`/governance/proposals/${p.tx_hash}/${p.cert_index}`);
        if (detail) {
          p.proposal_type = normalizeType(detail.governance_type || "");
          p.expiration = detail.expiration || 0;
          p.epoch_no = detail.expiration || 0;
        }
      } catch(e) {}
      try {
        const meta = await bfFetchJSON(`/governance/proposals/${p.tx_hash}/${p.cert_index}/metadata`);
        if (meta && meta.json_metadata) {
          const body = meta.json_metadata.body || meta.json_metadata;
          let title = body?.title || "";
          if (typeof title === "object") title = JSON.stringify(title);
          p.title = title;
        }
      } catch(e) {}
    }));
  }
}

// Reward Calculation Models (3 mechanisms, computed simultaneously)
// ════════════════════════════════════════════════════════════════
function calcAllMechanisms(dreps, params, voteData, totalActions, periodVoteData) {
  const n = dreps.length;
  if (n === 0) return { mo_equal:[], mo_prop:[], mo_bonus:[] };
  const budget = params.totalBudget;

  function tagEligible() {
    let paidCount = 0;
    return dreps.map((d, i) => {
      const excluded = i < params.K;
      const inBand = !excluded && Number(d.amount) > 0 && paidCount < params.N;
      if (inBand) paidCount++;
      return { ...d, rank: i + 1, eligible: inBand };
    });
  }

  function applyPeriodVotePenalty(tagged, rewards) {
    if (!params.votePenaltyOn || !periodVoteData) return rewards;
    return rewards.map((r, i) => {
      if (r === 0) return 0;
      const pd = periodVoteData[tagged[i].drep_id];
      if (!pd || pd.actionsInPeriod === 0) return 0;
      const voteRate = pd.votesInPeriod / pd.actionsInPeriod;
      return r * voteRate;
    });
  }

  function adjustAndNormalize(tagged, rewards) {
    let adj = applyPeriodVotePenalty(tagged, rewards);
    const total = adj.reduce((a, b) => a + b, 0);
    if (total > 0) adj = adj.map(r => r * budget / total);
    return tagged.map((d, i) => ({ ...d, reward: adj[i] }));
  }

  function calcEqual() {
    const tagged = tagEligible();
    const weights = tagged.map(d => d.eligible ? 1 : 0);
    const sumW = weights.reduce((a, b) => a + b, 0);
    const base = tagged.map((d, i) => sumW > 0 && d.eligible ? budget * (weights[i] / sumW) : 0);
    return adjustAndNormalize(tagged, base);
  }

  function calcProp() {
    const tagged = tagEligible();
    const weights = tagged.map(d => d.eligible ? Number(d.amount) : 0);
    const sumW = weights.reduce((a, b) => a + b, 0);
    const base = tagged.map((d, i) => sumW > 0 && d.eligible ? budget * (weights[i] / sumW) : 0);
    return adjustAndNormalize(tagged, base);
  }

  function calcBonus() {
    const tagged = tagEligible();
    const eligibleList = tagged.filter(d => d.eligible);
    if (eligibleList.length === 0) return tagged.map(d => ({ ...d, reward: 0 }));
    const eligibleStake = eligibleList.reduce((s, d) => s + Number(d.amount), 0);
    const totalBonusPool = params.b2 * eligibleList.length;
    const baseBudget = budget - totalBonusPool;
    const base = tagged.map(d => {
      if (!d.eligible) return 0;
      const propPart = eligibleStake > 0 && baseBudget > 0 ? baseBudget * (Number(d.amount) / eligibleStake) : 0;
      return propPart + params.b2;
    });
    return adjustAndNormalize(tagged, base);
  }

  return { mo_equal: calcEqual(), mo_prop: calcProp(), mo_bonus: calcBonus() };
}

function calcProcessMetrics(results, totalEligible) {
  const rewarded = results.filter(r => r.reward > 0);
  const eligibleCount = rewarded.length;
  const totalReward = rewarded.reduce((s, r) => s + r.reward, 0);
  const rewards = rewarded.map(r => r.reward);
  const P = totalEligible > 0 ? eligibleCount / totalEligible : 0;
  let C = 0;
  if (totalReward > 0 && eligibleCount > 1) {
    const hhi = rewarded.reduce((s, r) => s + Math.pow(r.reward / totalReward, 2), 0);
    C = (hhi - 1 / eligibleCount) / (1 - 1 / eligibleCount);
  }
  const rewardedStake = rewarded.reduce((s, r) => s + Number(r.amount), 0);
  let D = 0;
  if (rewardedStake > 0 && totalEligible > 0) {
    const stakeHHI = rewarded.reduce((s, r) => s + Math.pow(Number(r.amount) / rewardedStake, 2), 0);
    const effectiveN = stakeHHI > 0 ? 1 / stakeHHI : 0;
    D = effectiveN / totalEligible;
  }
  const gini = calcGini(rewards);
  const minR = rewards.length > 0 ? Math.min(...rewards) : 0;
  const maxR = rewards.length > 0 ? Math.max(...rewards) : 0;
  const avgR = rewards.length > 0 ? totalReward / rewards.length : 0;
  const medR = rewards.length > 0 ? [...rewards].sort((a, b) => a - b)[Math.floor(rewards.length / 2)] : 0;
  return { D, P, C, eligible: eligibleCount, gini, minR, maxR, avgR, medR, totalReward };
}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",
          borderTop:"1px solid var(--border)",background:"var(--bg3)",flexWrap:"wrap",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <PaginationBar label={T.subtitle_drep} page={dPage} setPage={handleDPageChange} total={hasMore?tDP+1:tDP}/>
            {hasMore && <button className="btn btn-primary" onClick={loadMoreDreps} disabled={pageLoading}
              style={{fontSize:10,padding:"3px 10px"}}>{pageLoading?"⏳":"⬇"} {T.load_more}</button>}
          </div>
          <PaginationBar label={T.subtitle_actions} page={pPage} setPage={setPPage} total={tPP}/>
        </div>
      </div>
    </div>
  );
}

// Simulator Tab — Single table with 3 reward columns side by side
// ════════════════════════════════════════════════════════════════
function SimulatorTab({ dreps, voteData, totalActions, periodVoteData, computePeriodVoteData, setPeriodVoteData, loadingVotes, progress, T }) {
  const [K, setK] = React.useState(5);
  const [N, setN] = React.useState(100);
  const [totalBudget, setTotalBudget] = React.useState(500000);
  const [b2, setB2] = React.useState(20000);
  const todayStr = new Date().toISOString().slice(0, 10);
  const sixMonthsAgo = new Date(Date.now() - 180 * 86400000).toISOString().slice(0, 10);
  const [voteStart, setVoteStart] = React.useState(sixMonthsAgo);
  const [voteEnd, setVoteEnd] = React.useState(todayStr);
  const [votePenaltyOn, setVotePenaltyOn] = React.useState(true);
  const [searchQ, setSearchQ] = React.useState("");
  const [page, setPage] = React.useState(0);
  const perPage = 50;
  const b1 = Math.max(0, totalBudget - b2);

  React.useEffect(() => {
    if (computePeriodVoteData && voteStart && voteEnd && !loadingVotes) {
      const pvd = computePeriodVoteData(voteStart, voteEnd);
      setPeriodVoteData(pvd);
    }
  }, [voteStart, voteEnd, loadingVotes]);

  const gasInRange = React.useMemo(() => {
    if (!periodVoteData) return 0;
    const first = Object.values(periodVoteData)[0];
    return first ? first.actionsInPeriod : 0;
  }, [periodVoteData]);

  const params = React.useMemo(() => ({
    K, N, totalBudget, b1, b2, votePeriod: votePenaltyOn ? 1 : 0, votePenaltyOn
  }), [K, N, totalBudget, b1, b2, votePenaltyOn]);

  const allResults = React.useMemo(() => calcAllMechanisms(dreps, params, voteData, totalActions, periodVoteData),
    [dreps, params, voteData, totalActions, periodVoteData]);
  const totalEligible = dreps.filter(d => Number(d.amount) > 0).length;
  const budget = totalBudget;

  const MECHS = [
    { id:"mo_equal", l:T.mech_equal, d:T.desc_equal, c:"#14b8a6" },
    { id:"mo_prop", l:T.mech_prop, d:T.desc_prop, c:"#f59e0b" },
    { id:"mo_bonus", l:T.mech_bonus, d:T.desc_bonus, c:"#a78bfa" },
  ];

  const merged = React.useMemo(() => {
    const eq = allResults.mo_equal, pr = allResults.mo_prop, bo = allResults.mo_bonus;
    return eq.map((d, i) => ({
      ...d,
      r_equal: d.reward,
      r_prop: pr[i]?.reward || 0,
      r_bonus: bo[i]?.reward || 0,
      periodVR: periodVoteData && periodVoteData[d.drep_id]
        ? (periodVoteData[d.drep_id].actionsInPeriod > 0 ? periodVoteData[d.drep_id].votesInPeriod / periodVoteData[d.drep_id].actionsInPeriod * 100 : 0) : null,
    }));
  }, [allResults, periodVoteData]);

  const filtered = React.useMemo(() => {
    if (!searchQ) return merged;
    const q = searchQ.toLowerCase();
    return merged.filter(d => {const sn=safeName(d.name)||""; return sn.toLowerCase().includes(q) || d.drep_id.toLowerCase().includes(q);});
  }, [merged, searchQ]);
  const pageData = filtered.slice(page * perPage, (page + 1) * perPage);
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));

  function exportCSV() {
    const hdr = ["Rank","DRep ID","Name","Stake (ADA)","Eligible","Equal (ADA)","Prop (ADA)","Prop+Bonus (ADA)","Period Vote Rate %","Vote Count","Overall Vote Rate %"];
    const rows = merged.map(d => [d.rank, d.drep_id, safeName(d.name) || "", Math.round(Number(d.amount) / 1e6),
      d.eligible ? "Yes" : "No", d.r_equal.toFixed(2), d.r_prop.toFixed(2), d.r_bonus.toFixed(2),
      d.periodVR != null ? d.periodVR.toFixed(1) : "",
      voteData[d.drep_id] || "", totalActions > 0 ? ((voteData[d.drep_id] || 0) / totalActions * 100).toFixed(1) : ""]);
    const csv = [hdr, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "drep_rewards_comparison.csv"; a.click(); URL.revokeObjectURL(url);
  }

  const tdS = (bg) => ({background:bg, padding:"4px 6px", borderBottom:"1px solid var(--border)", fontSize:10, textAlign:"right"});

  return (
    <div>
      <div style={{marginBottom:12}}>
        <div className="card">
          <h3 style={{fontSize:12,fontWeight:700,marginBottom:8}}>{T.params}</h3>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <div>
              <SliderParam label={T.mo_k} value={K} onChange={setK} min={0} max={100} step={5} />
              <SliderParam label={T.mo_n} value={N} onChange={setN} min={10} max={500} step={10} />
            </div>
            <div>
              <SliderParam label={T.mo_total} value={totalBudget} onChange={v => { setTotalBudget(v); if(b2>v) setB2(v); }} min={5000} max={500000} step={5000} suffix=" ADA" />
              <SliderParam label={T.budget_b2} value={b2} onChange={v => setB2(Math.min(v, totalBudget))} min={0} max={totalBudget} step={2500} suffix=" ADA" />
              <div style={{fontSize:9,color:"var(--text2)",marginTop:-6,marginBottom:4}}>Prop+Bonus: Base = ₳{Math.max(0, totalBudget - b2 * N).toLocaleString()} + ₳{b2.toLocaleString()}/人 × {N}人</div>
            </div>
            <div>
              <div style={{marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:11,color:"var(--text2)",fontWeight:600}}>{T.vote_penalty}</span>
                  <div style={{display:"flex",gap:2,border:"1px solid var(--border)",borderRadius:5,overflow:"hidden"}}>
                    <button onClick={()=>setVotePenaltyOn(true)}
                      style={{padding:"3px 8px",fontSize:9,fontWeight:600,border:"none",cursor:"pointer",
                        background:votePenaltyOn?"var(--accent)":"var(--bg3)",color:votePenaltyOn?"#fff":"var(--text2)"}}>{T.vote_penalty_on}</button>
                    <button onClick={()=>setVotePenaltyOn(false)}
                      style={{padding:"3px 8px",fontSize:9,fontWeight:600,border:"none",cursor:"pointer",
                        background:!votePenaltyOn?"var(--accent)":"var(--bg3)",color:!votePenaltyOn?"#fff":"var(--text2)"}}>{T.vote_penalty_off}</button>
                  </div>
                </div>
                {votePenaltyOn && (<div>
                  <div style={{display:"flex",gap:6,marginBottom:4}}>
                    <div style={{flex:1}}>
                      <label style={{fontSize:9,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:2}}>{T.vote_start}</label>
                      <input type="date" value={voteStart} onChange={e=>setVoteStart(e.target.value)}
                        style={{width:"100%",padding:"4px 6px",borderRadius:4,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:10,outline:"none"}} />
                    </div>
                    <div style={{flex:1}}>
                      <label style={{fontSize:9,color:"var(--text2)",fontWeight:600,display:"block",marginBottom:2}}>{T.vote_end}</label>
                      <input type="date" value={voteEnd} onChange={e=>setVoteEnd(e.target.value)}
                        style={{width:"100%",padding:"4px 6px",borderRadius:4,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:10,outline:"none"}} />
                    </div>
                  </div>
                  <div style={{fontSize:8,color:gasInRange>0?"var(--yes)":"var(--no)"}}>{T.vote_ga_count}: {gasInRange} — {T.vote_info}</div>
                </div>)}
              </div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:4,flexWrap:"wrap"}}>
            <span style={{fontSize:9,color:"var(--text2)"}}>
              Budget: ₳{budget.toLocaleString()} · DReps: {dreps.length} · Eligible: {totalEligible}
              {votePenaltyOn ? ` · ⏱ Vote penalty ON (${gasInRange} GAs)` : " · ⏱ Vote penalty OFF"}
            </span>
            {loadingVotes && <span style={{fontSize:9,color:"var(--accent2)"}}>⏳ {progress}</span>}
            {!loadingVotes && progress && <span style={{fontSize:8,color:"var(--text2)"}}>{progress}</span>}
            <button className="btn" onClick={()=>{ localStorage.removeItem(SIM_CACHE_KEY); window.location.reload(); }}
              style={{fontSize:8,padding:"2px 6px",opacity:0.6}}>{T.clear_cache}</button>
          </div>
        </div>
      </div>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:8}}>
        <input type="text" placeholder={T.search} value={searchQ} onChange={e => { setSearchQ(e.target.value); setPage(0); }}
          style={{padding:"5px 8px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:11,width:180,outline:"none"}} />
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:10,color:"var(--text2)"}}>{filtered.length} DReps</span>
          <button className="btn" onClick={exportCSV} style={{fontSize:9,padding:"4px 8px"}}>📥 CSV</button>
        </div>
      </div>

      <div style={{border:"1px solid var(--border)",borderRadius:10,overflow:"hidden",background:"var(--bg2)"}}>
        <div style={{overflow:"auto",maxHeight:"calc(100vh - 420px)"}}>
          <table style={{borderCollapse:"separate",borderSpacing:0,width:"100%"}}>
            <thead><tr>
              {[{t:T.rank,a:"right",w:32},{t:"",a:"left",w:22},{t:T.name,a:"left"},{t:T.stake,a:"right"}].map((h,i)=>(
                <th key={i} style={{position:"sticky",top:0,background:"var(--bg3)",padding:"5px 6px",textAlign:h.a,
                  borderBottom:"2px solid var(--border)",fontSize:9,fontWeight:700,color:"var(--text2)",whiteSpace:"nowrap",width:h.w||"auto"}}>{h.t}</th>
              ))}
              <th style={{position:"sticky",top:0,background:"var(--bg3)",padding:"5px 6px",textAlign:"center",
                borderBottom:"2px solid var(--border)",fontSize:9,fontWeight:700,color:"var(--text2)"}}>Elig.</th>
              {MECHS.map(m=>(
                <th key={m.id} style={{position:"sticky",top:0,background:m.c+"15",padding:"5px 6px",textAlign:"right",
                  borderBottom:`2px solid ${m.c}40`,fontSize:9,fontWeight:700,color:m.c,whiteSpace:"nowrap",minWidth:75}}>
                  {m.l}</th>
              ))}
              <th style={{position:"sticky",top:0,background:"var(--bg3)",padding:"5px 6px",textAlign:"right",
                borderBottom:"2px solid var(--border)",fontSize:9,fontWeight:700,color:"var(--text2)",whiteSpace:"nowrap"}}>{T.vote_rate}</th>
            </tr></thead>
            <tbody>
              {pageData.map((d, ri) => {
                const bg = ri % 2 === 0 ? "var(--bg2)" : "rgba(255,255,255,.01)";
                const pvr = d.periodVR;
                return (
                  <tr key={d.drep_id} style={{opacity:d.eligible?1:0.35}}>
                    <td style={{...tdS(bg),color:"var(--text2)",width:32,fontSize:9}}>{d.rank}</td>
                    <td style={{background:bg,padding:"3px 2px",borderBottom:"1px solid var(--border)",width:22}}><Avatar name={safeName(d.name)||d.drep_id} url={d.image_url} size={18}/></td>
                    <td style={{background:bg,padding:"4px 6px",borderBottom:"1px solid var(--border)",fontSize:10,fontWeight:600,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {safeName(d.name) || shortId(d.drep_id)}</td>
                    <td style={{...tdS(bg),fontSize:9}}>₳{fmtAda(d.amount)}</td>
                    <td style={{...tdS(bg),textAlign:"center",fontSize:9}}>
                      {d.eligible ? <span style={{color:"var(--yes)"}}>✓</span> : <span style={{color:"var(--text2)"}}>−</span>}</td>
                    <td style={{...tdS(bg),fontWeight:600,color:d.r_equal>0?"#14b8a6":"var(--text2)",background:bg}}>
                      {d.r_equal>0?"₳"+fmtAdaNum(d.r_equal):"−"}</td>
                    <td style={{...tdS(bg),fontWeight:600,color:d.r_prop>0?"#f59e0b":"var(--text2)",background:bg}}>
                      {d.r_prop>0?"₳"+fmtAdaNum(d.r_prop):"−"}</td>
                    <td style={{...tdS(bg),fontWeight:600,color:d.r_bonus>0?"#a78bfa":"var(--text2)",background:bg}}>
                      {d.r_bonus>0?"₳"+fmtAdaNum(d.r_bonus):"−"}</td>
                    <td style={{...tdS(bg),fontSize:9}}>
                      {pvr != null ? (<div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:3}}>
                        <div style={{width:28,height:3,background:"var(--bg4)",borderRadius:2,overflow:"hidden"}}>
                          <div style={{width:`${Math.min(pvr,100)}%`,height:"100%",background:pvr>80?"var(--yes)":pvr>50?"var(--abstain)":"var(--no)",borderRadius:2}} /></div>
                        <span style={{fontSize:8,color:pvr>80?"var(--yes)":pvr>50?"var(--abstain)":"var(--no)"}}>{pvr.toFixed(0)}%</span></div>)
                      : <span style={{color:"var(--text2)",fontSize:8}}>−</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,padding:"6px 12px",borderTop:"1px solid var(--border)",background:"var(--bg3)"}}>
          <button className="btn" disabled={page===0} onClick={()=>setPage(page-1)} style={{padding:"2px 7px",fontSize:10,opacity:page===0?.3:1}}>←</button>
          <span style={{fontSize:10}}>{page+1} / {totalPages}</span>
          <button className="btn" disabled={page>=totalPages-1} onClick={()=>setPage(page+1)} style={{padding:"2px 7px",fontSize:10,opacity:page>=totalPages-1?.3:1}}>→</button>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
// Main App (Tab Controller + Shared Data)
// ════════════════════════════════════════════════════════════════
function App() {
  const [lang,setLang] = React.useState("en");
  const T = LANG[lang];
  const [tab,setTab] = React.useState("dashboard");
  const [apiKey, setApiKey] = React.useState(getBfKey());
  const [apiKeyInput, setApiKeyInput] = React.useState(getBfKey());

  // Shared state
  const [dreps,setDreps] = React.useState([]);
  const [allDreps,setAllDreps] = React.useState([]);
  const [proposals,setProposals] = React.useState([]);
  const [votes,setVotes] = React.useState({});
  const [loading,setLoading] = React.useState(true);
  const [pageLoading,setPageLoading] = React.useState(false);
  const [stage,setStage] = React.useState("");
  const [error,setError] = React.useState(null);
  const [isDemo,setIsDemo] = React.useState(false);
  const [warnings,setWarnings] = React.useState([]);
  const [hasMore,setHasMore] = React.useState(true);
  const [voteData, setVoteData] = React.useState({});
  const [totalActions, setTotalActions] = React.useState(0);
  const [periodVoteData, setPeriodVoteData] = React.useState({});
  const [loadingVotes, setLoadingVotes] = React.useState(false);
  const [simProgress, setSimProgress] = React.useState("");
  const [apiStats, setApiStats] = React.useState({calls:0,cached:0});

  const loadedPageRef = React.useRef(1);
  const gaMapRef = React.useRef({});
  const allDrepsLoadedRef = React.useRef(false);
  const voteDataLoadedRef = React.useRef(false);

  const [dataSource, setDataSource] = React.useState(""); // "static" | "api" | "demo"

  const addLog = React.useCallback((level, msg) => { console.log(`[${level}] ${msg}`); }, []);

  // Try static data first, then Blockfrost API, then show key setup
  React.useEffect(()=>{ loadStatic().catch(() => { if (getBfKey()) loadLive(); else setLoading(false); }); },[]);

  React.useEffect(() => {
    const interval = setInterval(() => setApiStats(getApiStats()), 2000);
    return () => clearInterval(interval);
  }, []);

  function saveApiKey() {
    const trimmed = apiKeyInput.trim();
    if (!trimmed) return;
    setBfKey(trimmed);
    setApiKey(trimmed);
    // Clear old caches when key changes
    localStorage.removeItem(SIM_CACHE_KEY);
    _cache.clear();
    loadLive();
  }

  function loadDemo() {
    const d = demoData();
    setDreps(d.dreps); setAllDreps(d.dreps); setProposals(d.proposals); setVotes(d.votes);
    setIsDemo(true); setLoading(false); setError(null); setWarnings([]); setHasMore(false);
  }

  // ── Load from pre-fetched static JSON files (GitHub Actions) ──
  async function loadStatic() {
    setStage("Checking for static data…");
    const base = "./data/";
    const metaRes = await fetch(base + "meta.json");
    if (!metaRes.ok) throw new Error("No static data");
    const meta = await metaRes.json();

    setStage("Loading static data…");
    const [drepsRes, proposalsRes, votesRes, simRes] = await Promise.all([
      fetch(base + "dreps.json"),
      fetch(base + "proposals.json"),
      fetch(base + "votes.json"),
      fetch(base + "simulator.json")
    ]);
    if (!drepsRes.ok || !proposalsRes.ok || !votesRes.ok) throw new Error("Static data incomplete");

    const drepsData = await drepsRes.json();
    const proposalsData = await proposalsRes.json();
    const votesData = await votesRes.json();   // flat map: "drepId__propKey" → "Yes"/"No"/"Abstain"

    // Rebuild votes into the format the dashboard expects: { "drepId__propKey": "Yes", ... }
    // The static votes.json is already in that format
    setDreps(drepsData);
    setAllDreps(drepsData);
    setProposals(proposalsData);
    setVotes(votesData);
    setIsDemo(false);
    setHasMore(false);
    setDataSource("static");
    allDrepsLoadedRef.current = true;

    // Build gaMapRef for dashboard from proposals
    const gaMap = {};
    proposalsData.forEach(p => {
      gaMap[p.proposal_id] = p;
    });
    gaMapRef.current = gaMap;

    // Pre-load simulator data if available
    if (simRes.ok) {
      try {
        const simData = await simRes.json();
        // Pre-populate vote data for simulator
        const vd = simData.drepVoteCounts || {};
        const maxVotes = simData.maxVotes || 0;
        const flatExpirations = simData.proposalExpirations || {};
        const drepVotedProposals = {};
        if (simData.drepVotedProposals) {
          Object.entries(simData.drepVotedProposals).forEach(([id, arr]) => {
            drepVotedProposals[id] = new Set(arr);
          });
        }
        window.__simVoteRaw = { proposalExpirations: flatExpirations, drepVotedProposals };
        setVoteData(vd);
        setTotalActions(maxVotes);
        voteDataLoadedRef.current = true;
      } catch(e) { console.warn("Simulator data parse error:", e); }
    }

    // Show data freshness
    const age = Math.round((Date.now() - new Date(meta.updated_at).getTime()) / 60000);
    const freshness = age < 60 ? `${age}min ago` : `${Math.round(age / 60)}h ago`;
    setSimProgress(`Static data: ${meta.drep_count} DReps, ${meta.proposal_count} proposals (${freshness})`);
    setWarnings([]);
    setLoading(false);
    setError(null);
    console.log(`[Static] Loaded: ${drepsData.length} DReps, ${proposalsData.length} proposals, ${Object.keys(votesData).length} votes (updated ${meta.updated_at})`);
  }

  async function loadLive() {
    try {
      if (!getBfKey()) { setError(T.api_key_required); setLoading(false); return; }
      resetApiStats();
      setLoading(true); setError(null); setIsDemo(false);
      loadedPageRef.current = 1; gaMapRef.current = {};
      allDrepsLoadedRef.current = false; voteDataLoadedRef.current = false;

      setStage(T.loading_dreps);
      const { dreps: chunk, nextPage, reachedEnd } = await fetchDrepRange(1, 1, addLog, setStage);
      if (chunk.length === 0) { loadDemo(); return; }
      const seen = new Set();
      const uniqueDreps = chunk.filter(d => { if(seen.has(d.drep_id)) return false; seen.add(d.drep_id); return true; });
      uniqueDreps.sort((a,b) => Number(b.amount) - Number(a.amount));
      loadedPageRef.current = nextPage;
      setHasMore(!reachedEnd);

      setStage(T.loading_votes);
      const { vm, gaMap, totalVotes } = await fetchVotesForDreps(uniqueDreps, addLog, setStage, T.loading_votes);
      gaMapRef.current = { ...gaMap };

      // Enrich proposals with type + title from Blockfrost
      setStage(T.loading_proposals);
      await enrichProposals(gaMapRef.current, addLog, setStage);

      const allProposals = Object.values(gaMapRef.current);
      allProposals.sort((a,b) => (b.expiration || 0) - (a.expiration || 0));

      setDreps(uniqueDreps); setAllDreps(uniqueDreps);
      setProposals(allProposals); setVotes(vm);
      setWarnings([]); setLoading(false);
    } catch(e) { setError(e.message); setLoading(false); }
  }

  async function loadMoreDreps() {
    if (pageLoading || !hasMore || loadedPageRef.current < 0) return;
    setPageLoading(true);
    const page = loadedPageRef.current;
    setStage(`${T.loading_dreps} (page ${page})`);
    try {
      const { dreps: chunk, nextPage, reachedEnd } = await fetchDrepRange(page, 1, addLog, setStage);
      if (chunk.length === 0) { setHasMore(false); setPageLoading(false); return; }
      if (reachedEnd) setHasMore(false);
      loadedPageRef.current = nextPage;
      const existingIds = new Set(dreps.map(d => d.drep_id));
      const newDreps = chunk.filter(d => !existingIds.has(d.drep_id));
      setStage(T.loading_votes);
      const { vm: newVm, gaMap: newGaMap } = await fetchVotesForDreps(newDreps, addLog, setStage, T.loading_votes);
      Object.assign(gaMapRef.current, newGaMap);

      // Enrich new proposals
      await enrichProposals(gaMapRef.current, addLog, setStage);

      const allProposals = Object.values(gaMapRef.current);
      allProposals.sort((a,b) => (b.expiration || 0) - (a.expiration || 0));
      const merged = [...dreps, ...newDreps];
      merged.sort((a,b) => Number(b.amount) - Number(a.amount));
      setDreps(merged); setAllDreps(prev => {
        const ids = new Set(prev.map(d=>d.drep_id));
        const extra = newDreps.filter(d=>!ids.has(d.drep_id));
        const all = [...prev, ...extra]; all.sort((a,b)=>Number(b.amount)-Number(a.amount)); return all;
      });
      setProposals(allProposals); setVotes(prev => ({...prev, ...newVm}));
    } catch(e) { addLog("ERROR", e.message); }
    setPageLoading(false);
  }

  // Load ALL DReps for simulator (lazy, once)
  async function ensureAllDrepsLoaded() {
    if (allDrepsLoadedRef.current || isDemo) return;
    allDrepsLoadedRef.current = true;
    setSimProgress("Loading all DReps for simulator...");
    const all = await fetchAllDreps((count, total) => {
      setSimProgress(`${count}/${total} DReps...`);
    });
    setAllDreps(all);
    if (all.length > dreps.length) {
      setDreps(all); setHasMore(false);
    }
    setSimProgress(`${all.length} DReps loaded`);
  }

  // Load vote data for simulator — uses proposal expiration epochs for vote period
  async function ensureVoteDataLoaded() {
    if (voteDataLoadedRef.current || isDemo) return;
    voteDataLoadedRef.current = true;

    const cached = loadSimCache();
    if (cached && cached.vd && cached.proposalExpirations && cached.drepVotedProposals) {
      setSimProgress("Restoring cached vote data…");
      setLoadingVotes(true);
      const drepVotedProposals = {};
      Object.entries(cached.drepVotedProposals).forEach(([id, arr]) => { drepVotedProposals[id] = new Set(arr); });
      window.__simVoteRaw = { proposalExpirations: cached.proposalExpirations, drepVotedProposals };
      setVoteData(cached.vd); setTotalActions(cached.maxVotes);
      setLoadingVotes(false);
      setSimProgress(`Cached: ${Object.keys(cached.vd).length} DReps (${Math.round((Date.now() - cached.ts) / 60000)}min ago)`);
      return;
    }

    setLoadingVotes(true);
    const toFetch = allDreps.slice(0, 200);
    setSimProgress(`Vote data: 0/${toFetch.length}`);
    const vd = {};
    let maxVotes = 0;
    const proposalExpirations = {}; // propKey → expiration epoch
    const drepVotedProposals = {}; // drepId → Set<propKey>

    for (let i = 0; i < toFetch.length; i += VOTE_BATCH) {
      const batch = toFetch.slice(i, i + VOTE_BATCH);
      const results = await Promise.allSettled(batch.map(async d => {
        const votes = await fetchAllVotesForDrep(d.drep_id);
        const votedProposals = new Set();
        votes.forEach(v => {
          const propTxHash = v.proposal_tx_hash || "";
          const propCertIdx = v.proposal_cert_index != null ? v.proposal_cert_index : -1;
          if (propTxHash) {
            const propKey = `${propTxHash}#${propCertIdx}`;
            votedProposals.add(propKey);
            if (!proposalExpirations[propKey]) {
              proposalExpirations[propKey] = { tx_hash: propTxHash, cert_index: propCertIdx, expiration: 0 };
            }
          }
        });
        return { id: d.drep_id, count: votes.length, votedProposals };
      }));
      results.forEach(r => {
        if (r.status === "fulfilled") {
          const { id, count, votedProposals } = r.value;
          vd[id] = count;
          if (count > maxVotes) maxVotes = count;
          drepVotedProposals[id] = votedProposals;
        }
      });
      setSimProgress(`Vote data: ${Math.min(i + VOTE_BATCH, toFetch.length)}/${toFetch.length}`);
    }

    // Fetch proposal expirations from Blockfrost
    setSimProgress("Fetching proposal expirations...");
    const propEntries = Object.entries(proposalExpirations);
    for (let i = 0; i < propEntries.length; i += VOTE_BATCH) {
      const batch = propEntries.slice(i, i + VOTE_BATCH);
      await Promise.allSettled(batch.map(async ([propKey, info]) => {
        try {
          const detail = await bfFetchJSON(`/governance/proposals/${info.tx_hash}/${info.cert_index}`);
          if (detail && detail.expiration) {
            proposalExpirations[propKey].expiration = detail.expiration;
          }
        } catch(e) {}
      }));
      setSimProgress(`Proposal expirations: ${Math.min(i + VOTE_BATCH, propEntries.length)}/${propEntries.length}`);
    }

    // Flatten expirations for storage
    const flatExpirations = {};
    Object.entries(proposalExpirations).forEach(([k, v]) => { flatExpirations[k] = v.expiration || 0; });
    window.__simVoteRaw = { proposalExpirations: flatExpirations, drepVotedProposals };

    // Save to cache
    const serialDrepProps = {};
    Object.entries(drepVotedProposals).forEach(([id, s]) => { serialDrepProps[id] = [...s]; });
    saveSimCache({ vd, maxVotes, proposalExpirations: flatExpirations, drepVotedProposals: serialDrepProps });

    setVoteData(vd); setTotalActions(maxVotes);
    setLoadingVotes(false);
    setSimProgress(`${Object.keys(vd).length} DReps loaded & cached`);
  }

  // Compute period vote data using proposal expiration epochs
  function computePeriodVoteData(startDate, endDate) {
    const raw = window.__simVoteRaw;
    if (!raw || !startDate || !endDate) return {};
    const { proposalExpirations, drepVotedProposals } = raw;

    const startTs = new Date(startDate + "T00:00:00Z").getTime() / 1000;
    const endTs = new Date(endDate + "T23:59:59Z").getTime() / 1000;

    // Find proposals whose expiration epoch falls in the date range
    const proposalsInRange = new Set();
    Object.entries(proposalExpirations).forEach(([propKey, exp]) => {
      const expEpoch = typeof exp === "number" ? exp : (exp?.expiration || 0);
      if (!expEpoch) return;
      const expTs = epochToTimestamp(expEpoch);
      if (expTs >= startTs && expTs <= endTs) proposalsInRange.add(propKey);
    });

    console.log(`[VotePeriod] Range: ${startDate}~${endDate}, ${proposalsInRange.size}/${Object.keys(proposalExpirations).length} proposals in range`);

    const actionsInPeriod = proposalsInRange.size;
    const result = {};
    Object.entries(drepVotedProposals).forEach(([drepId, votedSet]) => {
      let votesInPeriod = 0;
      proposalsInRange.forEach(propKey => { if (votedSet.has(propKey)) votesInPeriod++; });
      result[drepId] = { votesInPeriod, actionsInPeriod };
    });
    return result;
  }

  // When switching to simulator tab, load all DReps + vote data
  React.useEffect(() => {
    if (tab === "simulator" && !loading && !isDemo && (getBfKey() || dataSource === "static")) {
      if (dataSource === "static") {
        // Static data already has all DReps + simulator data pre-loaded
        return;
      }
      ensureAllDrepsLoaded().then(() => ensureVoteDataLoaded());
    }
  }, [tab, loading, allDreps.length, dataSource]);

  // API Key Setup Screen (skip if static data loaded)
  if (!apiKey && !loading && !isDemo && dataSource !== "static") {
    return (
      <div className="fade-in" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:24}}>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.02em"}}>Cardano <span style={{color:"var(--accent)"}}>Governance</span></div>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:24,maxWidth:440,width:"100%"}}>
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:8}}>{T.api_key}</h2>
          <p style={{fontSize:12,color:"var(--text2)",marginBottom:16}}>
            {T.api_key_desc}: <a href="https://blockfrost.io" target="_blank" rel="noopener">blockfrost.io</a>
          </p>
          <div style={{display:"flex",gap:8}}>
            <input type="text" placeholder={T.api_key_ph} value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && saveApiKey()}
              style={{flex:1,padding:"8px 12px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:13,outline:"none"}} />
            <button className="btn btn-primary" onClick={saveApiKey} disabled={!apiKeyInput.trim()}>{T.api_key_save}</button>
          </div>
        </div>
        <button className="btn" onClick={loadDemo} style={{marginTop:8}}>{T.demo_btn}</button>
      </div>
    );
  }

  if(loading) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:24}}>
      <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.02em"}}>Cardano <span style={{color:"var(--accent)"}}>Governance</span></div>
      <div className="loader"><span/><span/><span/></div>
      <div style={{color:"var(--text2)",fontSize:13}}>{stage}</div>
    </div>
  );

  if(error) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24}}>
      <div style={{fontSize:20,fontWeight:700,color:"#ef4444"}}>{T.error_title}</div>
      <div style={{color:"var(--text2)",maxWidth:460,textAlign:"center",fontSize:13}}>{error}</div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn btn-primary" onClick={loadLive}>{T.retry}</button>
        <button className="btn" onClick={loadDemo}>{T.demo_btn}</button>
        <button className="btn" onClick={()=>{ setBfKey(""); setApiKey(""); setApiKeyInput(""); setError(null); }}>{T.api_key_change}</button>
      </div>
    </div>
  );

  return (
    <div className="fade-in" style={{minHeight:"100vh",padding:"14px 18px",maxWidth:1900,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:10}}>
        <div>
          <h1 style={{fontSize:19,fontWeight:800,letterSpacing:"-.02em"}}>Cardano <span style={{color:"var(--accent)"}}>{T.title}</span></h1>
          <div style={{color:"var(--text2)",fontSize:11,marginTop:2,display:"flex",gap:10,flexWrap:"wrap"}}>
            <span>{T.subtitle_drep}: {dreps.length}{hasMore?"+":""}</span>
            <span>{T.subtitle_actions}: {proposals.length}</span>
            <span style={{color:"var(--border2)"}}>{T.api_stats}: {apiStats.calls} {T.api_calls} / {apiStats.cached} {T.cached}</span>
            {isDemo && <span style={{color:"#f59e0b",fontWeight:600}}>⚠ {T.demo_mode}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{display:"flex",border:"1px solid var(--border)",borderRadius:6,overflow:"hidden"}}>
            {["en","ja"].map(l=>(
              <button key={l} onClick={()=>setLang(l)} style={{padding:"4px 10px",fontSize:11,fontWeight:600,border:"none",cursor:"pointer",
                background:lang===l?"var(--accent)":"var(--bg3)",color:lang===l?"#fff":"var(--text2)"}}>{l==="en"?"EN":"日本語"}</button>
            ))}
          </div>
          {isDemo&&<button className="btn btn-primary" onClick={loadLive} style={{fontSize:11}}>{T.switch_live}</button>}
          <button className="btn" onClick={isDemo?loadDemo:loadLive}>↻ {T.refresh}</button>
          <button className="btn" onClick={()=>{ setBfKey(""); setApiKey(""); setApiKeyInput(""); }}
            style={{fontSize:9,padding:"4px 8px",opacity:0.6}} title={T.api_key_change}>🔑</button>
        </div>
      </div>

      {/* Tab Bar */}
      <div className="tab-bar">
        <button className={`tab-btn ${tab==="dashboard"?"active":""}`} onClick={()=>setTab("dashboard")}>{T.tab_dashboard}</button>
        <button className={`tab-btn ${tab==="simulator"?"active":""}`} onClick={()=>setTab("simulator")}>{T.tab_simulator}</button>
      </div>

      {tab === "dashboard" ? (
        <DashboardTab dreps={dreps} proposals={proposals} votes={votes}
          warnings={warnings} hasMore={hasMore} pageLoading={pageLoading} stage={stage}
          loadMoreDreps={loadMoreDreps} T={T} isDemo={isDemo} />
      ) : (
        <SimulatorTab dreps={allDreps} voteData={voteData} totalActions={totalActions}
          periodVoteData={periodVoteData}
          computePeriodVoteData={computePeriodVoteData} setPeriodVoteData={setPeriodVoteData}
          loadingVotes={loadingVotes} progress={simProgress} T={T} />
      )}

      <div style={{marginTop:12,textAlign:"center",color:"#333a4a",fontSize:10,lineHeight:1.8}}>
        Data: <a href="https://blockfrost.io" target="_blank">Blockfrost.io</a>
        {dataSource === "static" && " (cached)"} ·
        <a href="https://github.com/Cerkoryn/ExcludeKPayN" target="_blank">ExcludeKPayN (Middle-Out)</a> ·
        Process-first framework (<a href="https://github.com/cardano-foundation/CIPs/tree/master/CIP-1694" target="_blank">CIP-1694</a>)
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
