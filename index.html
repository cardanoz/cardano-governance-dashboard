// ════════════════════════════════════════════════════════════════
// Blockfrost API Layer with Caching + Rate Limiting
// ════════════════════════════════════════════════════════════════
const BLOCKFROST_URL = "https://cardano-mainnet.blockfrost.io/api/v0";
const BF_KEY_LS = "blockfrost_api_key";
const BF_PAGE_SIZE = 100;

function getBfKey() { return localStorage.getItem(BF_KEY_LS) || ""; }
function setBfKey(k) { localStorage.setItem(BF_KEY_LS, k); }

// --- In-memory cache ---
const _cache = new Map();
const CACHE_TTL = 10 * 60 * 1000; // 10 min
let _apiCalls = 0, _cacheHits = 0;

// --- Persistent cache (localStorage) for simulator vote data ---
const SIM_CACHE_KEY = "cardano_drep_sim_cache_v4";
const SIM_CACHE_TTL = 60 * 60 * 1000; // 1 hour

function saveSimCache(data) {
  try {
    const payload = { ts: Date.now(), ...data };
    localStorage.setItem(SIM_CACHE_KEY, JSON.stringify(payload));
  } catch(e) { console.warn("SimCache save failed:", e); }
}

function loadSimCache() {
  try {
    const raw = localStorage.getItem(SIM_CACHE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (Date.now() - parsed.ts > SIM_CACHE_TTL) { localStorage.removeItem(SIM_CACHE_KEY); return null; }
    return parsed;
  } catch(e) { localStorage.removeItem(SIM_CACHE_KEY); return null; }
}

function timedFetch(url, opts={}, ms=30000) {
  const c = new AbortController();
  const t = setTimeout(() => c.abort(), ms);
  return fetch(url, {...opts, signal:c.signal}).finally(() => clearTimeout(t));
}

// --- Throttle: min 100ms between calls (10 req/sec for Blockfrost) ---
let _lastFetch = 0;
async function bfFetchJSON(path) {
  const url = `${BLOCKFROST_URL}${path}`;
  const cached = _cache.get(url);
  if (cached && Date.now() - cached.ts < CACHE_TTL) { _cacheHits++; return cached.data; }
  const key = getBfKey();
  if (!key) throw new Error("Blockfrost API key not set");
  const now = Date.now();
  const wait = Math.max(0, 100 - (now - _lastFetch));
  if (wait > 0) await new Promise(r => setTimeout(r, wait));
  _lastFetch = Date.now();
  _apiCalls++;
  const r = await timedFetch(url, { headers: { "Accept": "application/json", "project_id": key } });
  if (r.status === 404) { _cache.set(url, { data: null, ts: Date.now() }); return null; }
  if (r.status === 402) throw new Error("Blockfrost: Usage limit reached");
  if (r.status === 403) throw new Error("Blockfrost: Invalid API key");
  if (r.status === 418) throw new Error("Blockfrost: IP has been auto-banned");
  if (r.status === 429) { await new Promise(r => setTimeout(r, 1000)); return bfFetchJSON(path); } // retry once
  if (!r.ok) throw new Error(`Blockfrost HTTP ${r.status}`);
  const data = await r.json();
  _cache.set(url, { data, ts: Date.now() });
  return data;
}

// Fetch all pages of a paginated Blockfrost endpoint
async function bfFetchAllPages(path, maxPages = 20) {
  const results = [];
  for (let page = 1; page <= maxPages; page++) {
    const sep = path.includes("?") ? "&" : "?";
    const data = await bfFetchJSON(`${path}${sep}page=${page}&count=${BF_PAGE_SIZE}`);
    if (!data || !Array.isArray(data) || data.length === 0) break;
    results.push(...data);
    if (data.length < BF_PAGE_SIZE) break;
  }
  return results;
}

function getApiStats() { return { calls: _apiCalls, cached: _cacheHits }; }
function resetApiStats() { _apiCalls = 0; _cacheHits = 0; }

// ════════════════════════════════════════════════════════════════
// Shared Helpers
// ════════════════════════════════════════════════════════════════
function fmtAda(lovelace) {
  if(!lovelace) return "0";
  const a = Number(lovelace)/1e6;
  if(a>=1e9) return (a/1e9).toFixed(2)+"B";
  if(a>=1e6) return (a/1e6).toFixed(2)+"M";
  if(a>=1e3) return (a/1e3).toFixed(1)+"K";
  return a.toFixed(0);
}
function fmtAdaNum(ada) {
  if(ada>=1e9) return (ada/1e9).toFixed(2)+"B";
  if(ada>=1e6) return (ada/1e6).toFixed(2)+"M";
  if(ada>=1e3) return (ada/1e3).toFixed(1)+"K";
  return ada.toFixed(ada < 1 ? 4 : 1);
}
// IPFS URL resolver — convert ipfs:// to gateway URL
function resolveIpfsUrl(url) {
  if (!url) return null;
  if (url.startsWith("ipfs://")) return "https://ipfs.io/ipfs/" + url.slice(7);
  if (url.startsWith("ipfs:")) return "https://ipfs.io/ipfs/" + url.slice(5);
  return url;
}
// Fetch rationale JSON and extract readable text
async function fetchRationaleText(url) {
  const resolved = resolveIpfsUrl(url);
  if (!resolved) return null;
  try {
    const r = await fetch(resolved, { signal: AbortSignal.timeout(10000) });
    if (!r.ok) return null;
    const text = await r.text();
    try {
      const j = JSON.parse(text);
      const body = j.body || j;
      return body.comment || body.rationale || body.summary || body.abstract ||
        (typeof body === "string" ? body : JSON.stringify(body, null, 2));
    } catch { return text.slice(0, 2000); }
  } catch { return null; }
}
// Cardano epoch ↔ date conversion (Shelley era: epoch 208 = 2020-07-29T21:44:51Z, 5 days per epoch)
const EPOCH_208_TS = 1596059091000; // ms
const EPOCH_DURATION = 432000000; // 5 days in ms
function epochToDate(epoch) { return new Date(EPOCH_208_TS + (epoch - 208) * EPOCH_DURATION); }
function dateToEpoch(dateStr) { const d = new Date(dateStr + "T00:00:00Z"); return Math.floor((d.getTime() - EPOCH_208_TS) / EPOCH_DURATION) + 208; }
function epochToDateStr(epoch) { const d = epochToDate(epoch); return d.toISOString().slice(0,10); }

// CC term boundaries — minimum epoch for reward eligibility per member
// All current CC members' term starts from the "Budget: ₳5M Loan" proposal (epoch 587)
// except members who joined later (e.g., Curia replaced Atlantic Council)
const CC_MIN_EPOCH = 587; // 90cf51…#0 — current CC term start
const CC_MEMBER_START = {
  "zwz2a08a8cqd": 597, // Cardano Curia — replaced Atlantic Council; first vote at "Reimburse Ikigai" (ep.597)
};
function ccMemberMinEpoch(ccId) { return CC_MEMBER_START[ccId] || CC_MIN_EPOCH; }

function shortId(id,n=8,m=5) { return !id ? "" : id.length<=n+m+3 ? id : id.slice(0,n)+"…"+id.slice(-m); }
function safeName(v) { return typeof v === "string" ? v : (v && typeof v === "object" ? (v["@value"] || v.givenName || JSON.stringify(v)) : null); }
function normalizeType(t) {
  const map = {
    // Blockfrost lowercase types
    "treasury_withdrawals":"TreasuryWithdrawals","hard_fork_initiation":"HardForkInitiation",
    "parameter_change":"ParameterChange","no_confidence":"NoConfidence",
    "update_committee":"UpdateCommittee","new_constitution":"NewConstitution",
    "info_action":"InfoAction",
    // Legacy uppercase types (demo data / backward compat)
    "HARD_FORK_INITIATION":"HardForkInitiation","TREASURY_WITHDRAWALS":"TreasuryWithdrawals",
    "PARAMETER_CHANGE":"ParameterChange","PROTOCOL_PARAMETER_CHANGE":"ParameterChange",
    "NO_CONFIDENCE":"NoConfidence","UPDATE_COMMITTEE":"UpdateCommittee",
    "NEW_CONSTITUTION":"NewConstitution","INFO_ACTION":"InfoAction","INFO":"InfoAction","INFORMATION":"InfoAction",
  };
  return map[t] || map[t?.toLowerCase()] || t || "";
}
// Epoch → Unix timestamp (Shelley era: epoch 208 started at 1596059091)
function epochToTimestamp(epoch) {
  return 1596059091 + (epoch - 208) * 432000;
}
function calcGini(values) {
  const n = values.length; if (n === 0) return 0;
  const sorted = [...values].sort((a,b) => a - b);
  const sum = sorted.reduce((a,b) => a + b, 0); if (sum === 0) return 0;
  let cumSum = 0, giniSum = 0;
  sorted.forEach(v => { cumSum += v; giniSum += cumSum; });
  return (2 * giniSum) / (n * sum) - (n + 1) / n;
}

const DREP_CHUNK = 100, VOTE_BATCH = 5;

// Fetch a page of DRep IDs, then batch-fetch their details + metadata
async function fetchDrepPage(page, addLog, setStage) {
  const ids = await bfFetchJSON(`/governance/dreps?page=${page}&count=${BF_PAGE_SIZE}`);
  if (!ids || !Array.isArray(ids) || ids.length === 0) return { dreps: [], reachedEnd: true };
  const result = [];
  for (let i = 0; i < ids.length; i += VOTE_BATCH) {
    const batch = ids.slice(i, i + VOTE_BATCH);
    if (setStage) setStage(`DReps: ${result.length + batch.length}/${ids.length} (page ${page})`);
    const results = await Promise.allSettled(batch.map(async d => {
      const detail = await bfFetchJSON(`/governance/dreps/${d.drep_id}`);
      if (!detail || detail.retired || detail.expired) return null;
      let name = null, image_url = null;
      try {
        const meta = await bfFetchJSON(`/governance/dreps/${d.drep_id}/metadata`);
        if (meta && meta.json_metadata) {
          const body = meta.json_metadata.body || meta.json_metadata;
          name = body?.givenName || body?.name || null;
          image_url = body?.image?.contentUrl || null;
        }
      } catch(e) {}
      return { drep_id: d.drep_id, name, amount: detail.amount || "0", image_url, delegators: 0 };
    }));
    results.forEach(r => { if (r.status === "fulfilled" && r.value) result.push(r.value); });
  }
  return { dreps: result, reachedEnd: ids.length < BF_PAGE_SIZE };
}

// Fetch multiple pages of DReps
async function fetchDrepRange(startPage, numPages, addLog, setStage) {
  const result = []; let reachedEnd = false;
  for (let p = startPage; p < startPage + numPages; p++) {
    const { dreps: chunk, reachedEnd: ended } = await fetchDrepPage(p, addLog, setStage);
    result.push(...chunk);
    if (ended) { reachedEnd = true; break; }
  }
  result.sort((a, b) => Number(b.amount) - Number(a.amount));
  return { dreps: result, nextPage: reachedEnd ? -1 : startPage + numPages, reachedEnd };
}

async function fetchAllDreps(onProgress) {

// Process a Blockfrost vote record into the vote map
function processVoteRecord(v, drepId, vm, rm, gaMap) {
  const propTxHash = v.proposal_tx_hash || "";
  const propCertIdx = v.proposal_cert_index != null ? v.proposal_cert_index : -1;
  if (!propTxHash) return false;
  const propKey = `${propTxHash}#${propCertIdx}`;
  if (!gaMap[propKey]) {
    gaMap[propKey] = {
      proposal_id: propKey, proposal_type: "", epoch_no: 0,
      title: "", tx_hash: propTxHash, cert_index: propCertIdx, expiration: 0
    };
  }
  let voteVal = (v.vote || "").toLowerCase();
  if (voteVal === "yes") voteVal = "Yes";
  else if (voteVal === "no") voteVal = "No";
  else if (voteVal === "abstain") voteVal = "Abstain";
  else return false;
  const k = `${drepId}__${propKey}`;
  vm[k] = voteVal;
  // Blockfrost vote records don't include rationale directly
  return true;
}

// Fetch votes for a list of DReps
async function fetchVotesForDreps(drepList, addLog, setStage, stageLabel) {
  const vm = {}, rm = {}, gaMap = {}; let totalVotes = 0;
  for (let batch = 0; batch < drepList.length; batch += VOTE_BATCH) {
    const batchDreps = drepList.slice(batch, batch + VOTE_BATCH);
    if (setStage) setStage(`${stageLabel} (${Math.min(batch + VOTE_BATCH, drepList.length)}/${drepList.length})`);
    await Promise.allSettled(batchDreps.map(async (d) => {
      try {
        const votes = await fetchAllVotesForDrep(d.drep_id);
        votes.forEach(v => { if (processVoteRecord(v, d.drep_id, vm, rm, gaMap)) totalVotes++; });
      } catch(e) { /* skip */ }
    }));
  }
  return { vm, rm, gaMap, totalVotes };
}

// Enrich proposals with details (type, expiration) and metadata (title) from Blockfrost
async function enrichProposals(gaMap, addLog, setStage) {
  const proposals = Object.values(gaMap);
  const toFetch = proposals.filter(p => !p.proposal_type && p.tx_hash);
  for (let i = 0; i < toFetch.length; i += VOTE_BATCH) {
    const batch = toFetch.slice(i, i + VOTE_BATCH);
    if (setStage) setStage(`Proposals: ${Math.min(i + VOTE_BATCH, toFetch.length)}/${toFetch.length}`);
    await Promise.allSettled(batch.map(async p => {
      try {
        const detail = await bfFetchJSON(`/governance/proposals/${p.tx_hash}/${p.cert_index}`);
        if (detail) {
          p.proposal_type = normalizeType(detail.governance_type || "");
          p.expiration = detail.expiration || 0;
          p.epoch_no = detail.expiration || 0;
        }
      } catch(e) {}
      try {
        const meta = await bfFetchJSON(`/governance/proposals/${p.tx_hash}/${p.cert_index}/metadata`);
        if (meta && meta.json_metadata) {
          const body = meta.json_metadata.body || meta.json_metadata;
          let title = body?.title || "";
          if (typeof title === "object") title = JSON.stringify(title);
          p.title = title;
        }
      } catch(e) {}
    }));
  }
}

// Reward Calculation Models (3 mechanisms, computed simultaneously)
// ════════════════════════════════════════════════════════════════
function calcAllMechanisms(dreps, params, voteData, totalActions, periodVoteData) {
  const n = dreps.length;
  if (n === 0) return { mo_equal:[], mo_prop:[], mo_bonus:[] };
  const budget = params.totalBudget;

  function tagEligible() {
    let paidCount = 0;
    return dreps.map((d, i) => {
      const excluded = i < params.K;
      const inBand = !excluded && Number(d.amount) > 0 && paidCount < params.N;
      if (inBand) paidCount++;
      return { ...d, rank: i + 1, eligible: inBand };
    });
  }

  function applyPeriodVotePenalty(tagged, rewards) {
    if (!params.votePenaltyOn || !periodVoteData) return rewards;
    return rewards.map((r, i) => {
      if (r === 0) return 0;
      const pd = periodVoteData[tagged[i].drep_id];
      if (!pd || pd.actionsInPeriod === 0) return 0;
      const voteRate = pd.votesInPeriod / pd.actionsInPeriod;
      return r * voteRate;
    });
  }

  function adjustAndNormalize(tagged, rewards) {
    let adj = applyPeriodVotePenalty(tagged, rewards);
    const total = adj.reduce((a, b) => a + b, 0);
    if (total > 0) adj = adj.map(r => r * budget / total);
    return tagged.map((d, i) => ({ ...d, reward: adj[i] }));
  }

  function calcEqual() {
    const tagged = tagEligible();
    const weights = tagged.map(d => d.eligible ? 1 : 0);
    const sumW = weights.reduce((a, b) => a + b, 0);
    const base = tagged.map((d, i) => sumW > 0 && d.eligible ? budget * (weights[i] / sumW) : 0);
    return adjustAndNormalize(tagged, base);
  }

  function calcProp() {
    const tagged = tagEligible();
    const weights = tagged.map(d => d.eligible ? Number(d.amount) : 0);
    const sumW = weights.reduce((a, b) => a + b, 0);
    const base = tagged.map((d, i) => sumW > 0 && d.eligible ? budget * (weights[i] / sumW) : 0);
    return adjustAndNormalize(tagged, base);
  }

  function calcBonus() {
    const tagged = tagEligible();
    const eligibleList = tagged.filter(d => d.eligible);
    if (eligibleList.length === 0) return tagged.map(d => ({ ...d, reward: 0 }));
    const eligibleStake = eligibleList.reduce((s, d) => s + Number(d.amount), 0);
    const totalBonusPool = params.b2 * eligibleList.length;
    const baseBudget = budget - totalBonusPool;
    const base = tagged.map(d => {
      if (!d.eligible) return 0;
      const propPart = eligibleStake > 0 && baseBudget > 0 ? baseBudget * (Number(d.amount) / eligibleStake) : 0;
      return propPart + params.b2;
    });
    return adjustAndNormalize(tagged, base);
  }

  return { mo_equal: calcEqual(), mo_prop: calcProp(), mo_bonus: calcBonus() };
}

function calcProcessMetrics(results, totalEligible) {
  const rewarded = results.filter(r => r.reward > 0);
  const eligibleCount = rewarded.length;
  const totalReward = rewarded.reduce((s, r) => s + r.reward, 0);
  const rewards = rewarded.map(r => r.reward);
  const P = totalEligible > 0 ? eligibleCount / totalEligible : 0;
  let C = 0;
  if (totalReward > 0 && eligibleCount > 1) {
    const hhi = rewarded.reduce((s, r) => s + Math.pow(r.reward / totalReward, 2), 0);
    C = (hhi - 1 / eligibleCount) / (1 - 1 / eligibleCount);
  }
  const rewardedStake = rewarded.reduce((s, r) => s + Number(r.amount), 0);
  let D = 0;
  if (rewardedStake > 0 && totalEligible > 0) {
    const stakeHHI = rewarded.reduce((s, r) => s + Math.pow(Number(r.amount) / rewardedStake, 2), 0);
    const effectiveN = stakeHHI > 0 ? 1 / stakeHHI : 0;
    D = effectiveN / totalEligible;
  }
  const gini = calcGini(rewards);
  const minR = rewards.length > 0 ? Math.min(...rewards) : 0;
  const maxR = rewards.length > 0 ? Math.max(...rewards) : 0;
  const avgR = rewards.length > 0 ? totalReward / rewards.length : 0;
  const medR = rewards.length > 0 ? [...rewards].sort((a, b) => a - b)[Math.floor(rewards.length / 2)] : 0;
  return { D, P, C, eligible: eligibleCount, gini, minR, maxR, avgR, medR, totalReward };
}

// CC Votes Tab — Constitutional Committee voting matrix
// ════════════════════════════════════════════════════════════════
function CCVotesTab({ ccMembers, ccVotes, ccRationales, proposals, T }) {
  const [search,setSearch] = React.useState("");
  const [actType,setActType] = React.useState("all");
  const [epFrom,setEpFrom] = React.useState("");
  const [epTo,setEpTo] = React.useState("");
  const [pPage,setPPage] = React.useState(0);
  const [csvOpen,setCsvOpen] = React.useState(false);
  const [ccBaseReward,setCcBaseReward] = React.useState(5000);
  const [penaltyThreshold,setPenaltyThreshold] = React.useState(3);
  const [simDateFrom,setSimDateFrom] = React.useState(epochToDateStr(CC_MIN_EPOCH));
  const [simDateTo,setSimDateTo] = React.useState("");
  const [ratModal,setRatModal] = React.useState(null); // {ccName, proposalTitle, url, text, loading}
  const [ratExporting,setRatExporting] = React.useState(false);
  const PPP = 22;

  // Build set of proposal IDs that have at least one CC vote
  const ccProposalIds = React.useMemo(()=>{
    const ids=new Set();
    Object.keys(ccVotes).forEach(k=>{const pid=k.split("__")[1]; if(pid) ids.add(pid);});
    return ids;
  },[ccVotes]);

  // Filter proposals to only those with CC votes (expired only)
  const ccProposals = React.useMemo(()=>{
    return proposals.filter(p=>ccProposalIds.has(p.proposal_id));
  },[proposals,ccProposalIds]);

  // Build eligibility map: which CC member is eligible for which proposal
  const eligibleMap = React.useMemo(()=>{
    const m={};
    ccMembers.forEach(cc=>{
      if(cc.eligible_proposals){
        cc.eligible_proposals.forEach(pid=>{m[`${cc.cc_id}__${pid}`]=true;});
      }
    });
    return m;
  },[ccMembers]);

  const fMembers = React.useMemo(()=>{
    let r = [...ccMembers];
    if(search){const q=search.toLowerCase(); r=r.filter(c=>(c.cc_id&&c.cc_id.toLowerCase().includes(q))||(c.name&&c.name.toLowerCase().includes(q)));}
    r.sort((a,b)=>b.vote_count - a.vote_count);
    return r;
  },[ccMembers,search]);

  const fProps = React.useMemo(()=>{
    let r=[...ccProposals];
    if(actType!=="all") r=r.filter(p=>p.proposal_type===actType);
    if(epFrom) r=r.filter(p=>Number(p.epoch_no)>=parseInt(epFrom));
    if(epTo) r=r.filter(p=>Number(p.epoch_no)<=parseInt(epTo));
    return r;
  },[ccProposals,actType,epFrom,epTo]);

  const pgP=fProps.slice(pPage*PPP,(pPage+1)*PPP);
  const tPP=Math.max(1,Math.ceil(fProps.length/PPP));
  const actTypes=[...new Set(ccProposals.map(p=>p.proposal_type).filter(Boolean))];

  function isEligible(ccId,pid){return !!eligibleMap[`${ccId}__${pid}`];}
  function gv(ccId,pid){
    const v=ccVotes[`${ccId}__${pid}`];
    if(v) return v;
    return isEligible(ccId,pid) ? "NotVoted" : "Ineligible";
  }
  function gr(ccId,pid){return ccRationales[`${ccId}__${pid}`]||null;}

  // Simulator-specific proposal filter (separate from vote table, date-based)
  const simEpFrom = simDateFrom ? dateToEpoch(simDateFrom) : 0;
  const simEpTo = simDateTo ? dateToEpoch(simDateTo) : 99999;
  const simProps = React.useMemo(()=>{
    return ccProposals.filter(p=>{
      const ep = Number(p.epoch_no);
      return ep >= simEpFrom && ep <= simEpTo;
    });
  },[ccProposals,simEpFrom,simEpTo]);

  // CC Simulator data — per-member eligible count respects each member's start epoch
  const simData = React.useMemo(()=>{
    return fMembers.map(cc=>{
      const memberMin = ccMemberMinEpoch(cc.cc_id);
      const effectiveMin = Math.max(simEpFrom, memberMin);
      const memberProps = simProps.filter(p=>Number(p.epoch_no) >= effectiveMin);
      const totalEligible = memberProps.length;
      const voted = memberProps.filter(p=>ccVotes[`${cc.cc_id}__${p.proposal_id}`]).length;
      const missed = totalEligible - voted;
      const factor = Math.max(0, 1 - missed/penaltyThreshold);
      const reward = ccBaseReward * factor;
      return {cc, eligible:totalEligible, voted, missed, factor, reward};
    });
  },[fMembers,simProps,simEpFrom,ccVotes,ccBaseReward,penaltyThreshold]);

  function exportCSV(mode){
    const csvProps = mode === "visible" ? pgP : fProps;
    const hdr=["CC Member ID","Name","Vote Count",
      ...csvProps.map(p=>{ const t = p.title ? p.title.slice(0,40) : shortId(p.proposal_id); return `[${p.proposal_type}] ${t}`; })];
    const rows=fMembers.map(c=>[c.cc_id,c.name||"",c.vote_count,
      ...csvProps.map(p=>{const v=gv(c.cc_id,p.proposal_id);const r=gr(c.cc_id,p.proposal_id);return v+(r?" [📎]":"");})]);
    const csv=[hdr,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");a.href=url;a.download=`cardano_cc_votes_${mode}.csv`;a.click();
    URL.revokeObjectURL(url);
  }

  async function showRationale(ccName, proposalTitle, url) {
    const resolved = resolveIpfsUrl(url);
    setRatModal({ ccName, proposalTitle, url: resolved, text: null, loading: true });
    const text = await fetchRationaleText(url);
    setRatModal(prev => prev ? { ...prev, text: text || T.cc_rationale_error, loading: false } : null);
  }

  async function exportRationalesCSV() {
    setRatExporting(true);
    const rows = [];
    for (const cc of fMembers) {
      for (const p of fProps) {
        const vote = ccVotes[`${cc.cc_id}__${p.proposal_id}`];
        if (!vote) continue;
        const rUrl = gr(cc.cc_id, p.proposal_id);
        let content = "";
        if (rUrl) {
          try { content = await fetchRationaleText(rUrl) || ""; } catch {}
        }
        rows.push([
          cc.name || cc.cc_id, p.proposal_id, p.title || "", p.proposal_type || "",
          vote, rUrl ? resolveIpfsUrl(rUrl) : "", content.replace(/[\r\n]+/g, " ").slice(0, 5000)
        ]);
      }
    }
    const hdr = ["CC Member", "Proposal ID", "Title", "Type", "Vote", "Rationale URL", "Rationale Content"];
    const csv = [hdr, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "cc_rationales.csv"; a.click();
    URL.revokeObjectURL(url);
    setRatExporting(false);
  }

  const ist={padding:"6px 10px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:12,outline:"none"};

  function IneligibleBadge(){return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:6,fontSize:9,fontWeight:600,
    background:"rgba(100,100,100,.15)",color:"rgba(160,160,160,.7)",border:"1px solid rgba(100,100,100,.2)"}}>—</span>;}

  return (
    <div>
      {/* CC Votes + Reward Simulator (unified page) */}
      <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 12px",marginBottom:12,display:"flex",flexWrap:"wrap",gap:8,alignItems:"flex-end"}}>
        {[
          {l:T.filter_search,el:<input type="text" placeholder={T.filter_search_ph} value={search} onChange={e=>setSearch(e.target.value)} style={{...ist,width:150}}/>},
          {l:T.filter_action_type,el:<select value={actType} onChange={e=>{setActType(e.target.value);setPPage(0)}} style={{...ist,minWidth:120}}>
            <option value="all">{T.filter_all}</option>{actTypes.map(t=><option key={t} value={t}>{actionLabel(t,T)}</option>)}</select>},
          {l:T.filter_epoch_from,el:<input type="number" placeholder="440" value={epFrom} onChange={e=>{setEpFrom(e.target.value);setPPage(0)}} style={{...ist,width:80}}/>},
          {l:T.filter_epoch_to,el:<input type="number" placeholder="999" value={epTo} onChange={e=>{setEpTo(e.target.value);setPPage(0)}} style={{...ist,width:80}}/>},
        ].map(({l,el},i)=>(<div key={i} style={{display:"flex",flexDirection:"column",gap:3}}>
          <label style={{fontSize:9,color:"var(--text2)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"}}>{l}</label>{el}</div>))}
        <div style={{position:"relative",display:"inline-block"}}>
          <button className="btn" onClick={()=>setCsvOpen(!csvOpen)}>📥 {T.csv_export} ▾</button>
          {csvOpen && <div style={{position:"absolute",top:"100%",left:0,marginTop:4,background:"var(--bg3)",border:"1px solid var(--border2)",
            borderRadius:6,overflow:"hidden",zIndex:50,minWidth:160,boxShadow:"0 8px 24px rgba(0,0,0,.5)"}}>
            <button onClick={()=>{exportCSV("visible");setCsvOpen(false)}} style={{display:"block",width:"100%",padding:"8px 12px",
              border:"none",background:"transparent",color:"var(--text)",fontSize:11,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}
              onMouseEnter={e=>e.target.style.background="var(--bg4)"} onMouseLeave={e=>e.target.style.background="transparent"}>📄 {T.csv_visible}</button>
            <button onClick={()=>{exportCSV("all");setCsvOpen(false)}} style={{display:"block",width:"100%",padding:"8px 12px",
              border:"none",background:"transparent",color:"var(--text)",fontSize:11,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}
              onMouseEnter={e=>e.target.style.background="var(--bg4)"} onMouseLeave={e=>e.target.style.background="transparent"}>📊 {T.csv_all}</button>
            <div style={{borderTop:"1px solid var(--border)"}}></div>
            <button onClick={()=>{exportRationalesCSV();setCsvOpen(false)}} disabled={ratExporting}
              style={{display:"block",width:"100%",padding:"8px 12px",
              border:"none",background:"transparent",color:"var(--text)",fontSize:11,cursor:"pointer",textAlign:"left",fontFamily:"inherit",
              opacity:ratExporting?0.5:1}}
              onMouseEnter={e=>e.target.style.background="var(--bg4)"} onMouseLeave={e=>e.target.style.background="transparent"}>
              📝 {ratExporting ? T.cc_rationale_exporting : T.cc_rationale_export}</button>
          </div>}
        </div>
        <button className="btn" onClick={()=>{setSearch("");setActType("all");setEpFrom("");setEpTo("");setPPage(0)}}
          style={{alignSelf:"flex-end",fontSize:11}}>{T.reset}</button>
      </div>

      <div style={{fontSize:11,color:"var(--text2)",marginBottom:8}}>
        {T.showing}: {T.cc_member} {fMembers.length} × {T.subtitle_actions} {fProps.length}
      </div>

      <div style={{border:"1px solid var(--border)",borderRadius:10,overflow:"hidden",background:"var(--bg2)"}}>
        <div style={{overflow:"auto",maxHeight:"calc(100vh - 420px)"}}>
          <table style={{borderCollapse:"separate",borderSpacing:0,width:"100%",minWidth:pgP.length*95+260}}>
            <thead><tr>
              <th style={{position:"sticky",left:0,top:0,zIndex:30,background:"var(--bg3)",padding:"8px 10px",textAlign:"left",

                boxShadow:"4px 0 8px rgba(0,0,0,.3)"}}>{T.cc_member}</th>
              {pgP.map((p,i)=>{const c=actionColor(p.proposal_type);
                const shortTitle = p.title ? (p.title.length > 20 ? p.title.slice(0,20)+"…" : p.title) : "";
                return(
                <th key={p.proposal_id||i} style={{position:"sticky",top:0,zIndex:20,background:"var(--bg3)",padding:"5px 3px",
                  textAlign:"center",borderBottom:"2px solid var(--border)",fontSize:9,fontWeight:600,minWidth:100,maxWidth:120,verticalAlign:"bottom"}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}} title={p.title||p.proposal_id}>
                    <span style={{display:"inline-block",padding:"1px 4px",borderRadius:3,fontSize:7,fontWeight:700,
                      textTransform:"uppercase",background:c+"15",color:c,border:`1px solid ${c}30`,lineHeight:1.6}}>{actionLabel(p.proposal_type,T)}</span>
                    {shortTitle && <span style={{fontSize:8,color:"var(--text)",lineHeight:1.3,maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"block"}}>{shortTitle}</span>}
                    <span style={{fontSize:7,color:"var(--text2)",opacity:.6}} title={p.proposal_id}>{shortId(p.tx_hash||p.proposal_id,6,4)}</span>
                  </div>
                </th>);})}
            </tr></thead>
            <tbody>
              {fMembers.map((cc,ri)=>{const bg=ri%2===0?"var(--bg2)":"rgba(255,255,255,.01)";return(

                    borderBottom:"1px solid var(--border)",borderRight:"2px solid var(--border)",minWidth:260,
                    boxShadow:"4px 0 8px rgba(0,0,0,.3)"}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Avatar name={cc.name||cc.cc_id} url={null}/>
                      <div style={{minWidth:0,flex:1}}>
                        <div style={{fontSize:11,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:150}}>
                          {cc.name||shortId(cc.cc_id)}</div>
                        <div style={{fontSize:10,color:"var(--text2)"}}>{cc.vote_count} / {cc.eligible_count||"?"} votes</div>
                      </div>
                    </div>
                  </td>
                  {pgP.map((p,ci)=>{const v=gv(cc.cc_id,p.proposal_id);const rUrl=gr(cc.cc_id,p.proposal_id);return(
                    <td key={p.proposal_id||ci} style={{padding:0,borderBottom:"1px solid var(--border)"}}>
                      <div className="vote-cell" style={{padding:"5px 3px",textAlign:"center"}}>

        <div style={{display:"flex",justifyContent:"flex-end",alignItems:"center",padding:"8px 12px",

          <PaginationBar label={T.subtitle_actions} page={pPage} setPage={setPPage} total={tPP}/>

              <div style={{fontSize:8,color:"var(--text2)"}}>{m===0?"—":"−"+Math.round((1-f)*ccBaseReward).toLocaleString()} ADA</div>
            </div>;})}
        </div>

        {/* Simulator table */}
        <div style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
          <table style={{borderCollapse:"collapse",width:"100%"}}>
            <thead><tr style={{background:"var(--bg3)"}}>
              {[T.cc_member,T.cc_sim_eligible,T.cc_sim_voted,T.cc_sim_missed,T.cc_sim_factor,T.cc_sim_reward].map((h,i)=>

                const bg=ri%2===0?"var(--bg2)":"rgba(255,255,255,.01)";

                return <tr key={d.cc.cc_id} style={{background:bg}}>

                    </div>

                  <td style={{padding:"8px 10px",textAlign:"center",borderBottom:"1px solid var(--border)",fontSize:12,color:"#22c55e",fontWeight:600}}>{d.voted}</td>
                  <td style={{padding:"8px 10px",textAlign:"center",borderBottom:"1px solid var(--border)",fontSize:12,
                    color:d.missed===0?"var(--text2)":d.missed>=penaltyThreshold?"#ef4444":"#f59e0b",fontWeight:d.missed>0?700:400}}>{d.missed}</td>
                  <td style={{padding:"8px 10px",textAlign:"center",borderBottom:"1px solid var(--border)"}}>
                    <span style={{fontSize:13,fontWeight:700,color:fc}}>{Math.round(d.factor*100)}%</span>
                    <div style={{width:"100%",height:4,background:"rgba(255,255,255,.1)",borderRadius:2,marginTop:3}}>
                      <div style={{width:`${Math.max(0,d.factor)*100}%`,height:"100%",background:fc,borderRadius:2,transition:"width .3s"}}/>
                    </div>
                  </td>
                  <td style={{padding:"8px 10px",textAlign:"center",borderBottom:"1px solid var(--border)",fontSize:13,fontWeight:700,
                    color:fc}}>{d.reward>0?"₳"+Math.round(d.reward).toLocaleString():"₳0"}</td>
                </tr>;})}
            </tbody>
          </table>
        </div>
        <div style={{fontSize:10,color:"var(--text2)",marginTop:8,opacity:.7}}>
          ℹ {T.cc_sim_note}
