// Veto Power Analysis — reusable component
function VetoPowerSection({ dreps, pp, T }) {
  if (!pp || !dreps || dreps.length === 0) return null;
  const CE = React.createElement;
  // Total active DRep stake (excluding abstain, including no_confidence)
  const vetoAllDreps = (dreps||[]).filter(d => d.drep_id !== "drep_always_abstain" && Number(d.amount) > 0);
  const totalActive = vetoAllDreps.reduce((s,d) => s + Number(d.amount), 0);
  const ncDrep = (dreps||[]).find(d => d.drep_id === "drep_always_no_confidence");
  const ncPower = ncDrep ? Number(ncDrep.amount) : 0;
  const ncPct = totalActive > 0 ? ncPower / totalActive * 100 : 0;
  const ENTITY_GROUPS = [
    { name: "Yoroi / EMURGO", match: d => /yoroi/i.test(d.name||"") || /emurgo/i.test(d.name||"") }
  ];
  const coalitionDreps = (() => {
    const singles = vetoAllDreps.filter(d => d.drep_id !== "drep_always_no_confidence");
    const merged = [];
    const used = new Set();
    for (const eg of ENTITY_GROUPS) {
      const members = singles.filter(d => eg.match(d));
      if (members.length > 1) {
        const totalAmt = members.reduce((s,d) => s + Number(d.amount), 0);
        merged.push({ drep_id: members.map(d=>d.drep_id).join("+"), name: eg.name, amount: totalAmt, merged: true, members });
        members.forEach(d => used.add(d.drep_id));
      }
    }
    for (const d of singles) { if (!used.has(d.drep_id)) merged.push(d); }
    return merged.sort((a,b) => Number(b.amount) - Number(a.amount));
  })();
  const actionTypes = [
    {key:"NoConfidence", label:T.type_noconf||"No Confidence", thr: Number(pp.dvt_motion_no_confidence)||0.67},
    {key:"UpdateCommittee", label:T.type_cc||"Update CC", thr: Number(pp.dvt_committee_normal)||0.67},
    {key:"NewConstitution", label:T.type_const||"New Constitution", thr: Number(pp.dvt_update_to_constitution)||0.75},
    {key:"HardForkInitiation", label:T.type_hardfork||"Hard Fork", thr: Number(pp.dvt_hard_fork_initiation)||0.6},
    {key:"TreasuryWithdrawals", label:T.type_treasury||"Treasury", thr: Number(pp.dvt_treasury_withdrawal)||0.67},
    {key:"ParamNetwork", label:"Param: Network", thr: Number(pp.dvt_p_p_network_group)||0.67, sub:true},
    {key:"ParamEconomic", label:"Param: Economic", thr: Number(pp.dvt_p_p_economic_group)||0.67, sub:true},
    {key:"ParamTechnical", label:"Param: Technical", thr: Number(pp.dvt_p_p_technical_group)||0.67, sub:true},
    {key:"ParamGovernance", label:"Param: Governance", thr: Number(pp.dvt_p_p_gov_group)||0.75, sub:true},
    {key:"InfoAction", label:T.type_info||"Info Action", thr: 0.51}
  ];
  const vetoRows = actionTypes.map(at => {
    const vetoPct = 1 - at.thr;
    const vetoNeeded = vetoPct * totalActive;
    const deficit = vetoNeeded - ncPower;
    let coalition = []; let cumStake = 0; let fulfilled = deficit <= 0;
    if (!fulfilled) {
      for (const d of coalitionDreps) {
        coalition.push(d); cumStake += Number(d.amount);
        if (cumStake >= deficit) { fulfilled = true; break; }
      }
    }
    return { ...at, vetoPct, vetoNeeded, deficit: Math.max(0, deficit), coalition, cumStake, fulfilled,
      deficitPct: totalActive > 0 ? Math.max(0, deficit) / totalActive * 100 : 0 };
  });
  const maxCoalitionSize = Math.max(...vetoRows.map(vr => vr.coalition.length));
  const rankingDreps = coalitionDreps.slice(0, Math.max(maxCoalitionSize, 5));
  let runningStake = ncPower;
  const ranking = rankingDreps.map((d, i) => {
    runningStake += Number(d.amount);
    return { ...d, rank: i+1, cumStake: runningStake, cumPct: totalActive > 0 ? runningStake / totalActive * 100 : 0 };
  });
  const thV = {fontSize:9,fontWeight:700,padding:"4px 6px",borderBottom:"2px solid var(--border)",color:"var(--text2)"};
  const tdV = {fontSize:10,padding:"3px 6px",borderBottom:"1px solid var(--border)"};
  const fmtS = fmtStakeShort;
  const fmtL = fmtAda; // global fmtAda has same signature (lovelace in)

  return CE("div",{style:{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:10}},
    CE("div",{style:{fontSize:13,fontWeight:700,color:"var(--accent2)",marginBottom:8}},"🛡️ "+(T.gov_veto||"Veto Power Analysis")),
    CE("div",{style:{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}},
      CE("div",{style:{background:"var(--bg3)",borderRadius:8,padding:"8px 12px",borderLeft:"3px solid #ef4444",flex:"1 1 200px"}},
        CE("div",{style:{fontSize:9,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}},"Auto-No (drep_always_no_confidence)"),
        CE("div",{style:{fontSize:14,fontWeight:700,color:"#ef4444"}},"₳"+fmtL(ncPower)),
        CE("div",{style:{fontSize:10,color:"var(--text2)"}},ncPct.toFixed(2)+"% of active stake")
      ),
      CE("div",{style:{background:"var(--bg3)",borderRadius:8,padding:"8px 12px",borderLeft:"3px solid #3b82f6",flex:"1 1 200px"}},
        CE("div",{style:{fontSize:9,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}},"Total Active DRep Stake"),
        CE("div",{style:{fontSize:14,fontWeight:700,color:"#3b82f6"}},"₳"+fmtL(totalActive))
      )
    ),
    CE("div",{style:{fontSize:9,color:"var(--text2)",marginBottom:10,lineHeight:1.5}},
      T.veto_explanation||"Veto = enough No votes to prevent a proposal from reaching its approval threshold. The drep_always_no_confidence auto-voter contributes No votes to every proposal. Below: top DReps by stake with cumulative veto power, then a table showing how many are needed per action type."),
    CE("div",{style:{fontSize:11,fontWeight:700,color:"var(--text)",marginBottom:4}},"DRep Veto Power Ranking"),
    CE("div",{style:{overflowX:"auto",marginBottom:12}},
      CE("table",{style:{width:"100%",borderCollapse:"collapse"}},
        CE("thead",null,CE("tr",null,
          CE("th",{style:{...thV,textAlign:"center",width:24}},"#"),
          CE("th",{style:{...thV,textAlign:"left"}},"DRep / Entity"),
          CE("th",{style:{...thV,textAlign:"right"}},"Stake"),
          CE("th",{style:{...thV,textAlign:"right"}},"Stake %"),
          CE("th",{style:{...thV,textAlign:"right"}},"Cumul. %"),
          CE("th",{style:{...thV,width:"30%"}},"Cumulative Veto Power")
        )),
        CE("tbody",null,
          CE("tr",{key:"nc",style:{background:"rgba(239,68,68,.06)"}},
            CE("td",{style:{...tdV,textAlign:"center",fontSize:9,color:"#ef4444"}},"🔴"),
            CE("td",{style:{...tdV,fontWeight:600,color:"#ef4444"}},"drep_always_no_confidence"),
            CE("td",{style:{...tdV,textAlign:"right"}},"₳"+fmtS(ncPower)),
            CE("td",{style:{...tdV,textAlign:"right"}},ncPct.toFixed(2)+"%"),
            CE("td",{style:{...tdV,textAlign:"right",fontWeight:600}},ncPct.toFixed(2)+"%"),
            CE("td",{style:{...tdV}},
              CE("div",{style:{background:"var(--bg)",borderRadius:3,overflow:"hidden",height:14,position:"relative"}},
                CE("div",{style:{background:"#ef4444",height:"100%",width:ncPct+"%",borderRadius:3,minWidth:2}}),
                CE("span",{style:{position:"absolute",right:3,top:0,fontSize:8,lineHeight:"14px",color:"var(--text2)"}},ncPct.toFixed(1)+"%")
              ))
          ),
          ranking.map((d, i) => {
            const vetosReached = vetoRows.filter(vr => vr.fulfilled && d.rank <= vr.coalition.length).length;
            return CE("tr",{key:d.drep_id||i,style:{background:i%2===0?"transparent":"var(--bg2)"}},
              CE("td",{style:{...tdV,textAlign:"center",fontWeight:600}},d.rank),
              CE("td",{style:{...tdV,fontWeight:600}},
                d.merged ? CE("span",null,d.name," ",CE("span",{style:{fontSize:7,color:"var(--text2)",background:"var(--bg3)",padding:"1px 3px",borderRadius:3}},"merged")) :
                d.name||d.drep_id.slice(0,25)),
              CE("td",{style:{...tdV,textAlign:"right"}},"₳"+fmtS(d.amount)),
              CE("td",{style:{...tdV,textAlign:"right"}},(totalActive>0?Number(d.amount)/totalActive*100:0).toFixed(2)+"%"),
              CE("td",{style:{...tdV,textAlign:"right",fontWeight:600}},d.cumPct.toFixed(2)+"%"),
              CE("td",{style:{...tdV}},
                CE("div",{style:{background:"var(--bg)",borderRadius:3,overflow:"hidden",height:14,position:"relative"}},
                  CE("div",{style:{background:"#ef444480",height:"100%",width:ncPct+"%",borderRadius:"3px 0 0 3px",minWidth:1}}),
                  CE("div",{style:{background:"#8b5cf6",height:"100%",width:(d.cumPct-ncPct)+"%",position:"absolute",left:ncPct+"%",top:0,borderRadius:"0 3px 3px 0",minWidth:1}}),
                  vetoRows.filter(vr=>vr.vetoPct*100<=50).map(vr =>
                    CE("div",{key:vr.key,title:vr.label+" veto: "+(vr.vetoPct*100).toFixed(0)+"%",
                      style:{position:"absolute",left:(vr.vetoPct*100)+"%",top:0,bottom:0,width:1,background:vr.fulfilled && d.rank <= vr.coalition.length ?"#34d39980":"rgba(255,255,255,.3)"}})
                  ),
                  CE("span",{style:{position:"absolute",right:3,top:0,fontSize:8,lineHeight:"14px",color:"var(--text2)"}},d.cumPct.toFixed(1)+"%")
                ))
            );
          })
        )
      )
    ),
    CE("div",{style:{fontSize:11,fontWeight:700,color:"var(--text)",marginBottom:4}},"Veto Threshold by Action Type"),
    CE("div",{style:{overflowX:"auto"}},
      CE("table",{style:{width:"100%",borderCollapse:"collapse"}},
        CE("thead",null,CE("tr",null,
          CE("th",{style:{...thV,textAlign:"left"}},"Action Type"),
          CE("th",{style:{...thV,textAlign:"center",color:"#34d399"}},"Approval"),
          CE("th",{style:{...thV,textAlign:"center",color:"#ef4444"}},"Veto Need"),
          CE("th",{style:{...thV,textAlign:"center",color:"#f59e0b"}},"Add. Needed"),
          CE("th",{style:{...thV,textAlign:"center",color:"#8b5cf6"}},"Min Coalition"),
          CE("th",{style:{...thV,textAlign:"left",color:"#8b5cf6"}},"Members")
        )),
        CE("tbody",null,
          vetoRows.map(vr => CE("tr",{key:vr.key,style:{background:vr.sub?"rgba(139,92,246,.04)":"transparent"}},
            CE("td",{style:{...tdV,fontWeight:600,paddingLeft:vr.sub?16:6,fontSize:vr.sub?9:10}},vr.label),
            CE("td",{style:{...tdV,textAlign:"center",color:"#34d399",fontWeight:600}},(vr.thr*100).toFixed(0)+"%"),
            CE("td",{style:{...tdV,textAlign:"center",color:"#ef4444",fontWeight:600}},(vr.vetoPct*100).toFixed(1)+"%"),
            CE("td",{style:{...tdV,textAlign:"center",color:vr.deficit<=0?"#34d399":"#f59e0b",fontWeight:600}},
              vr.deficit<=0 ? "✅ 0%" : vr.deficitPct.toFixed(1)+"%"),
            CE("td",{style:{...tdV,textAlign:"center",fontWeight:700,fontSize:12}},
              vr.deficit<=0 ? CE("span",{style:{color:"#ef4444"}},"⚠ 0") :
              !vr.fulfilled ? "—" :
              CE("span",{style:{color:"#8b5cf6"}},String(vr.coalition.length))),
            CE("td",{style:{...tdV,fontSize:9,color:"var(--text2)"}},
              vr.deficit<=0 ? "Auto-No alone" :
              !vr.fulfilled ? "Unreachable" :
              vr.coalition.map(d=>(d.merged?d.name:d.name||d.drep_id.slice(0,12))).join(", "))
          ))
        )
      )
    )
  );
}

// Vote Reminder — identify minimum voters needed to reach threshold
// ════════════════════════════════════════════════════════════════
function VoteReminderSection({ govInfo, T, dreps, votes, proposals, ccMembers, ccVotes, spoVotes, spoPoolInfo, pp }) {
  const [filterProp, setFilterProp] = React.useState("__all__");
  const [extraCount, setExtraCount] = React.useState(3);
  const [copied, setCopied] = React.useState(false);
  const [expandedProp, setExpandedProp] = React.useState(null);
  const [expandedCells, setExpandedCells] = React.useState({}); // key: "propId__col" → true
  const toggleCell = (propId, col) => setExpandedCells(prev => ({ ...prev, [`${propId}__${col}`]: !prev[`${propId}__${col}`] }));
  const isCellExpanded = (propId, col) => !!expandedCells[`${propId}__${col}`];

  const E = React.createElement;
  const fmtStake = fmtStakeShort;

  const curEp = (pp && pp.epoch) || currentEpochNow();
  // Blockfrost expiration = first epoch where proposal is INACTIVE
  // Voting deadline = start of expiration epoch = end of (expiration-1)
  const epochDeadlineTs = (ep) => EPOCH_208_TS + (ep - 208) * EPOCH_DURATION;
  const lastVoteEpoch = (ep) => ep - 1; // last epoch where votes are accepted
  const fmtDate = (ts) => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
  const fmtDateTime = (ts) => { const d = new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
  const daysLeft = (ep) => { const ms = epochDeadlineTs(ep) - Date.now(); return Math.max(0, Math.ceil(ms / 86400000)); };
  const activeProps = (proposals || []).filter(p => p.expiration && p.expiration > curEp);

  // ─── Thresholds (using shared functions) ───
  const CC_INELIG = ["NoConfidence"];

  // ─── Compute reminder data for ALL active proposals ───
  const allReminders = React.useMemo(() => {
    return activeProps.map(prop => {
      const ps = govInfo && govInfo.proposalSummaries && govInfo.proposalSummaries[prop.proposal_id];
      const hasDrepSummary = ps && ps.drep;
      const hasSpoSummary = ps && ps.spo;

      // DRep analysis — exclude auto voters and 0-stake DReps
      const drepThr = getDrepThreshold(pp, prop.proposal_type);
      const unvotedDreps = dreps.filter(d => {
        if (d.drep_id === "drep_always_abstain" || d.drep_id === "drep_always_no_confidence") return false;
        if (Number(d.amount) <= 0) return false;
        const v = votes[`${d.drep_id}__${prop.proposal_id}`];
        return !v || v === "NotVoted";
      }).sort((a, b) => Number(b.amount) - Number(a.amount));

      let deficit = 0, minDreps = [], cumStake = 0, thresholdMet = false, drepYesPct = 0;
      if (hasDrepSummary) {
        const yesPower = Number(ps.drep.yes_power) || 0;
        drepYesPct = ps.drep.yes_pct || 0;
        const yesPctFrac = drepYesPct / 100;
        const totalPower = yesPctFrac > 0 ? yesPower / yesPctFrac :
          dreps.filter(d=>d.drep_id!=="drep_always_abstain"&&d.drep_id!=="drep_always_no_confidence"&&Number(d.amount)>0)
            .reduce((s,d)=>s+Number(d.amount),0);
        const needed = drepThr * totalPower;
        deficit = needed - yesPower;
        thresholdMet = deficit <= 0;
        if (!thresholdMet) {
          for (const d of unvotedDreps) {
            minDreps.push(d);
            cumStake += Number(d.amount);
            if (cumStake >= deficit) { thresholdMet = true; break; }
          }
        }
      } else {
        // No summary — show top unvoted DReps (can't calculate deficit)
        minDreps = unvotedDreps.slice(0, 5);
      }
      const extraDreps = unvotedDreps.slice(minDreps.length, minDreps.length + extraCount);

      // CC analysis (independent of proposal summary)
      const ccCanVote = !CC_INELIG.includes(prop.proposal_type);
      let unvotedCC = [];
      if (ccCanVote) {
        unvotedCC = (ccMembers || []).filter(cc => {
          const v = (ccVotes || {})[`${cc.cc_id}__${prop.proposal_id}`];
          return !v || v === "NotVoted";
        });
      }

      // SPO analysis
      const spoThr = getSpoThreshold(pp, prop.proposal_type);
      let minSPOs = [];
      let spoThresholdMet = true;
      let spoYesPct = 0;
      if (spoThr !== null && hasSpoSummary) {
        spoYesPct = ps.spo.yes_pct || 0;
        const spoYesPower = Number(ps.spo.yes_power) || 0;
        const spoYesPctFrac = spoYesPct / 100;
        const spoTotalPower = spoYesPctFrac > 0 ? spoYesPower / spoYesPctFrac :
          Object.values(spoPoolInfo||{}).reduce((s,p)=>s+Number(p.active_stake||0),0);
        const spoNeeded = spoThr * spoTotalPower;
        const spoDeficit = spoNeeded - spoYesPower;
        spoThresholdMet = spoDeficit <= 0;
        if (!spoThresholdMet) {
          const votedPoolIds = new Set();
          Object.keys(spoVotes || {}).forEach(k => { if (k.endsWith("__" + prop.proposal_id)) votedPoolIds.add(k.split("__")[0]); });
          const unvotedPools = Object.keys(spoPoolInfo || {}).filter(pid => !votedPoolIds.has(pid)).map(pid => {
            const info = (spoPoolInfo || {})[pid] || {};
            return { pool_id: pid, ticker: info.ticker || "", active_stake: Number(info.active_stake || 0) };
          }).filter(p => p.active_stake > 0).sort((a, b) => b.active_stake - a.active_stake);
          let sCum = 0;
          for (const p of unvotedPools) {
            minSPOs.push(p);
            sCum += p.active_stake;
            if (sCum >= spoDeficit) break;
          }
        }
      }

      return {
        prop, ps,
        drepData: { threshold: drepThr, yesPct: drepYesPct, deficit, thresholdMet, minDreps, extraDreps, hasSummary: !!hasDrepSummary },
        ccData: { canVote: ccCanVote, threshold: getCCThreshold(pp), yesPct: ps && ps.cc ? ps.cc.yes_pct || 0 : 0, unvotedCC },
        spoData: spoThr !== null ? { threshold: spoThr, yesPct: spoYesPct, thresholdMet: spoThresholdMet, minSPOs, hasSummary: !!hasSpoSummary,
          extraSPOs: minSPOs.length > 0 ? Object.keys(spoPoolInfo||{}).filter(pid => {
            const voted = new Set(); Object.keys(spoVotes||{}).forEach(k=>{if(k.endsWith("__"+prop.proposal_id))voted.add(k.split("__")[0]);});
            return !voted.has(pid) && !minSPOs.find(s=>s.pool_id===pid);
          }).map(pid=>({pool_id:pid,ticker:(spoPoolInfo||{})[pid]?.ticker||"",active_stake:Number((spoPoolInfo||{})[pid]?.active_stake||0)}))
            .filter(p=>p.active_stake>0).sort((a,b)=>b.active_stake-a.active_stake).slice(0,extraCount) : []
        } : null
      };
    });
  }, [activeProps.length, extraCount, dreps, votes, ccVotes, spoVotes, govInfo]);

  const displayReminders = filterProp === "__all__" ? allReminders : allReminders.filter(r => r.prop.proposal_id === filterProp);

  // ─── Generate X post for one proposal ───
  const generatePostForProp = (rem) => {
    if (!rem || !rem.drepData) return "";
    const p = rem.prop, d = rem.drepData, c = rem.ccData, s = rem.spoData;
    const dl = daysLeft(p.expiration);
    const dlDate = fmtDate(epochDeadlineTs(p.expiration));
    let post = `📢 Cardano Vote Reminder\n\n`;
    post += `📋 ${p.title || p.proposal_id.slice(0,20)}\n`;
    post += `📊 ${p.proposal_type}\n`;
    post += `⏰ Deadline: E${lastVoteEpoch(p.expiration)} (${dlDate}) — ${dl} day${dl!==1?"s":""} left!\n\n`;
    if (d.hasSummary) {
      post += `🗳️ DRep: ${d.yesPct.toFixed(1)}% / ${(d.threshold*100).toFixed(0)}%`;
      if (d.deficit <= 0) post += ` ✅\n`;
      else {
        post += `\n`;
        [...d.minDreps, ...d.extraDreps].forEach(dr => {
          post += `  • ${dr.name || dr.drep_id.slice(0,20)} (₳${fmtAda(dr.amount)})\n`;
        });
      }
    } else {
      post += `🗳️ DRep: Unvoted top DReps:\n`;
      [...d.minDreps, ...d.extraDreps].forEach(dr => {
        post += `  • ${dr.name || dr.drep_id.slice(0,20)} (₳${fmtAda(dr.amount)})\n`;
      });
    }
    if (c.canVote && c.unvotedCC.length > 0) {
      post += `\n🏛️ CC${d.hasSummary ? ` (${c.yesPct.toFixed(0)}% / ${(c.threshold*100).toFixed(0)}%)` : ""}:\n`;
      c.unvotedCC.forEach(cc => { post += `  • ${cc.name || cc.cc_id}\n`; });
    }
    if (s && s.hasSummary) {
      post += `\n🏊 SPO: ${s.yesPct.toFixed(1)}% / ${(s.threshold*100).toFixed(0)}%`;
      if (s.thresholdMet) post += ` ✅\n`;
      else if (s.minSPOs.length > 0) {
        post += `\n`;
        [...s.minSPOs.slice(0,5), ...s.extraSPOs.slice(0,3)].forEach(sp => {
          post += `  • ${sp.ticker || sp.pool_id.slice(0,15)} (₳${fmtAda(sp.active_stake)})\n`;
        });
      } else post += `\n`;
    }
    post += `\n🔗 https://adatool.net\n#Cardano #Governance`;
    return post;
  };

  const copyAll = () => {
    const texts = displayReminders.filter(r => r.drepData).map(r => generatePostForProp(r));
    const text = texts.join("\n\n─────────────\n\n");
    navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  const copySingle = (rem) => {
    navigator.clipboard.writeText(generatePostForProp(rem)).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  const postToX = (text) => {
    const url = `https://x.com/intent/post?text=${encodeURIComponent(text)}`;
    window.open(url, "_blank", "noopener,noreferrer");
  };
  const postSingleToX = (rem) => postToX(generatePostForProp(rem));
  const postAllToX = () => {
    // X has a char limit (~280), so post the first proposal or a summary
    const texts = displayReminders.filter(r => r.drepData).map(r => generatePostForProp(r));
    if (texts.length === 1) { postToX(texts[0]); return; }
    // For multiple, post a combined summary (user can edit in X composer)
    postToX(texts.join("\n\n─────\n\n"));
  };

  // ─── Table header cell style ───
  const thS = {fontSize:9,fontWeight:700,padding:"4px 6px",textAlign:"left",borderBottom:"2px solid var(--border)",color:"var(--text2)",whiteSpace:"nowrap"};
  const tdS = {fontSize:10,padding:"4px 6px",borderBottom:"1px solid var(--border)",verticalAlign:"top"};

  return E("div",{style:{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 14px",marginBottom:10}},
    // Header + controls
    E("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}},
      E("div",{style:{fontSize:13,fontWeight:700,color:"var(--accent2)"}},"📢 Vote Reminder"),
      E("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
        // Filter selector
        E("select",{value:filterProp,onChange:e=>{ setFilterProp(e.target.value); setExpandedProp(null); },
          style:{fontSize:10,padding:"3px 6px",borderRadius:5,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",maxWidth:300}},
          E("option",{value:"__all__"},`All active (${activeProps.length})`),
          activeProps.map(p => E("option",{key:p.proposal_id,value:p.proposal_id},
            `${(p.proposal_type||"").slice(0,10)}: ${(p.title||p.proposal_id).slice(0,40)}`))
        ),
        // +α control
        E("div",{style:{display:"flex",alignItems:"center",gap:3}},
          E("span",{style:{fontSize:9,color:"var(--text2)"}},"+α:"),
          E("input",{type:"number",min:0,max:20,value:extraCount,onChange:e=>setExtraCount(Math.max(0,Math.min(20,Number(e.target.value)))),
            style:{width:36,fontSize:10,padding:"2px 3px",borderRadius:4,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",textAlign:"center"}})
        ),
        // Copy button
        E("button",{onClick:copyAll,className:"btn",
          style:{fontSize:10,padding:"4px 10px",background:copied?"#34d399":"var(--accent)",color:"#fff",fontWeight:600,borderRadius:5,border:"none",cursor:"pointer"}},
          copied ? "✅ Copied!" : "📋 Copy"),
        // Post to X button
        E("button",{onClick:postAllToX,className:"btn",
          style:{fontSize:10,padding:"4px 10px",background:"#000",color:"#fff",fontWeight:600,borderRadius:5,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3}},
          E("span",{style:{fontWeight:900,fontSize:11}},"𝕏"), " Post")
      )
    ),

    // Table
    activeProps.length > 0 ? E("div",{style:{overflowX:"auto"}},
      E("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:10}},
        E("thead",null,
          E("tr",null,
            E("th",{style:thS},"Proposal"),
            E("th",{style:{...thS}},"⏰ Deadline"),
            E("th",{style:{...thS,color:"#8b5cf6"}},"🗳️ DRep"),
            E("th",{style:{...thS,color:"#8b5cf6"}},"Min DReps for YES"),
            E("th",{style:{...thS,color:"#f59e0b"}},"🏛️ CC Unvoted"),
            E("th",{style:{...thS,color:"#06b6d4"}},"🏊 SPO"),
            E("th",{style:{...thS,color:"#06b6d4"}},"Min SPOs for YES"),
            E("th",{style:{...thS,width:32}},"")
          )
        ),
        E("tbody",null,
          displayReminders.map(rem => {
            const p = rem.prop, d = rem.drepData, c = rem.ccData, s = rem.spoData;

            // Helper: render name list with collapse/expand for long lists
            const COLLAPSE_MAX = 3; // show this many rows when collapsed
            const nameList = (items, extraItems, getName, getStake, colId) => {
              const allItems = [...items, ...(extraItems||[])];
              const total = allItems.length;
              const expanded = isCellExpanded(p.proposal_id, colId);
              const needsCollapse = total > COLLAPSE_MAX + 1; // +1: don't collapse if only 1 extra
              const visibleItems = needsCollapse && !expanded ? allItems.slice(0, COLLAPSE_MAX) : allItems;
              const minCount = items.length;
              const renderItem = (item, i) => E("div",{key:i,style:{fontSize:9,display:"flex",justifyContent:"space-between",padding:"1px 2px",fontWeight: i < minCount ? 600 : 400, opacity: i < minCount ? 1 : .55}},
                E("span",{style:{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:150}},getName(item)),
                getStake && E("span",{style:{color:"var(--text2)",whiteSpace:"nowrap",marginLeft:4}},getStake(item))
              );
              return E("div",null,
                visibleItems.map((item,i) => renderItem(item, i)),
                // separator between min and extra (only when expanded)
                expanded && extraItems && extraItems.length > 0 && minCount <= visibleItems.length ? null : null,
                needsCollapse && E("div",{
                  onClick:ev=>{ev.stopPropagation();toggleCell(p.proposal_id,colId);},
                  style:{fontSize:8,color:"var(--accent)",cursor:"pointer",padding:"2px 0",textAlign:"center",userSelect:"none",borderTop:"1px dashed var(--border)",marginTop:1}
                }, expanded ? "▲ collapse" : `▼ +${total - COLLAPSE_MAX} more`)
              );
            };

            return E("tr",{key:p.proposal_id},
              // Proposal name
              E("td",{style:{...tdS,maxWidth:180}},
                E("div",{style:{fontWeight:600,fontSize:10,lineHeight:"1.3"}},
                  `[${(p.proposal_type||"").slice(0,10)}] ${(p.title||p.proposal_id).slice(0,40)}`)
              ),
              // Deadline
              E("td",{style:{...tdS,whiteSpace:"nowrap",textAlign:"center"}},
                E("div",{style:{fontSize:10,fontWeight:700,color:daysLeft(p.expiration)<=5?"#f87171":daysLeft(p.expiration)<=15?"#f59e0b":"var(--text)"}},
                  `${daysLeft(p.expiration)}d`),
                E("div",{style:{fontSize:8,color:"var(--text2)"}},`E${lastVoteEpoch(p.expiration)}`),
                E("div",{style:{fontSize:7,color:"var(--text2)"}},fmtDateTime(epochDeadlineTs(p.expiration)))
              ),
              // DRep %
              E("td",{style:{...tdS,whiteSpace:"nowrap"}},
                d.hasSummary ?
                  E("span",{style:{color:d.deficit<=0?"#34d399":"#f87171",fontWeight:600}},
                    `${d.yesPct.toFixed(1)}%/${(d.threshold*100).toFixed(0)}%`) :
                  E("span",{style:{color:"var(--text2)",fontSize:9}},"?%"),
                d.hasSummary && d.deficit<=0 ? " ✅" : ""
              ),
              // Min DReps — show names + stake
              E("td",{style:{...tdS,minWidth:160}},
                d.hasSummary && d.deficit<=0 ? E("span",{style:{color:"#34d399",fontSize:9}},"✅ Threshold met") :
                !d.hasSummary ? nameList(d.minDreps, d.extraDreps, dr=>dr.name||dr.drep_id.slice(0,20), dr=>"₳"+fmtStake(dr.amount), "drep") :
                d.minDreps.length === 0 ? E("span",{style:{color:"#f87171",fontSize:9}},"Unreachable") :
                nameList(d.minDreps, d.extraDreps, dr=>dr.name||dr.drep_id.slice(0,20), dr=>"₳"+fmtStake(dr.amount), "drep")
              ),
              // CC unvoted — show names (collapsible)
              E("td",{style:{...tdS,minWidth:120}},
                !c.canVote ? E("span",{style:{color:"var(--text2)",opacity:.4,fontSize:9}},"N/A") :
                c.unvotedCC.length === 0 ? E("span",{style:{color:"#34d399",fontSize:9}},"✅ All voted") :
                (()=>{
                  const ccExpanded = isCellExpanded(p.proposal_id, "cc");
                  const ccNeedsCollapse = c.unvotedCC.length > COLLAPSE_MAX + 1;
                  const ccVisible = ccNeedsCollapse && !ccExpanded ? c.unvotedCC.slice(0, COLLAPSE_MAX) : c.unvotedCC;
                  return E("div",null,
                    E("div",{style:{fontSize:8,color:"var(--text2)",marginBottom:1}},`${c.yesPct.toFixed(0)}%/${(c.threshold*100).toFixed(0)}%`),
                    ccVisible.map(cc => E("div",{key:cc.cc_id,style:{fontSize:9,padding:"1px 0"}},
                      cc.name||cc.cc_id.slice(0,22))),
                    ccNeedsCollapse && E("div",{
                      onClick:ev=>{ev.stopPropagation();toggleCell(p.proposal_id,"cc");},
                      style:{fontSize:8,color:"var(--accent)",cursor:"pointer",padding:"2px 0",textAlign:"center",userSelect:"none",borderTop:"1px dashed var(--border)",marginTop:1}
                    }, ccExpanded ? "▲ collapse" : `▼ +${c.unvotedCC.length - COLLAPSE_MAX} more`)
                  );
                })()
              ),
              // SPO %
              E("td",{style:{...tdS,whiteSpace:"nowrap"}},
                !s ? E("span",{style:{color:"var(--text2)",opacity:.4,fontSize:9}},"N/A") :
                !s.hasSummary ? E("span",{style:{color:"var(--text2)",fontSize:9}},"?%") :
                E("span",{style:{color:s.thresholdMet?"#34d399":"#f87171",fontWeight:600}},
                  `${s.yesPct.toFixed(1)}%/${(s.threshold*100).toFixed(0)}%`),
                s && s.hasSummary && s.thresholdMet ? " ✅" : ""
              ),
              // Min SPOs — show tickers + stake
              E("td",{style:{...tdS,minWidth:140}},
                !s ? E("span",{style:{color:"var(--text2)",opacity:.4,fontSize:9}},"—") :
                !s.hasSummary ? E("span",{style:{color:"var(--text2)",fontSize:9}},"(no data)") :
                s.thresholdMet ? E("span",{style:{color:"#34d399",fontSize:9}},"✅ Threshold met") :
                s.minSPOs.length === 0 ? E("span",{style:{color:"#f87171",fontSize:9}},"Unreachable") :
                nameList(s.minSPOs, s.extraSPOs, sp=>sp.ticker||sp.pool_id.slice(0,12), sp=>"₳"+fmtStake(sp.active_stake), "spo")
              ),
              // Copy & Post
              E("td",{style:{...tdS,textAlign:"center",whiteSpace:"nowrap"}},
                E("button",{onClick:ev=>{ev.stopPropagation();copySingle(rem);},title:"Copy",
                  style:{fontSize:9,padding:"2px 5px",background:"transparent",color:"var(--text2)",border:"1px solid var(--border)",borderRadius:4,cursor:"pointer",marginRight:3}},"📋"),
                E("button",{onClick:ev=>{ev.stopPropagation();postSingleToX(rem);},title:"Post to X",
                  style:{fontSize:9,padding:"2px 5px",background:"#000",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontWeight:900}},"𝕏")
              )
            );
          })
        )
      )
    ) : E("div",{style:{fontSize:10,color:"var(--text2)",padding:8,textAlign:"center"}},"No active proposals")
  );
}

// (VetoRow removed — veto coalition now rendered inline in GovernanceDataTab)

// ═══════════════════════════════════════════════════════════════════
// AI Analysis Tab (β)
// ═══════════════════════════════════════════════════════════════════
function AIAnalysisTab({ aiDrepTendencies, aiProposalReasons, aiActionTypeSummary, aiMeta, proposals, T }) {
  const [subtab, setSubtab] = React.useState("tendencies");
  const [selectedProposal, setSelectedProposal] = React.useState("");
  const [expandedDrep, setExpandedDrep] = React.useState(null);

  const hasData = aiDrepTendencies || aiProposalReasons || aiActionTypeSummary;

  if (!hasData) {
    return React.createElement("div", {className:"card",style:{padding:32,textAlign:"center"}},
      React.createElement("h2", {style:{color:"#4fc3f7",marginBottom:16}}, "🤖 AI分析 (β)"),
      React.createElement("p", {style:{color:"#8899aa"}}, "AI分析データはまだ生成されていません。"),
      React.createElement("p", {style:{color:"#667788",fontSize:12,marginTop:8}}, "GitHub ActionsでClaude APIによる分析が実行されると、ここに結果が表示されます。")
    );
  }

  const fmtStake = fmtStakeShort;

  const fmtDate = (iso) => iso ? iso.split("T")[0] : "—";

  // Sub-tab: DRep Tendencies
  const renderTendencies = () => {
    if (!aiDrepTendencies?.dreps) return React.createElement("p",{style:{color:"#8899aa"}},"データなし");
    const dreps = Object.entries(aiDrepTendencies.dreps)
      .sort((a,b) => Number(b[1].stake) - Number(a[1].stake));

    return React.createElement("div", null,
      React.createElement("p", {style:{color:"#8899aa",fontSize:12,marginBottom:12}},
        `${dreps.length} DReps analyzed · Generated: ${fmtDate(aiDrepTendencies.generatedAt)}`),
      dreps.map(([id, d]) => {
        const isExpanded = expandedDrep === id;
        const total = d.voteSpread.yes + d.voteSpread.no + d.voteSpread.abstain;
        const yesPct = total ? (d.voteSpread.yes/total*100).toFixed(0) : 0;
        const noPct = total ? (d.voteSpread.no/total*100).toFixed(0) : 0;
        const absPct = total ? (d.voteSpread.abstain/total*100).toFixed(0) : 0;

        return React.createElement("div", {
          key: id,
          style:{
            background:"#181e2a", borderRadius:8, padding:14, marginBottom:8,
            cursor:"pointer", border: isExpanded ? "1px solid #4fc3f7" : "1px solid #232b3e"
          },
          onClick: () => setExpandedDrep(isExpanded ? null : id)
        },
          // Header row
          React.createElement("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            React.createElement("div", null,
              React.createElement("span", {style:{color:"#e0e6ed",fontWeight:"bold"}}, `#${d.rank} ${d.name}`),
              React.createElement("span", {style:{color:"#8899aa",fontSize:11,marginLeft:8}}, `₳${fmtStake(d.stake)}`)
            ),
            React.createElement("div", {style:{display:"flex",gap:4,fontSize:11}},
              React.createElement("span", {style:{color:"#4fc3f7"}}, `Y:${d.voteSpread.yes}`),
              React.createElement("span", {style:{color:"#ff7043"}}, `N:${d.voteSpread.no}`),
              React.createElement("span", {style:{color:"#ffb74d"}}, `A:${d.voteSpread.abstain}`)
            )
          ),
          // Vote bar
          total > 0 && React.createElement("div", {
            style:{display:"flex",height:4,borderRadius:2,overflow:"hidden",margin:"6px 0",background:"#232b3e"}
          },
            React.createElement("div", {style:{width:yesPct+"%",background:"#4fc3f7"}}),
            React.createElement("div", {style:{width:noPct+"%",background:"#ff7043"}}),
            React.createElement("div", {style:{width:absPct+"%",background:"#ffb74d"}})
          ),
          // Summary
          React.createElement("p", {style:{color:"#b0bec5",fontSize:12,margin:"4px 0 0"}}, d.tendencySummary),
          // Expanded details
          isExpanded && React.createElement("div", {style:{marginTop:10,paddingTop:10,borderTop:"1px solid #232b3e"}},
            d.keyPositions && d.keyPositions.length > 0 && React.createElement("div", {style:{marginBottom:8}},
              React.createElement("span", {style:{color:"#4fc3f7",fontSize:11,fontWeight:"bold"}}, "主要なポジション:"),
              React.createElement("ul", {style:{margin:"4px 0",paddingLeft:16}},
                d.keyPositions.map((pos, i) =>
                  React.createElement("li", {key:i,style:{color:"#c0cad6",fontSize:12,marginBottom:2}}, pos)
                )
              )
            ),
            d.votingPattern && React.createElement("p", {style:{color:"#8899aa",fontSize:11}},
              "📊 " + d.votingPattern
            ),
            React.createElement("p", {style:{color:"#556677",fontSize:10,marginTop:4}},
              `投票根拠付き: ${d.withRationale}/${d.totalVotes}件 · 最終分析: ${fmtDate(d.lastAnalyzedAt)}` +
              (d.cached ? " (cached)" : "")
            )
          )
        );
      })
    );
  };

  // Sub-tab: Proposal Vote Reasons
  const renderProposalReasons = () => {
    if (!aiProposalReasons?.proposals) return React.createElement("p",{style:{color:"#8899aa"}},"データなし");
    const propEntries = Object.entries(aiProposalReasons.proposals);

    // Default to first proposal with reasons
    const selected = selectedProposal || (propEntries.find(([,v]) =>
      (v.yesReasons?.length || 0) + (v.noReasons?.length || 0) > 0
    ) || propEntries[0])?.[0] || "";

    const propData = aiProposalReasons.proposals[selected];

    const renderReasonGroup = (reasons, label, color) => {
      if (!reasons || reasons.length === 0) return null;
      return React.createElement("div", {style:{marginBottom:16}},
        React.createElement("h4", {style:{color,fontSize:13,marginBottom:6}}, label),
        reasons.map((r, i) =>
          React.createElement("div", {key:i,style:{background:"#1a2030",borderRadius:6,padding:10,marginBottom:6,borderLeft:`3px solid ${color}`}},
            React.createElement("p", {style:{color:"#e0e6ed",fontSize:12,marginBottom:4}}, r.reason),
            React.createElement("div", {style:{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}},
              React.createElement("span", {style:{color:"#8899aa",fontSize:11}}, `合計ステーク: ₳${fmtStake(r.totalStake)}`),
              (r.dreps || []).map((dr, j) =>
                React.createElement("span", {key:j,style:{color:"#b0bec5",fontSize:10,background:"#232b3e",borderRadius:4,padding:"2px 6px"}},
                  dr.name || dr
                )
              )
            )
          )
        )
      );
    };

// Main App (Tab Controller + Shared Data)
// ════════════════════════════════════════════════════════════════
function App() {
  const [lang,setLang] = useHashState("lang","en");
  const T = LANG[lang];
  const [tab,setTab] = useHashState("tab","dashboard");
  const [apiKey, setApiKey] = React.useState(getBfKey());
  const [apiKeyInput, setApiKeyInput] = React.useState(getBfKey());

  // Shared state
  const [dreps,setDreps] = React.useState([]);
  const [allDreps,setAllDreps] = React.useState([]);
  const [proposals,setProposals] = React.useState([]);
  const [votes,setVotes] = React.useState({});
  const [ccMembers,setCCMembers] = React.useState([]);
  const [ccVotes,setCCVotes] = React.useState({});
  const [ccRationales,setCCRationales] = React.useState({});
  const [drepRationales,setDrepRationales] = React.useState({});
  const [stakeHistory,setStakeHistory] = React.useState([]);
  const [loading,setLoading] = React.useState(true);
  const [pageLoading,setPageLoading] = React.useState(false);
  const [stage,setStage] = React.useState("");
  const [error,setError] = React.useState(null);
  const [isDemo,setIsDemo] = React.useState(false);
  const [warnings,setWarnings] = React.useState([]);
  const [hasMore,setHasMore] = React.useState(true);
  const [voteData, setVoteData] = React.useState({});
  const [totalActions, setTotalActions] = React.useState(0);
  const [periodVoteData, setPeriodVoteData] = React.useState({});
  const [loadingVotes, setLoadingVotes] = React.useState(false);
  const [simProgress, setSimProgress] = React.useState("");
  const [apiStats, setApiStats] = React.useState({calls:0,cached:0});

  // SPO state
  const [spoVotes, setSpoVotes] = React.useState({});     // {poolId__propKey: "Yes"/"No"/"Abstain"}
  const [spoPoolInfo, setSpoPoolInfo] = React.useState({}); // {poolId: {ticker, name, pledge_drep}}
  // Governance data state
  const [govInfo, setGovInfo] = React.useState(null); // {network, protocolParams, proposalSummaries}
  const [aiDrepTendencies, setAiDrepTendencies] = React.useState(null);
  const [aiProposalReasons, setAiProposalReasons] = React.useState(null);
  const [aiActionTypeSummary, setAiActionTypeSummary] = React.useState(null);
  const [aiMeta, setAiMeta] = React.useState(null);
  const spoLoadedRef = React.useRef(false);

  const loadedPageRef = React.useRef(1);
  const gaMapRef = React.useRef({});
  const allDrepsLoadedRef = React.useRef(false);
  const voteDataLoadedRef = React.useRef(false);

  const [dataSource, setDataSource] = React.useState(""); // "static" | "api" | "demo"

  const addLog = React.useCallback((level, msg) => { console.log(`[${level}] ${msg}`); }, []);

  // Try static data first, then Blockfrost API, then show key setup
  React.useEffect(()=>{ loadStatic().catch(() => { if (getBfKey()) loadLive(); else setLoading(false); }); },[]);

  // ── SPO data: loaded from static JSON in loadStatic() ──
  // spoLoadedRef is set to true when static data is loaded; no live Koios fallback needed

  React.useEffect(() => {
    const interval = setInterval(() => setApiStats(getApiStats()), 2000);
    return () => clearInterval(interval);
  }, []);

  function saveApiKey() {
    const trimmed = apiKeyInput.trim();
    if (!trimmed) return;
    setBfKey(trimmed);
    setApiKey(trimmed);
    // Clear old caches when key changes
    localStorage.removeItem(SIM_CACHE_KEY);
    _cache.clear();
    loadLive();
  }

  function loadDemo() {
    const d = demoData();
    setDreps(d.dreps); setAllDreps(d.dreps); setProposals(d.proposals); setVotes(d.votes);
    setIsDemo(true); setLoading(false); setError(null); setWarnings([]); setHasMore(false);
  }

  // ── Load from pre-fetched static JSON files (GitHub Actions) ──
  async function loadStatic() {
    setStage("Checking for static data…");
    const base = "./data/";
    const metaRes = await fetch(base + "meta.json?t=" + Date.now());
    if (!metaRes.ok) throw new Error("No static data");
    const meta = await metaRes.json();
    const v = "?v=" + (meta.updated_ts || Date.now());

    setStage("Loading static data…");
    const [drepsRes, proposalsRes, votesRes, simRes, ccMembersRes, ccVotesRes, ccRatRes, histRes, drepRatRes, spoVotesRes, spoPoolsRes, govInfoRes] = await Promise.all([
      fetch(base + "dreps.json" + v),
      fetch(base + "proposals.json" + v),
      fetch(base + "votes.json" + v),
      fetch(base + "simulator.json" + v),
      fetch(base + "cc-members.json" + v).catch(() => null),
      fetch(base + "cc-votes.json" + v).catch(() => null),
      fetch(base + "cc-rationales.json" + v).catch(() => null),
      fetch(base + "drep-history.json" + v).catch(() => null),
      fetch(base + "drep-rationales.json" + v).catch(() => null),
      fetch(base + "spo-votes.json" + v).catch(() => null),
      fetch(base + "spo-pools.json" + v).catch(() => null),
      fetch(base + "governance-info.json" + v).catch(() => null)
    ]);
    if (!drepsRes.ok || !proposalsRes.ok || !votesRes.ok) throw new Error("Static data incomplete");

    const drepsData = await drepsRes.json();
    const proposalsData = await proposalsRes.json();
    const votesData = await votesRes.json();   // flat map: "drepId__propKey" → "Yes"/"No"/"Abstain"

    // Rebuild votes into the format the dashboard expects: { "drepId__propKey": "Yes", ... }
    // The static votes.json is already in that format
    setDreps(drepsData);
    setAllDreps(drepsData);
    setProposals(proposalsData);
    setVotes(votesData);
    // Load CC data if available
    try {
      if (ccMembersRes && ccMembersRes.ok) setCCMembers(await ccMembersRes.json());
      if (ccVotesRes && ccVotesRes.ok) setCCVotes(await ccVotesRes.json());
      if (ccRatRes && ccRatRes.ok) setCCRationales(await ccRatRes.json());
    } catch(e) { console.warn("CC data load error:", e); }
    // Load DRep rationales if available
    try {
      if (drepRatRes && drepRatRes.ok) setDrepRationales(await drepRatRes.json());
    } catch(e) { console.warn("DRep rationales load error:", e); }
    // Load SPO data if available
    try {
      if (spoVotesRes && spoVotesRes.ok) setSpoVotes(await spoVotesRes.json());
      if (spoPoolsRes && spoPoolsRes.ok) setSpoPoolInfo(await spoPoolsRes.json());
      if (spoVotesRes && spoVotesRes.ok) spoLoadedRef.current = true;
    } catch(e) { console.warn("SPO data load error:", e); }
    // Load governance info if available
    try {
      if (govInfoRes && govInfoRes.ok) setGovInfo(await govInfoRes.json());
    } catch(e) { console.warn("Governance info load error:", e); }
    // Load stake history if available
    try {
      if (histRes && histRes.ok) setStakeHistory(await histRes.json());
    } catch(e) { console.warn("History data load error:", e); }
    // Load AI analysis data (lazy — non-blocking)
    Promise.all([
      fetch(base + "ai-drep-tendencies.json" + v).catch(() => null),
      fetch(base + "ai-proposal-reasons.json" + v).catch(() => null),
      fetch(base + "ai-action-type-summary.json" + v).catch(() => null),
      fetch(base + "ai-meta.json" + v).catch(() => null)
    ]).then(async ([dtRes, prRes, atsRes, metaRes]) => {
      try { if (dtRes && dtRes.ok) setAiDrepTendencies(await dtRes.json()); } catch(e) {}
      try { if (prRes && prRes.ok) setAiProposalReasons(await prRes.json()); } catch(e) {}
      try { if (atsRes && atsRes.ok) setAiActionTypeSummary(await atsRes.json()); } catch(e) {}
      try { if (metaRes && metaRes.ok) setAiMeta(await metaRes.json()); } catch(e) {}
    });
    setIsDemo(false);
    setHasMore(false);
    setDataSource("static");
    allDrepsLoadedRef.current = true;

    // Build gaMapRef for dashboard from proposals
    const gaMap = {};
    proposalsData.forEach(p => {
      gaMap[p.proposal_id] = p;
    });
    gaMapRef.current = gaMap;

    // Pre-load simulator data if available
    if (simRes.ok) {
      try {
        const simData = await simRes.json();
        // Pre-populate vote data for simulator
        const vd = simData.drepVoteCounts || {};
        const maxVotes = simData.maxVotes || 0;
        const flatExpirations = simData.proposalExpirations || {};
        const drepVotedProposals = {};
        if (simData.drepVotedProposals) {
          Object.entries(simData.drepVotedProposals).forEach(([id, arr]) => {
            drepVotedProposals[id] = new Set(arr);
          });
        }
        window.__simVoteRaw = { proposalExpirations: flatExpirations, drepVotedProposals };
        setVoteData(vd);
        setTotalActions(maxVotes);
        voteDataLoadedRef.current = true;
      } catch(e) { console.warn("Simulator data parse error:", e); }
    }

    // Show data freshness
    const age = Math.round((Date.now() - new Date(meta.updated_at).getTime()) / 60000);
    const freshness = age < 60 ? `${age}min ago` : `${Math.round(age / 60)}h ago`;
    setSimProgress(`Static data: ${meta.drep_count} DReps, ${meta.proposal_count} proposals (${freshness})`);
    setWarnings([]);
    setLoading(false);
    setError(null);
    console.log(`[Static] Loaded: ${drepsData.length} DReps, ${proposalsData.length} proposals, ${Object.keys(votesData).length} votes (updated ${meta.updated_at})`);
  }

  async function loadLive() {
    try {
      if (!getBfKey()) { setError(T.api_key_required); setLoading(false); return; }
      resetApiStats();
      setLoading(true); setError(null); setIsDemo(false);
      loadedPageRef.current = 1; gaMapRef.current = {};
      allDrepsLoadedRef.current = false; voteDataLoadedRef.current = false;

      setStage(T.loading_dreps);
      const { dreps: chunk, nextPage, reachedEnd } = await fetchDrepRange(1, 1, addLog, setStage);
      if (chunk.length === 0) { loadDemo(); return; }
      const seen = new Set();
      const uniqueDreps = chunk.filter(d => { if(seen.has(d.drep_id)) return false; seen.add(d.drep_id); return true; });
      uniqueDreps.sort((a,b) => Number(b.amount) - Number(a.amount));
      loadedPageRef.current = nextPage;
      setHasMore(!reachedEnd);

      setStage(T.loading_votes);
      const { vm, gaMap, totalVotes } = await fetchVotesForDreps(uniqueDreps, addLog, setStage, T.loading_votes);
      gaMapRef.current = { ...gaMap };

      // Enrich proposals with type + title from Blockfrost
      setStage(T.loading_proposals);
      await enrichProposals(gaMapRef.current, addLog, setStage);

      const allProposals = Object.values(gaMapRef.current);
      allProposals.sort((a,b) => (b.expiration || 0) - (a.expiration || 0));

      setDreps(uniqueDreps); setAllDreps(uniqueDreps);
      setProposals(allProposals); setVotes(vm);
      setWarnings([]); setLoading(false);
    } catch(e) { setError(e.message); setLoading(false); }
  }

  async function loadMoreDreps() {
    if (pageLoading || !hasMore || loadedPageRef.current < 0) return;
    setPageLoading(true);
    const page = loadedPageRef.current;
    setStage(`${T.loading_dreps} (page ${page})`);
    try {
      const { dreps: chunk, nextPage, reachedEnd } = await fetchDrepRange(page, 1, addLog, setStage);
      if (chunk.length === 0) { setHasMore(false); setPageLoading(false); return; }
      if (reachedEnd) setHasMore(false);
      loadedPageRef.current = nextPage;
      const existingIds = new Set(dreps.map(d => d.drep_id));
      const newDreps = chunk.filter(d => !existingIds.has(d.drep_id));
      setStage(T.loading_votes);
      const { vm: newVm, gaMap: newGaMap } = await fetchVotesForDreps(newDreps, addLog, setStage, T.loading_votes);
      Object.assign(gaMapRef.current, newGaMap);

      // Enrich new proposals
      await enrichProposals(gaMapRef.current, addLog, setStage);

      const allProposals = Object.values(gaMapRef.current);
      allProposals.sort((a,b) => (b.expiration || 0) - (a.expiration || 0));
      const merged = [...dreps, ...newDreps];
      merged.sort((a,b) => Number(b.amount) - Number(a.amount));
      setDreps(merged); setAllDreps(prev => {
        const ids = new Set(prev.map(d=>d.drep_id));
        const extra = newDreps.filter(d=>!ids.has(d.drep_id));
        const all = [...prev, ...extra]; all.sort((a,b)=>Number(b.amount)-Number(a.amount)); return all;
      });
      setProposals(allProposals); setVotes(prev => ({...prev, ...newVm}));
    } catch(e) { addLog("ERROR", e.message); }
    setPageLoading(false);
  }

  // Load ALL DReps for simulator (lazy, once)
  async function ensureAllDrepsLoaded() {
    if (allDrepsLoadedRef.current || isDemo) return;
    allDrepsLoadedRef.current = true;
    setSimProgress("Loading all DReps for simulator...");
    const all = await fetchAllDreps((count, total) => {
      setSimProgress(`${count}/${total} DReps...`);
    });
    setAllDreps(all);
    if (all.length > dreps.length) {
      setDreps(all); setHasMore(false);
    }
    setSimProgress(`${all.length} DReps loaded`);
  }

  // Load vote data for simulator — uses proposal expiration epochs for vote period
  async function ensureVoteDataLoaded() {
    if (voteDataLoadedRef.current || isDemo) return;
    voteDataLoadedRef.current = true;

    const cached = loadSimCache();
    if (cached && cached.vd && cached.proposalExpirations && cached.drepVotedProposals) {
      setSimProgress("Restoring cached vote data…");
      setLoadingVotes(true);
      const drepVotedProposals = {};
      Object.entries(cached.drepVotedProposals).forEach(([id, arr]) => { drepVotedProposals[id] = new Set(arr); });
      window.__simVoteRaw = { proposalExpirations: cached.proposalExpirations, drepVotedProposals };
      setVoteData(cached.vd); setTotalActions(cached.maxVotes);
      setLoadingVotes(false);
      setSimProgress(`Cached: ${Object.keys(cached.vd).length} DReps (${Math.round((Date.now() - cached.ts) / 60000)}min ago)`);
      return;
    }

    setLoadingVotes(true);
    const toFetch = allDreps.slice(0, 200);
    setSimProgress(`Vote data: 0/${toFetch.length}`);
    const vd = {};
    let maxVotes = 0;
    const proposalExpirations = {}; // propKey → expiration epoch
    const drepVotedProposals = {}; // drepId → Set<propKey>

    for (let i = 0; i < toFetch.length; i += VOTE_BATCH) {
      const batch = toFetch.slice(i, i + VOTE_BATCH);
      const results = await Promise.allSettled(batch.map(async d => {
        const votes = await fetchAllVotesForDrep(d.drep_id);
        const votedProposals = new Set();
        votes.forEach(v => {
          const propTxHash = v.proposal_tx_hash || "";
          const propCertIdx = v.proposal_cert_index != null ? v.proposal_cert_index : -1;
          if (propTxHash) {
            const propKey = `${propTxHash}#${propCertIdx}`;
            votedProposals.add(propKey);
            if (!proposalExpirations[propKey]) {
              proposalExpirations[propKey] = { tx_hash: propTxHash, cert_index: propCertIdx, expiration: 0 };
            }
          }
        });
        return { id: d.drep_id, count: votes.length, votedProposals };
      }));
      results.forEach(r => {
        if (r.status === "fulfilled") {
          const { id, count, votedProposals } = r.value;
          vd[id] = count;
          if (count > maxVotes) maxVotes = count;
          drepVotedProposals[id] = votedProposals;
        }
      });
      setSimProgress(`Vote data: ${Math.min(i + VOTE_BATCH, toFetch.length)}/${toFetch.length}`);
    }

    // Fetch proposal expirations from Blockfrost
    setSimProgress("Fetching proposal expirations...");
    const propEntries = Object.entries(proposalExpirations);
    for (let i = 0; i < propEntries.length; i += VOTE_BATCH) {
      const batch = propEntries.slice(i, i + VOTE_BATCH);
      await Promise.allSettled(batch.map(async ([propKey, info]) => {
        try {
          const detail = await bfFetchJSON(`/governance/proposals/${info.tx_hash}/${info.cert_index}`);
          if (detail && detail.expiration) {
            proposalExpirations[propKey].expiration = detail.expiration;
          }
        } catch(e) {}
      }));
      setSimProgress(`Proposal expirations: ${Math.min(i + VOTE_BATCH, propEntries.length)}/${propEntries.length}`);
    }

    // Flatten expirations for storage
    const flatExpirations = {};
    Object.entries(proposalExpirations).forEach(([k, v]) => { flatExpirations[k] = v.expiration || 0; });
    window.__simVoteRaw = { proposalExpirations: flatExpirations, drepVotedProposals };

    // Save to cache
    const serialDrepProps = {};
    Object.entries(drepVotedProposals).forEach(([id, s]) => { serialDrepProps[id] = [...s]; });
    saveSimCache({ vd, maxVotes, proposalExpirations: flatExpirations, drepVotedProposals: serialDrepProps });

    setVoteData(vd); setTotalActions(maxVotes);
    setLoadingVotes(false);
    setSimProgress(`${Object.keys(vd).length} DReps loaded & cached`);
  }

  // Compute period vote data using proposal expiration epochs
  function computePeriodVoteData(startDate, endDate) {
    const raw = window.__simVoteRaw;
    if (!raw || !startDate || !endDate) return {};
    const { proposalExpirations, drepVotedProposals } = raw;

    const startTs = new Date(startDate + "T00:00:00Z").getTime() / 1000;
    const endTs = new Date(endDate + "T23:59:59Z").getTime() / 1000;

    // Find proposals whose expiration epoch falls in the date range
    const proposalsInRange = new Set();
    Object.entries(proposalExpirations).forEach(([propKey, exp]) => {
      const expEpoch = typeof exp === "number" ? exp : (exp?.expiration || 0);
      if (!expEpoch) return;
      const expTs = epochToTimestamp(expEpoch);
      if (expTs >= startTs && expTs <= endTs) proposalsInRange.add(propKey);
    });

    console.log(`[VotePeriod] Range: ${startDate}~${endDate}, ${proposalsInRange.size}/${Object.keys(proposalExpirations).length} proposals in range`);

    const actionsInPeriod = proposalsInRange.size;
    const result = {};
    Object.entries(drepVotedProposals).forEach(([drepId, votedSet]) => {
      let votesInPeriod = 0, rationalesInPeriod = 0;
      proposalsInRange.forEach(propKey => {
        if (votedSet.has(propKey)) {
          votesInPeriod++;
          if (drepRationales[`${drepId}__${propKey}`]) rationalesInPeriod++;
        }
      });
      result[drepId] = { votesInPeriod, actionsInPeriod, rationalesInPeriod };
    });
    return result;
  }

  // When switching to simulator tab, load all DReps + vote data
  React.useEffect(() => {
    if (tab === "simulator" && !loading && !isDemo && (getBfKey() || dataSource === "static")) {
      if (dataSource === "static") {
        // Static data already has all DReps + simulator data pre-loaded
        return;
      }
      ensureAllDrepsLoaded().then(() => ensureVoteDataLoaded());
    }
  }, [tab, loading, allDreps.length, dataSource]);

  // API Key Setup Screen (skip if static data loaded)
  if (!apiKey && !loading && !isDemo && dataSource !== "static") {
    return (
      <div className="fade-in" style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:24}}>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.02em"}}>Adatool <span style={{color:"var(--accent)"}}>Gov</span></div>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:12,padding:24,maxWidth:440,width:"100%"}}>
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:8}}>{T.api_key}</h2>
          <p style={{fontSize:12,color:"var(--text2)",marginBottom:16}}>
            {T.api_key_desc}: <a href="https://blockfrost.io" target="_blank" rel="noopener">blockfrost.io</a>
          </p>
          <div style={{display:"flex",gap:8}}>
            <input type="text" placeholder={T.api_key_ph} value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && saveApiKey()}
              style={{flex:1,padding:"8px 12px",borderRadius:6,border:"1px solid var(--border)",background:"var(--bg)",color:"var(--text)",fontSize:13,outline:"none"}} />
            <button className="btn btn-primary" onClick={saveApiKey} disabled={!apiKeyInput.trim()}>{T.api_key_save}</button>
          </div>
        </div>
        <button className="btn" onClick={loadDemo} style={{marginTop:8}}>{T.demo_btn}</button>
      </div>
    );
  }

  if(loading) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20,padding:24}}>
      <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.02em"}}>Adatool <span style={{color:"var(--accent)"}}>Gov</span></div>
      <div className="loader"><span/><span/><span/></div>
      <div style={{color:"var(--text2)",fontSize:13}}>{stage}</div>
    </div>
  );

  if(error) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24}}>
      <div style={{fontSize:20,fontWeight:700,color:"#ef4444"}}>{T.error_title}</div>
      <div style={{color:"var(--text2)",maxWidth:460,textAlign:"center",fontSize:13}}>{error}</div>
      <div style={{display:"flex",gap:10}}>
        <button className="btn btn-primary" onClick={loadLive}>{T.retry}</button>
        <button className="btn" onClick={loadDemo}>{T.demo_btn}</button>
        <button className="btn" onClick={()=>{ setBfKey(""); setApiKey(""); setApiKeyInput(""); setError(null); }}>{T.api_key_change}</button>
      </div>
    </div>
  );

  return (
    <div className="fade-in" style={{minHeight:"100vh",padding:"14px 18px",maxWidth:1900,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:10}}>
        <div style={{display:"flex",alignItems:"baseline",gap:14,flexWrap:"wrap"}}>
          <h1 style={{fontSize:19,fontWeight:800,letterSpacing:"-.02em",margin:0}}>Adatool <span style={{color:"var(--accent)"}}>Gov</span></h1>
          <div style={{color:"var(--text2)",fontSize:11,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            <span>{T.subtitle_drep}: {dreps.length}{hasMore?"+":""}</span>
            <span>{T.subtitle_actions}: {proposals.length}</span>
            <span style={{color:"var(--border2)"}}>{T.api_stats}: {apiStats.calls} {T.api_calls} / {apiStats.cached} {T.cached}</span>
            {isDemo && <span style={{color:"#f59e0b",fontWeight:600}}>⚠ {T.demo_mode}</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{display:"flex",border:"1px solid var(--border)",borderRadius:6,overflow:"hidden"}}>
            {["en","ja"].map(l=>(
              <button key={l} onClick={()=>setLang(l)} style={{padding:"4px 10px",fontSize:11,fontWeight:600,border:"none",cursor:"pointer",
                background:lang===l?"var(--accent)":"var(--bg3)",color:lang===l?"#fff":"var(--text2)"}}>{l==="en"?"EN":"日本語"}</button>
            ))}
          </div>
          {isDemo&&<button className="btn btn-primary" onClick={loadLive} style={{fontSize:11}}>{T.switch_live}</button>}
          <button className="btn" onClick={isDemo?loadDemo:loadLive}>↻ {T.refresh}</button>
          <button className="btn" onClick={()=>{ setBfKey(""); setApiKey(""); setApiKeyInput(""); }}
            style={{fontSize:9,padding:"4px 8px",opacity:0.6}} title={T.api_key_change}>🔑</button>
        </div>
      </div>

      {/* Tab Bar */}
      <div className="tab-bar" style={{display:"flex",alignItems:"center",gap:0}}>
        <button className={`tab-btn ${tab==="dashboard"?"active":""}`} onClick={()=>setTab("dashboard")}>{T.tab_dashboard}</button>
        <button className={`tab-btn ${tab==="simulator"?"active":""}`} onClick={()=>setTab("simulator")}>{T.tab_simulator}</button>
        <button className={`tab-btn ${tab==="history"?"active":""}`} onClick={()=>setTab("history")}>{T.tab_history}</button>
        <button className={`tab-btn ${tab==="govdata"?"active":""}`} onClick={()=>setTab("govdata")}
          style={{fontSize:10,padding:"6px 10px",opacity:tab==="govdata"?1:.7}}>{T.tab_govdata||"Gov Data (β)"}</button>
        <button className={`tab-btn ${tab==="ai"?"active":""}`} onClick={()=>setTab("ai")}
          style={{fontSize:10,padding:"6px 10px",opacity:tab==="ai"?1:.7}}>{"🤖 AI分析 (β)"}</button>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
          <a href="https://adatool.net/constitution-tool/" target="_blank" rel="noopener"
            style={{fontSize:10,color:"var(--text2)",textDecoration:"none",opacity:.6,padding:"4px 8px",
              borderRadius:6,border:"1px solid var(--border)",transition:"opacity .2s"}}
            onMouseEnter={e=>e.target.style.opacity="1"} onMouseLeave={e=>e.target.style.opacity=".6"}
          >📜 {T.constitution_tool||"Constitution"}</a>
          <ShareButton T={T}/>
        </div>
      </div>

      {tab === "ai" ? (
        <AIAnalysisTab aiDrepTendencies={aiDrepTendencies} aiProposalReasons={aiProposalReasons}
          aiActionTypeSummary={aiActionTypeSummary} aiMeta={aiMeta} proposals={proposals} T={T} />
      ) : tab === "govdata" ? (
        <GovernanceDataTab govInfo={govInfo} T={T} dreps={allDreps.length?allDreps:dreps} votes={votes} proposals={proposals} ccMembers={ccMembers} ccVotes={ccVotes} spoVotes={spoVotes} spoPoolInfo={spoPoolInfo} />
      ) : tab === "dashboard" ? (
        <DashboardTab dreps={dreps} proposals={proposals} votes={votes} drepRationales={drepRationales}
          ccMembers={ccMembers} ccVotes={ccVotes} ccRationales={ccRationales}
          spoVotes={spoVotes} spoPoolInfo={spoPoolInfo} govInfo={govInfo}
          warnings={warnings} hasMore={hasMore} pageLoading={pageLoading} stage={stage}
          loadMoreDreps={loadMoreDreps} T={T} isDemo={isDemo} />
      ) : tab === "history" ? (
        <StakeHistoryTab history={stakeHistory} liveDreps={allDreps} T={T} lang={lang} govInfo={govInfo} />
      ) : (
        <SimulatorTab dreps={allDreps} voteData={voteData} totalActions={totalActions}
          periodVoteData={periodVoteData}
          computePeriodVoteData={computePeriodVoteData} setPeriodVoteData={setPeriodVoteData}
          loadingVotes={loadingVotes} progress={simProgress}
          ccMembers={ccMembers} ccVotes={ccVotes} proposals={proposals} T={T} />
      )}

      <div style={{marginTop:12,textAlign:"center",color:"#333a4a",fontSize:10,lineHeight:1.8}}>
        Data: <a href="https://blockfrost.io" target="_blank">Blockfrost.io</a> · <a href="https://koios.rest" target="_blank">Koios</a>
        {dataSource === "static" && " (cached)"} ·
        <a href="https://github.com/Cerkoryn/ExcludeKPayN" target="_blank">ExcludeKPayN (Middle-Out)</a> ·
        Process-first framework (<a href="https://github.com/cardano-foundation/CIPs/tree/master/CIP-1694" target="_blank">CIP-1694</a>)
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
