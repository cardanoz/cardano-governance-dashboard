name: X Digest Collection

on:
  # Daily at 06:00 UTC (15:00 JST)
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect tweets from X
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: node scripts/collect-x-digest.js

      - name: Summarize with Claude Haiku
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: node scripts/summarize-x-digest.js

      - name: Commit and push digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/x-*.json
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "Update X digest $(date -u +'%Y-%m-%d %H:%M UTC')" && git pull --rebase && git push)
